<style>
:root { color-scheme: dark; }
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#090a12}
body{font-family:'Outfit',system-ui,sans-serif;color:#d7dbf0;
  background:radial-gradient(1200px 700px at 50% -10%,#1c2138 0%,transparent 60%),
  radial-gradient(900px 600px at 90% 10%,#1a1f33 0%,transparent 55%),
  linear-gradient(180deg,#0c0e1a 0%,#090a12 100%);min-height:100vh}
.cinzel{font-family:'Cinzel',Georgia,serif;letter-spacing:.04em}
.mono{font-family:'Space Mono',ui-monospace,Menlo,monospace}
.wrap{max-width:620px;margin:0 auto;padding:26px 16px 60px;position:relative;z-index:1}
.panel{background:linear-gradient(180deg,rgba(28,32,52,.92),rgba(20,23,38,.92));
  border:1px solid rgba(120,130,180,.16);border-radius:18px;
  box-shadow:0 18px 40px -28px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.04)}
.eyebrow{font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;color:#7c84a8;font-weight:600}
.row{border-radius:11px;transition:background .18s}
.row:hover{background:rgba(255,255,255,.025)}
.btn{transition:transform .12s,filter .18s;cursor:pointer;border:none;font-family:inherit;border-radius:12px}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px) scale(.99)}
.bartrack{position:relative;border-radius:99px;background:rgba(255,255,255,.07);box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
.fill{height:100%;border-radius:99px;position:relative;overflow:hidden;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.fill::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.5) 50%,transparent 70%);transform:translateX(-120%);animation:shimmer 2.8s infinite}
@keyframes shimmer{to{transform:translateX(220%)}}
.tick{position:absolute;top:-2px;bottom:-2px;width:2px;border-radius:2px;background:#f6f1e0;box-shadow:0 0 5px rgba(255,255,255,.6)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fadeUp{animation:fadeUp .5s ease both}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
@media(max-width:480px){.grid3{grid-template-columns:1fr 1fr}}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#stars span{position:absolute;border-radius:99px;background:#cfd6f2;opacity:.1;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.07;transform:scale(1)}50%{opacity:.45;transform:scale(1.3)}}
.statbig{font-family:'Space Mono',ui-monospace,monospace;font-size:22px;font-weight:700;color:#eef0fb}
.statsm{font-size:11px;color:#8089a8;margin-top:2px}
.gold{color:#f0b73e}.goldl{color:#f6cf6a}.green{color:#2fd180}.mint{color:#9af0c6}
.dim{color:#6f7798}.dim2{color:#8089a8}.bright{color:#eef0fb}.pink{color:#f0628a}.blue{color:#4ea3e0}.purple{color:#9d7bff}
input,select{background:rgba(10,12,22,.7);color:#eef0fb;border:1px solid rgba(120,130,180,.25);
  border-radius:10px;font-family:'Space Mono',monospace;font-size:13px;padding:8px 10px;outline:none;width:100%}
input:focus,select:focus{border-color:rgba(240,183,62,.55)}
input[type=date]{color-scheme:dark}
label.f{display:flex;flex-direction:column;gap:4px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#7c84a8;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{text-align:left;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:#7c84a8;padding:6px 8px;border-bottom:1px solid rgba(120,130,180,.16);white-space:nowrap;font-weight:600}
td{padding:7px 8px;border-bottom:1px solid rgba(120,130,180,.08);white-space:nowrap}
.num{text-align:right;font-family:'Space Mono',monospace} th.num{text-align:right}
.pill{font-size:9.5px;font-weight:600;letter-spacing:.04em;padding:2px 8px;border-radius:99px;border:1px solid}
.pill.ext{color:#9af0c6;background:rgba(47,209,128,.14);border-color:rgba(47,209,128,.4)}
.pill.ref{color:#f6d28a;background:rgba(240,183,62,.14);border-color:rgba(240,183,62,.4)}
.pill.paid{color:#9af0c6;background:rgba(47,209,128,.14);border-color:rgba(47,209,128,.4)}
.pill.pend{color:#aab2d0;background:rgba(120,130,180,.14);border-color:rgba(120,130,180,.35)}
.seg{display:flex;border:1px solid rgba(120,130,180,.25);border-radius:12px;overflow:hidden}
.seg button{flex:1;background:transparent;color:#8089a8;border:none;padding:8px 0;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;letter-spacing:.06em}
.seg button.on{background:rgba(240,183,62,.16);color:#f6cf6a}
.hl td{background:rgba(240,183,62,.07)}
.gRow{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;font-size:12.5px}
.gRow .k{color:#8089a8}.gRow .v{font-family:'Space Mono',monospace;color:#eef0fb}
.chartbox{position:relative;height:230px}
.del{cursor:pointer;color:#5f667f;font-size:14px;border:none;background:none;font-family:inherit}
.del:hover{color:#f0628a}
.section{margin-top:24px}
.reward-done{color:#2fd180}.reward-next{color:#f6cf6a}.reward-lock{color:#5d647f}
@media(prefers-reduced-motion:reduce){#stars span,.fill::after,.fadeUp{animation:none}}
#ctoast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;background:rgba(20,23,38,.96);border:1px solid rgba(240,183,62,.5);color:#f6e2ad;padding:10px 18px;border-radius:12px;font-size:13px;display:none}

<script>
"use strict";
/* ===================== config & state ===================== */
var DEF = {startDate:'2026-07-08', startAUM:40000000, goal:100000000, years:3,
  fee:1.0, hh:500000, ro:100, close:80, mtr:50.4};
var REWARDS = [[50,'New Suit'],[60,'New shoes / boots'],[70,'Family vacation'],[80,'New car'],[90,'Something for Jo'],[100,'Rolex Datejust']];
var A = {}, hhs = [], draftType = 'ext';
function load(){
  A = Object.assign({}, DEF);
  try{ Object.assign(A, JSON.parse(localStorage.getItem('climb_a')||'{}')); }catch(e){}
  try{ hhs = JSON.parse(localStorage.getItem('climb_h'))||[]; }catch(e){ hhs=[]; }
}
function saveA(){ localStorage.setItem('climb_a', JSON.stringify(A)); }
function saveH(){ localStorage.setItem('climb_h', JSON.stringify(hhs)); }
load();

/* ===================== model ===================== */
var GLO=.35, GHI=.45, TH=650000;
function bonusOf(sz){ return sz>=2e6?15000 : sz>=1e6?10000 : sz>=750000?7500 : sz>=5e5?5000 : 0; }
function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function fmtK(n){ return '$'+(Math.round(n/100)/10).toLocaleString('en-US')+'K'; }
function fmtM(n){ return '$'+(n/1e6).toLocaleString('en-US',{maximumFractionDigits:2})+'M'; }
function net(x){ return x*(1-A.mtr/100); }
function today(){ return new Date().toISOString().slice(0,10); }
function addMonths(dstr,m){ var d=new Date(dstr+'T12:00'); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); }
function daysBetween(a,b){ return Math.round((new Date(b+'T12:00')-new Date(a+'T12:00'))/864e5); }
function niceDate(dstr){ var d=new Date(dstr+'T12:00'); return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }

function compute(){
  var extSum=0, refSum=0, extN=0, refN=0;
  hhs.forEach(function(h){ if(h.type==='ref'){refSum+=h.amt;refN++;} else {extSum+=h.amt;extN++;} });
  var added = extSum+refSum;
  var cur = A.startAUM + added;
  var revFull = cur*A.fee/100;                          // full revenue (sets grid tier)
  var grid = revFull>=TH ? GHI : GLO;
  var compBase = (A.startAUM+extSum)*A.fee/100 + refSum*A.fee/100*0.75;  // referral haircut
  var grossInc = compBase*grid;
  var startInc = (A.startAUM*A.fee/100)*(A.startAUM*A.fee/100>=TH?GHI:GLO);

  // bonuses (external only)
  var bonPaid=0, bonPend=0, bonRows=[];
  hhs.forEach(function(h){
    if(h.type!=='ext') return;
    var b=bonusOf(h.amt); if(!b) return;
    var pay=addMonths(h.d,6), paid=pay<=today();
    if(paid) bonPaid+=b; else bonPend+=b;
    bonRows.push({d:h.d,pay:pay,b:b,paid:paid,amt:h.amt});
  });
  bonRows.sort(function(a,b){return a.pay<b.pay?-1:1;});

  // pace vs plan
  var elapsed = Math.max(0, daysBetween(A.startDate, today()));
  var span = A.years*365.25;
  var planAdded = Math.min(A.goal-A.startAUM, (A.goal-A.startAUM)*(elapsed/span));
  var paceAUM = A.startAUM + planAdded;
  var onPace = cur>=paceAUM-1;
  var behindAUM = paceAUM-cur;

  // trend from actual log
  var months = Math.max(elapsed/30.44, 0.25);
  var perMonth = added/months;
  var trend = {perMonth:perMonth, hhPerMonth:hhs.length/months, avgSize:hhs.length?added/hhs.length:0};
  var cliffAUM = TH/(A.fee/100);
  function etaAt(targetAUM){
    if(perMonth<=0||cur>=targetAUM) return null;
    var m=(targetAUM-cur)/perMonth; var d=new Date(); d.setDate(d.getDate()+Math.round(m*30.44));
    return {months:m, date:d.toISOString().slice(0,10)};
  }
  return {extSum:extSum,refSum:refSum,extN:extN,refN:refN,added:added,cur:cur,revFull:revFull,grid:grid,
    compBase:compBase,grossInc:grossInc,startInc:startInc,bonPaid:bonPaid,bonPend:bonPend,bonRows:bonRows,
    elapsed:elapsed,paceAUM:paceAUM,onPace:onPace,behindAUM:behindAUM,months:months,trend:trend,
    cliffAUM:cliffAUM,etaCliff:etaAt(cliffAUM),etaGoal:etaAt(A.goal)};
}
function grossAt(aum){ var r=aum*A.fee/100; return r*(r>=TH?GHI:GLO); }

/* ===================== ui helpers ===================== */
function bar(pct,target,color,glow,h){
  h=h||9;
  var t = target!=null ? Math.max(0,Math.min(100,target*100)) : null;
  var w = Math.max(1.5,Math.min(100,pct*100));
  return '<div class="bartrack" style="height:'+h+'px">'
    +'<div class="fill" style="width:'+w+'%;background:'+color+';box-shadow:0 0 12px '+glow+'"></div>'

/* ===================== chart ===================== */
var chart;
function drawChart(D){
  var el=document.getElementById('trajChart'); if(!el||typeof Chart==='undefined')return;
  var start=A.startDate;
  // actual cumulative
  var pts=[{x:0,y:A.startAUM/1e6}];
  hhs.slice().sort(function(a,b){return a.d<b.d?-1:1;}).forEach(function(x){
    var d=Math.max(0,daysBetween(start,x.d));
    pts.push({x:d,y:(pts[pts.length-1].y*1e6+x.amt)/1e6});
  });
  pts.push({x:Math.max(0,daysBetween(start,today())),y:D.cur/1e6});
  // pace line
  var span=A.years*365.25;
  var pace=[{x:0,y:A.startAUM/1e6},{x:span,y:A.goal/1e6}];
  // trend projection
  var proj=null;
  if(D.trend.perMonth>0&&D.cur<A.goal){
    var mLeft=(A.goal-D.cur)/D.trend.perMonth;
    proj=[{x:daysBetween(start,today()),y:D.cur/1e6},{x:daysBetween(start,today())+mLeft*30.44,y:A.goal/1e6}];
  }
  var ds=[
    {label:'Pace required',data:pace,borderColor:'rgba(120,130,180,.5)',borderDash:[6,5],pointRadius:0,borderWidth:1.5},
    {label:'The Book',data:pts,borderColor:'#f0b73e',backgroundColor:'rgba(240,183,62,.09)',fill:true,pointRadius:3,pointBackgroundColor:'#f6cf6a',borderWidth:2.5,stepped:true}
  ];
  if(proj) ds.push({label:'Your trend',data:proj,borderColor:'#2fd180',borderDash:[3,4],pointRadius:0,borderWidth:1.5});
  if(chart)chart.destroy();
  var maxX=Math.max(span,proj?proj[1].x:0)*1.02;
  chart=new Chart(el,{type:'line',data:{datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{x:{type:'linear',min:0,max:maxX,ticks:{color:'#6f7798',font:{family:"'Space Mono',monospace",size:9},maxTicksLimit:7,
          callback:function(v){var d=new Date(start+'T12:00');d.setDate(d.getDate()+v);return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});}},
          grid:{color:'rgba(120,130,180,.08)'}},
        y:{ticks:{color:'#6f7798',font:{family:"'Space Mono',monospace",size:9},callback:function(v){return '$'+v+'M';}},grid:{color:'rgba(120,130,180,.08)'}}},
      plugins:{legend:{labels:{color:'#8089a8',boxWidth:10,font:{family:"'Outfit',sans-serif",size:10}}},
        tooltip:{callbacks:{title:function(i){var d=new Date(start+'T12:00');d.setDate(d.getDate()+i[0].parsed.x);return d.toLocaleDateString();},
          label:function(c){return c.dataset.label+': $'+c.parsed.y.toFixed(2)+'M';}}}}}});
}

/* ===================== wiring ===================== */
function preview(){
  var amt=parseFloat(document.getElementById('hhAmt').value)||0;
  var el=document.getElementById('hhPreview');
  if(!amt){el.innerHTML='';return;}
  var D=compute();
  var newCur=D.cur+amt, newRev=newCur*A.fee/100;
  var newGrid=newRev>=TH?GHI:GLO;
  var toYou=amt*A.fee/100*(draftType==='ref'?0.75:1)*newGrid;
  var b=draftType==='ext'?bonusOf(amt):0;
  var crosses=D.grid<GHI&&newGrid===GHI;
  el.innerHTML='This household: <span class="goldl">'+fmt(toYou)+'/yr</span> to you'
    +(b?' + <span class="green">'+fmt(b)+' NPH</span> paying '+niceDate(addMonths(document.getElementById('hhDate').value||today(),6)):(draftType==='ref'?' · <span class="dim2">referral: −25% comp, no NPH</span>':' · below $500K — no NPH'))
    +(crosses?' · <span class="gold">⚡ this one crosses the cliff — whole book reprices to 45%</span>':'');
}
function wire(D){
  document.getElementById('segExt').onclick=function(){draftType='ext';this.classList.add('on');document.getElementById('segRef').classList.remove('on');preview();};
  document.getElementById('segRef').onclick=function(){draftType='ref';this.classList.add('on');document.getElementById('segExt').classList.remove('on');preview();};
  document.getElementById('hhAmt').addEventListener('input',preview);
  document.getElementById('hhDate').addEventListener('change',preview);
  document.getElementById('hhAdd').onclick=function(){
    var amt=parseFloat(document.getElementById('hhAmt').value)||0;
    var d=document.getElementById('hhDate').value||today();
    if(amt<=0)return;
    hhs.push({d:d,amt:amt,type:draftType});
    saveH(); render();
  };
  document.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){ hhs.splice(+b.dataset.del,1); saveH(); render(); };
  });
  var smap={sStart:['startDate',1],sSA:['startAUM',0],sGoal:['goal',0],sYears:['years',0],sFee:['fee',0],sHH:['hh',0],sRO:['ro',0],sClose:['close',0],sMTR:['mtr',0]};
  Object.keys(smap).forEach(function(id){
    document.getElementById(id).addEventListener('change',function(){
      var k=smap[id][0], isStr=smap[id][1];
      A[k]=isStr?this.value:(parseFloat(this.value)||DEF[k]);
      saveA(); render();
    });
  });
  document.getElementById('resetA').onclick=function(){ if(confirm('Reset all rules to defaults?')){A=Object.assign({},DEF);saveA();render();} };
  document.getElementById('bkup').onclick=function(){
    try{
      var a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob([JSON.stringify({app:'climb',version:1,exportedAt:new Date().toISOString(),rules:A,households:hhs})],{type:'application/json'}));
      a.download='climb_backup_'+today()+'.json'; a.click(); ctoast('Backup exported \u2713');
    }catch(e){ ctoast('Export failed'); }
  };
  document.getElementById('rstr').onclick=function(){ document.getElementById('rstrF').click(); };
  document.getElementById('rstrF').onchange=function(){
    var f=this.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(e){ try{
      var o=JSON.parse(e.target.result);
      if(o&&o.rules&&Array.isArray(o.households)){ A=Object.assign({},DEF,o.rules); hhs=o.households; saveA(); saveH(); render(); ctoast('Backup restored \u2713'); }
      else ctoast('Not a Climb backup');
    }catch(err){ ctoast('Could not read that file'); } };
    rd.readAsText(f); this.value='';
  };
  document.getElementById('clearH').onclick=function(){ if(confirm('Clear every logged household?')){hhs=[];saveH();render();} };
}

function ctoast(m){ var t=document.getElementById('ctoast'); if(!t){ t=document.createElement('div'); t.id='ctoast'; document.body.appendChild(t);} t.textContent=m; t.style.display='block'; clearTimeout(t._h); t._h=setTimeout(function(){t.style.display='none';},2200); }

/* ===================== stars ===================== */
(function(){
  try{ if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches) return; }catch(e){}
  var s=document.getElementById('stars'), h='';
  for(var i=0;i<40;i++){
    h+='<span style="left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;width:'+(1+Math.random()*2)+'px;height:'+(1+Math.random()*2)+'px;animation-delay:'+(Math.random()*4)+'s"></span>';
  }
  s.innerHTML=h;
})();

render();
</script>
</body>
</html>
