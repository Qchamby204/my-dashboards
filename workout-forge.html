<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#090a12}
body{font-family:'Outfit',system-ui,sans-serif;color:#d7dbf0;
  background:radial-gradient(1200px 700px at 50% -10%,#221a2e 0%,transparent 60%),
  radial-gradient(900px 600px at 90% 10%,#1a2333 0%,transparent 55%),
  linear-gradient(180deg,#0c0e1a 0%,#090a12 100%);min-height:100vh}
.cinzel{font-family:'Cinzel',serif;letter-spacing:.04em}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:600px;margin:0 auto;
  padding:0 max(16px,env(safe-area-inset-left)) calc(72px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-right))}

/* App chrome. The blurred fill runs up under the Dynamic Island so the clock,
   signal, wifi and battery never sit on top of content. */
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}
.appbar{position:sticky;top:0;z-index:30;
  margin:0 calc(-1 * max(16px,env(safe-area-inset-left))) 12px calc(-1 * max(16px,env(safe-area-inset-right)));
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(16px,env(safe-area-inset-left)) 11px max(16px,env(safe-area-inset-right));
  background:rgba(10,12,22,.86);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid rgba(120,130,180,.13);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.appbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#f3f4fb;letter-spacing:.04em;white-space:nowrap}
.appbar-pill{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:99px;
  background:rgba(240,104,62,.1);border:1px solid rgba(240,104,62,.32);white-space:nowrap}

.eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#7c84a8;font-weight:600}
.panel{background:linear-gradient(180deg,rgba(28,32,52,.92),rgba(20,23,38,.92));
  border:1px solid rgba(120,130,180,.16);border-radius:18px;
  box-shadow:0 18px 40px -28px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.04)}
.card{transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer}
.card:hover{transform:translateY(-3px)}
.row{border-radius:11px}
.tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.btn{transition:transform .12s,filter .18s;cursor:pointer;border:none;font-family:inherit}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px) scale(.99)}
.chip{font-size:8.5px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
.bartrack{position:relative;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.fill{height:100%;border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fadeUp{animation:fadeUp .4s ease both}
.num{font-family:'Space Mono',monospace;background:rgba(255,255,255,.05);border:1px solid rgba(150,160,200,.2);color:#eef0fb;text-align:center;font-size:16px;font-weight:700;outline:none;border-radius:7px;padding:6px 2px}

.num:focus{border-color:rgba(240,183,62,.6)}

/* ---------- week to week notes ---------- */
function lastNote(exId){

    var ss=state.sessions[i];

  }

}
function noteHistory(exId){

}
function lastSets(exId){ for(var i=state.sessions.length-1;i>=0;i--){ var it=state.sessions[i].items&&state.sessions[i].items[exId]; if(it&&it.sets&&it.sets.length) return it.sets; } return null; }

/* ---------- stats ---------- */
function stats(){
  var s=state.sessions, total=s.length, ws=weekStart();
  var thisWeek=s.filter(function(x){ var p=x.date.split("-"); return new Date(+p[0],+p[1]-1,+p[2]).getTime()>=ws; }).length;
  var byType={}; PROGRAM.forEach(function(d){byType[d.key]=0;});
  s.forEach(function(x){ if(byType[x.type]!=null) byType[x.type]++; });
  var daysLeft=Math.max(0,Math.ceil((SEASON_END-Date.now())/86400000));
  return {total:total,thisWeek:thisWeek,byType:byType,last:s.length?s[s.length-1]:null,daysLeft:daysLeft,weeksLeft:Math.ceil(daysLeft/7)};

/* ---------- view helpers ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function chips(f){ return f.map(function(x){ var c=FOCUS[x]||"#888"; return '<span class="chip" style="color:'+c+';background:'+c+'1f;border:1px solid '+c+'55">'+x+'</span>'; }).join(" "); }

function spark(arr,color){
  if(arr.length<2) return '';
  var W=120,H=26,p=3, vals=arr.map(function(o){return o.e;});
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals); if(mx===mn){mx=mn+1;}
  var pts=arr.map(function(o,i){ var x=p+i*(W-2*p)/(arr.length-1); var y=H-p-(o.e-mn)/(mx-mn)*(H-2*p); return x.toFixed(1)+","+y.toFixed(1); }).join(" ");
  var last=arr[arr.length-1], lx=p+(arr.length-1)*(W-2*p)/(arr.length-1), ly=H-p-(last.e-mn)/(mx-mn)*(H-2*p);
  return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="display:block"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2" fill="'+color+'"/></svg>';

function prFor(exId){

/* ---------- persistence ---------- */
var KEY="forge:sessions:v2", SWAPKEY="forge:swaps:v1", DRAFTKEY="forge:draft:v1";
function save(){ store.set(KEY,JSON.stringify(state.sessions)); }
function saveDraft(){ store.set(DRAFTKEY,JSON.stringify(state.draft)); }
var LIVEKEY="forge:live:v1";
function saveLive(){ store.set(LIVEKEY,JSON.stringify(state.live)); }
var ORDERKEY="forge:order:v1";
function saveOrder(){ store.set(ORDERKEY,JSON.stringify(state.order||{})); }

/* ---------- actions ---------- */
function logDay(key,durMin){
  var d=dayBy(key); if(!d) return;
  var items={}, any=false;
  allItems(d).forEach(function(it){
    var eid=effId(it); var dr=state.draft[eid]; if(!dr) return;
    if(it.track==="load"){
      var sets=(dr.sets||[]).filter(function(s){ return s.w||s.r; }).map(function(s){ return {w:s.w||"",r:s.r||""}; });
      if(sets.length||dr.done){ items[eid]={done:!!dr.done,sets:sets,name:effName(it)}; if(dr.note&&dr.note.trim()) items[eid].note=dr.note.trim(); any=true; }
    } else if(it.track==="cardio"){
      var mn=(dr.min!=null&&dr.min!=="")?+dr.min:0;
      if(mn>0||dr.done){ items[eid]={done:true,min:mn,mode:dr.mode||"",name:effName(it)}; if(dr.note&&dr.note.trim()) items[eid].note=dr.note.trim(); any=true; }
    } else if(dr.done){ items[eid]={done:true}; if(dr.note&&dr.note.trim()) items[eid].note=dr.note.trim(); any=true; }
  });
  if(!any){ toast("Check off or log a few exercises first"); return; }
  var prior=priorBestMap();
  var prs=[];
  Object.keys(items).forEach(function(k){ var it=items[k]; if(it&&it.sets&&it.sets.length){ var b=setsTopE1RM(it.sets); if(b>0 && (prior[k]||0)>0 && b>prior[k]+0.01){ it.pr=true; prs.push({name:it.name||k,e:b}); } } });
  var sess={date:todayISO(),type:key,items:items}; if(durMin) sess.dur=durMin;
  state.sessions.push(sess);
  state.handoff={date:sess.date, tag:d.tag};
  allItems(d).forEach(function(it){ delete state.draft[effId(it)]; });
  save(); saveDraft(); render();
  if(prs.length){ state.prCel={prs:prs.slice(0,3),tag:d.tag}; render(); }
  else { toast("\u2714 "+d.tag+" logged \u2014 nice work"); }
}

function exportData(){
  try{ var payload={app:"forge",version:2,exportedAt:new Date().toISOString(),sessions:state.sessions,swaps:state.swaps,order:state.order};
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}); var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download="forge-training-"+todayISO()+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000); toast("Backup exported \u2713");
  }catch(e){ toast("Export failed"); }
}
function importData(file){
  var r=new FileReader();
  r.onload=function(){ try{ var o=JSON.parse(r.result); var ss=Array.isArray(o)?o:o.sessions; if(Array.isArray(ss)){ state.sessions=ss.filter(function(x){ return x && typeof x==="object" && x.date && x.type; }); if(o && o.swaps && typeof o.swaps==="object"){ state.swaps=o.swaps; store.set(SWAPKEY,JSON.stringify(state.swaps)); } if(o && o.order && typeof o.order==="object"){ state.order=o.order; saveOrder(); } save(); render(); toast("Imported \u2713 ("+state.sessions.length+" sessions)"); } else toast("No sessions in that file"); }catch(e){ toast("Couldn\u2019t read that file"); } };
  r.onerror=function(){ toast("Couldn\u2019t read that file"); };
  r.readAsText(file);
}

/* Destructive actions were one-way. Snapshot first, then keep Undo on screen. */
var __undoT=null;
function undoToast(msg, restore){
  var t=document.getElementById('undoToast');
  if(!t){ t=document.createElement('div'); t.id='undoToast'; document.body.appendChild(t); }
  t.style.cssText="position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:95;"
   +"background:rgba(20,23,38,.97);border:1px solid rgba(240,183,62,.5);color:#f6e2ad;padding:10px 16px;border-radius:12px;"
   +"font-family:'Outfit',sans-serif;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.55);display:flex;align-items:center;gap:12px;max-width:92vw";
  t.textContent='';
  var s=document.createElement('span'); s.textContent=msg; t.appendChild(s);
  var b=document.createElement('button'); b.textContent='Undo';
  b.style.cssText="background:rgba(240,183,62,.16);border:1px solid rgba(240,183,62,.5);color:#f0b73e;font-family:inherit;"
   +"font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer;flex-shrink:0";
  b.onclick=function(){ try{ restore(); }catch(e){} t.remove(); };
  t.appendChild(b);
  clearTimeout(__undoT); __undoT=setTimeout(function(){ if(t&&t.parentNode) t.remove(); },7000);
}

app.addEventListener("click",function(e){
  if(e.target.classList && e.target.classList.contains("overlay")){ if(state.plateOpen){ state.plateOpen=false; render(); return; } }
  var el=e.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act, key=el.dataset.key, id=el.dataset.id;
  if(act==="setw"||act==="setr"||act==="note") return;
  if(act==="cmin"){
    var dr=state.draft[id]||{sets:[]};
    var itc=itemById(id);
    var base=(dr.min!=null&&dr.min!=="")?+dr.min:((itc&&itc.defMin)||15);
    var nv=Math.max(0,Math.min(300,base+(+el.dataset.delta||0)));
    dr.min=nv; if(nv>0) dr.done=true;
    state.draft[id]=dr; saveDraft(); render();
    if(navigator.vibrate){ try{ navigator.vibrate(6); }catch(e2){} }
    return;
  }
  if(act==="cmode"){
    var dr2=state.draft[id]||{sets:[]};
    dr2.mode=(dr2.mode===el.dataset.mode)?"":el.dataset.mode;
    state.draft[id]=dr2; saveDraft(); render();
    return;
  }
  if(act==="day"){ state.openDay=state.openDay===key?null:key; render(); if(state.openDay){ var c=document.querySelector('[data-act="day"][data-key="'+key+'"]'); if(c) c.scrollIntoView({behavior:"smooth",block:"start"}); } }
  else if(act==="check"){ var dr=state.draft[id]||{sets:[]}; dr.done=!dr.done; state.draft[id]=dr; if(dr.done&&navigator.vibrate){ try{ navigator.vibrate(8); }catch(e2){} } saveDraft(); render(); }
  else if(act==="log"){ logDay(key); }
  else if(act==="clearday"){ var d=dayBy(key); if(d) allItems(d).forEach(function(it){ delete state.draft[effId(it)]; }); saveDraft(); render(); }
  else if(act==="del"){ var i=+el.dataset.idx;
    /* iOS blocks confirm() in home-screen apps, so deletion is immediate and
       the undo toast is the safety net. */
    if(!isNaN(i) && state.sessions[i]){
      var snap=JSON.stringify(state.sessions), tag=((dayBy(state.sessions[i].type)||{}).tag)||"session";
      state.sessions.splice(i,1); save(); render();
      undoToast("Deleted "+tag+" session", function(){ try{ state.sessions=JSON.parse(snap); save(); render(); }catch(e){} });
    } }
  else if(act==="rest"){ startTimer(+el.dataset.sec||90); }
  else if(act==="live"){
    if(state.live && state.live.key!==key){
      var oldL=JSON.stringify(state.live), oldTag=((dayBy(state.live.key)||{}).tag)||"session";
      undoToast("Switched from "+oldTag, function(){ try{ state.live=JSON.parse(oldL); saveLive(); render(); }catch(e){} });
    }
    if(state.live && state.live.key===key){ state.live.hidden=false; }
    else state.live={key:key,exIdx:0,startedAt:Date.now(),hidden:false};
    saveLive(); render();
  }
  else if(act==="livemin"){ if(state.live){ state.live.hidden=true; saveLive(); render(); } }
  else if(act==="liveresume"){ if(state.live){ state.live.hidden=false; saveLive(); render(); } }
  else if(act==="liveprev"){ if(state.live&&state.live.exIdx>0){ state.live.exIdx--; saveLive(); render(); } }
  else if(act==="livedone"){
    if(state.live){
      var ld=dayBy(state.live.key), lits=orderedItems(ld), lit=lits[state.live.exIdx];
      if(lit){
        var leid=effId(lit), ldr=state.draft[leid]||{sets:[]};
        if(!ldr.done){ ldr.done=true; state.draft[leid]=ldr; saveDraft(); if(navigator.vibrate){ try{ navigator.vibrate(8); }catch(e4){} } }
        if(lit.track==="load" && state.live.exIdx<lits.length-1) startTimer(parseRest(lit.rest));
      }
      if(state.live.exIdx<lits.length-1) state.live.exIdx++;
      saveLive(); render();
    }
  }
  else if(act==="livefill"){
    if(state.live){
      var fd=dayBy(state.live.key), fit=orderedItems(fd)[state.live.exIdx];
      if(fit){ var feid=effId(fit), fprev=lastSets(feid);
        if(fprev&&fprev.length){ var fdr=state.draft[feid]||{done:false,sets:[]}; fdr.sets=fprev.map(function(s5){ return {w:s5.w||"",r:s5.r||""}; }); state.draft[feid]=fdr; saveDraft(); render(); toast("\u27f3 Filled from last session \u2014 beat it"); } }
    }
  }
  else if(act==="livefinish"){ finishLive(); }
  else if(act==="export"){ exportData(); }
  else if(act==="import"){ var f=document.getElementById("importFile"); if(f) f.click(); }
  else if(act==="reset"){
    if(state.sessions.length && !window.__forgeResetArmed){
      window.__forgeResetArmed=true;
      el.textContent="\u21ba Tap again to clear the log";
      el.style.color="#f0628a"; el.style.borderColor="rgba(240,98,138,.5)";
      clearTimeout(window.__forgeResetT);
      window.__forgeResetT=setTimeout(function(){ window.__forgeResetArmed=false; render(); },4000);
      return;
    }
    window.__forgeResetArmed=false; clearTimeout(window.__forgeResetT);
    var snapS=JSON.stringify(state.sessions), snapD=JSON.stringify(state.draft);
    state.sessions=[]; state.draft={}; save(); saveDraft(); render();
    undoToast("Training log cleared", function(){ try{ state.sessions=JSON.parse(snapS); state.draft=JSON.parse(snapD); save(); saveDraft(); render(); }catch(e){} });
  }
  else if(act==="swapmenu"){ state.swapOpen=state.swapOpen===id?null:id; render(); }
  else if(act==="moveup"){ moveItem(el.dataset.key,id,-1); render(); }
  else if(act==="movedown"){ moveItem(el.dataset.key,id,1); render(); }
  else if(act==="resetorder"){ if(state.order) delete state.order[key]; saveOrder(); render(); }
  else if(act==="section"){ if(!state.openSections) state.openSections={}; state.openSections[key]=!state.openSections[key]; render(); }
  else if(act==="livelater"){
    if(state.live){ var lld=dayBy(state.live.key), litems=orderedItems(lld), lcur=litems[state.live.exIdx];
      if(lcur && moveItem(state.live.key,lcur.id,1)){ toast("\u2935 Moved down \u2014 do it after this one"); } render(); }
  }
  else if(act==="swap"){ var idx=+el.dataset.idx; if(idx>0) state.swaps[id]=idx; else delete state.swaps[id]; state.swapOpen=null; store.set(SWAPKEY,JSON.stringify(state.swaps)); render(); }
  else if(act==="chartex"){ state.chartEx=el.dataset.id; render(); }
  else if(act==="closepr"){ state.prCel=null; render(); }
  else if(act==="hodismiss"){ state.handoff=null; render(); }
  else if(act==="plates"){ state.plateOpen=true; render(); }
  else if(act==="closeplate"){ state.plateOpen=false; render(); }
  else if(act==="bar"){ state.bar=+el.dataset.v; render(); }
  else if(act==="platestep"){ state.plateW=Math.max(0,Math.round((state.plateW+parseFloat(el.dataset.v))*10)/10); render(); }
});

  var id=el.dataset.id, si=+el.dataset.set, field=el.dataset.act==="setw"?"w":"r";

  dr.sets[si][field]=el.value.trim(); state.draft[id]=dr; saveDraft();
});
app.addEventListener("change",function(e){
  var pw=e.target.closest('[data-act="platew"]'); if(pw){ var n=parseFloat(pw.value); state.plateW=isNaN(n)?0:Math.max(0,n); render(); return; }
  var fi=e.target.closest('#importFile'); if(fi&&fi.files&&fi.files[0]){ importData(fi.files[0]); fi.value=""; }
});

/* ---------- ambient embers ---------- */
(function(){
  try{
    if(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
    var c=document.createElement("div"); c.id="bgembers"; c.setAttribute("aria-hidden","true");
    var s="";
    for(var i=0;i<11;i++){
      var x=(7+(i*89)%86), sz=((i%2)+2), du=(9+(i%7)*1.4).toFixed(1), dl=((i%11)*1.3).toFixed(1);
      var col=i%3===0?"#f0683e":"#f0b73e";
      s+='<span style="left:'+x+'%;width:'+sz+'px;height:'+sz+'px;background:'+col+';animation-duration:'+du+'s;animation-delay:'+dl+'s"></span>';
    }
    c.innerHTML=s; document.body.appendChild(c);
  }catch(e){}
})();

/* ---------- boot ---------- */
/* Keep time-sensitive views (muscle heat window, "days ago", this-week count,
   days-left) honest when the app is resumed from the home screen or left open
   across midnight. Without this the page keeps whatever it rendered last time. */
var lastRenderDay=todayISO();
function dayRollCheck(){
  var t=todayISO();
  if(t!==lastRenderDay){ lastRenderDay=t; render(); }
}
document.addEventListener("visibilitychange",function(){ if(!document.hidden) dayRollCheck(); });
window.addEventListener("pageshow",function(e){ if(e && e.persisted) dayRollCheck(); });
window.addEventListener("focus",dayRollCheck);
setInterval(dayRollCheck,60000);

store.get(SWAPKEY).then(function(sw){ if(sw){ try{ var o=JSON.parse(sw); if(o&&typeof o==="object") state.swaps=o; }catch(e){} } return store.get(ORDERKEY); }).then(function(od){ if(od){ try{ var oo=JSON.parse(od); if(oo&&typeof oo==="object") state.order=oo; }catch(e){} } return store.get(KEY); }).then(function(v){ if(v){ try{ var a=JSON.parse(v); if(Array.isArray(a)) state.sessions=a; }catch(e){} } return store.get(DRAFTKEY); }).then(function(dv){ if(dv){ try{ var o=JSON.parse(dv); if(o&&typeof o==="object") state.draft=o; }catch(e){} } return store.get(LIVEKEY); }).then(function(lv){ if(lv){ try{ var lo=JSON.parse(lv); if(lo&&lo.key&&lo.startedAt&&dayBy(lo.key)) state.live=lo; }catch(e){} } render(); });
render();

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();
