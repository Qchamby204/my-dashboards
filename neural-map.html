<style>
  :root{
    --ink:#09070f; --panel:#171423; --panel-2:#1e1a2e; --line:#2a2540;
    --text:#ece8f5; --muted:#9a92b4; --faint:#6b6486;
    --gold:#e6b450; --cyan:#22d3ee; --green:#4ade80; --amethyst:#a78bfa; --drive:#5aa9ff; --emerald:#37d39a; --rose:#f472b6;

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:

    color:var(--text); font-family:'Outfit',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; overflow:hidden;
  }
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse at 50% 50%, transparent 58%, rgba(5,3,10,.5) 100%)}
  header.hud{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;pointer-events:none}

  .hud .eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.34em;text-transform:uppercase;color:var(--faint)}
  .hud h1{font-family:'Cinzel',serif;font-weight:700;font-size:19px;letter-spacing:.05em;
    background:linear-gradient(120deg,var(--gold),#f3d68a 30%,var(--amethyst) 60%,var(--gold) 90%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    background-size:250% 100%;animation:shimmer 11s linear infinite}
  @keyframes shimmer{to{background-position:250% 0}}
  .zoom{pointer-events:auto;display:flex;gap:6px}
  .zoom button{width:44px;height:44px;border-radius:11px;border:1px solid var(--line);background:var(--panel);color:var(--muted);
    font-size:19px;cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s}
  .zoom button:hover{color:var(--text);border-color:var(--amethyst)}

  #stage{position:fixed;inset:0;touch-action:none}
  svg#graph{width:100%;height:100%;display:block;cursor:grab}
  svg#graph.grabbing{cursor:grabbing}

  .edge{fill:none;stroke-width:1.1;stroke-opacity:.26;transition:stroke-opacity .2s}
  .graph.dim .edge{stroke-opacity:.07}
  .edge.hot{stroke-opacity:.85;stroke-width:1.8}

  .node{cursor:pointer}
  .node .halo{opacity:.42;transition:opacity .2s}
  .node .core{stroke:rgba(255,255,255,.22);stroke-width:1}
  .graph.dim .node{opacity:.3;transition:opacity .2s}
  .node.hot{opacity:1}
  .node.hot .halo{opacity:.95}

  .node text{font-family:'Outfit',sans-serif;pointer-events:none}
  .lbl-tool{font-size:calc(11.5px * var(--lz,1));font-weight:500;fill:var(--text);paint-order:stroke;stroke:rgba(9,7,15,.92);stroke-width:calc(3px * var(--lz,1));stroke-linejoin:round}
  .lbl-hub{font-size:calc(12.5px * var(--lz,1));font-weight:600;fill:var(--text);font-family:'Cinzel',serif;letter-spacing:.02em;
    paint-order:stroke;stroke:rgba(9,7,15,.94);stroke-width:calc(3.4px * var(--lz,1));stroke-linejoin:round}
  .lbl-core{font-size:15px;font-weight:700;fill:#17121f;font-family:'Cinzel',serif}

  .breathe{animation:breathe 4.2s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.38}50%{opacity:.7}}
  .spin{transform-box:fill-box;transform-origin:center;animation:spin 48s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pulse{pointer-events:none}
  .star{opacity:.12;animation:twinkle 5s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.07}50%{opacity:.55}}
  .node .ring{transition:stroke-opacity .2s}
  .node.hot .ring{stroke-opacity:.85}
  .node.sub .lbl-hub{font-size:calc(10.5px * var(--lz,1));opacity:.92;letter-spacing:.06em}
  .node.sub .halo{opacity:.3}
  .spin-rev{transform-box:fill-box;transform-origin:center;animation:spin 74s linear infinite reverse}
  @media (prefers-reduced-motion:reduce){.breathe,.spin,.spin-rev,.star,.hud h1{animation:none}}

  .pop{position:fixed;z-index:40;width:min(300px,calc(100vw - 28px));
    background:linear-gradient(180deg,rgba(30,26,46,.9),rgba(18,15,29,.96));
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(167,139,250,.3);border-radius:16px;padding:16px;
    box-shadow:0 24px 70px -18px rgba(0,0,0,.8), 0 0 44px -16px rgba(124,92,255,.45);
    opacity:0;transform:translateY(8px) scale(.98);pointer-events:none;transition:opacity .16s,transform .16s}
  .pop.show{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
  .pop .cat{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:7px}
  .pop h3{font-family:'Cinzel',serif;font-weight:600;font-size:17px;line-height:1.2;margin-bottom:6px}
  .pop .file{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);line-height:1.45;margin-bottom:13px;word-break:break-word}
  .pop .doors{display:flex;gap:8px;flex-wrap:wrap}
  .pop .door{flex:1 1 auto;text-align:center;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    text-decoration:none;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel-2);color:var(--text);
    display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all .14s}
  .pop .door .d{width:8px;height:8px;border-radius:50%}
  .pop .door.live .d{background:var(--emerald)} .pop .door.live:hover{border-color:var(--emerald)}
  .pop .door.drive .d{background:var(--drive)} .pop .door.drive:hover{border-color:var(--drive)}
  .pop .door.chat .d{background:var(--gold)} .pop .door.chat:hover{border-color:var(--gold)}
  .pop .door.file .d{background:var(--rose)} .pop .door.file:hover{border-color:var(--rose)}
  .pop .none{font-size:12px;color:var(--faint);font-weight:300;line-height:1.5}

  .legend{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding:12px;font-size:11px;color:var(--muted);pointer-events:none}
  .legend span{display:inline-flex;align-items:center;gap:6px;background:rgba(23,20,35,.55);
    border:1px solid var(--line);border-radius:999px;padding:5px 11px;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
  .legend .lg{width:9px;height:9px;border-radius:50%;display:inline-block}
  .hint{position:fixed;bottom:38px;left:0;right:0;text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:var(--faint);letter-spacing:.1em;pointer-events:none;z-index:20}
</style>

const rad=d=>d*Math.PI/180;
const el=(n,a={})=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};

const gEdges=document.getElementById("edges");
const gPulses=document.getElementById("pulses");
const gNodes=document.getElementById("nodes");
const graph=document.getElementById("graph");
const viewport=document.getElementById("viewport");
const pop=document.getElementById("pop");

/* star dust */
const gStars=document.getElementById("stars");
(function(){
  let seed=7; const rnd=()=>{seed=(seed*16807)%2147483647;return seed/2147483647;};
  for(let i=0;i<150;i++){
    const tint=rnd(); const fill=tint<0.16?"#e6b450":tint<0.42?"#a78bfa":"#ece8f5";
    const s=el("circle",{class:"star",cx:(C.x-600+rnd()*1200).toFixed(1),cy:(C.y-540+rnd()*1080).toFixed(1),r:(0.5+rnd()*1.1).toFixed(2),fill});
    s.style.animationDelay=(rnd()*6).toFixed(2)+"s";
    s.style.animationDuration=(3.5+rnd()*4.5).toFixed(2)+"s";
    gStars.appendChild(s);
  }
})();

const edges=[];
function addEdge(x1,y1,x2,y2,color,aId,bId){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const ddx=x2-x1, ddy=y2-y1, len=Math.hypot(ddx,ddy)||1;
  const bow=Math.min(26,len*0.15);
  const qx=mx-ddy/len*bow, qy=my+ddx/len*bow;
  const p=el("path",{class:"edge","d":`M ${x1} ${y1} Q ${qx} ${qy} ${x2} ${y2}`,stroke:color});
  p.dataset.a=aId; p.dataset.b=bId; gEdges.appendChild(p);
  const pl=el("circle",{class:"pulse",r:2.4,fill:color,filter:"url(#glow)"}); gPulses.appendChild(pl);
  edges.push({x1,y1,qx,qy,x2,y2,phase:Math.random(),pl});
}

function addNode(x,y,r,grad,color,label,cls,data,ang){
  const g=el("g",{class:"node "+cls,transform:`translate(${x} ${y})`});
  g.dataset.id=data.id;
  g.appendChild(el("circle",{class:"halo breathe",r:r*1.5,fill:color,filter:"url(#glow)"}));
  g.appendChild(el("circle",{class:"core",r:r,fill:`url(#${grad})`}));
  if(cls!=="nucleus"){
    g.appendChild(el("circle",{class:"ring",r:r+4.5,fill:"none",stroke:color,"stroke-opacity":.26,"stroke-width":1}));
  }
  if(cls==="nucleus"){
    g.appendChild(el("circle",{class:"spin",r:r+11,fill:"none",stroke:"rgba(230,180,80,.4)","stroke-width":1,"stroke-dasharray":"4 7"}));
    g.appendChild(el("circle",{class:"spin-rev",r:r+20,fill:"none",stroke:"rgba(167,139,250,.28)","stroke-width":1,"stroke-dasharray":"2 9"}));
    label.split("\n").forEach((ln,i,arr)=>{
      const t=el("text",{class:"lbl-core","text-anchor":"middle","dominant-baseline":"middle",y:(arr.length>1?(i*18-8):0)});
      t.textContent=ln; g.appendChild(t);
    });
  } else if(cls.indexOf("hub")===0){
    const t=el("text",{class:"lbl-hub","text-anchor":"middle","dominant-baseline":"middle",y:r+15}); t.textContent=label; g.appendChild(t);
  } else {
    const dx=Math.cos(rad(ang)),dy=Math.sin(rad(ang)),gap=r+13;
    const anchor=dx>0.35?"start":dx<-0.35?"end":"middle";
    const t=el("text",{class:"lbl-tool","text-anchor":anchor,"dominant-baseline":"middle",x:(gap*dx).toFixed(1),y:(gap*dy).toFixed(1)});
    t.textContent=label; g.appendChild(t);
  }
  gNodes.appendChild(g); return g;
}

const nucId="n-core";
addNode(C.x,C.y,44,"g-nucleus","#e6b450","Quinton\nChambers","nucleus",{id:nucId});

function layTool(tool,cat,a,r,fromX,fromY,fromId,idStr,sub){
  const tx=C.x+r*Math.cos(rad(a)), ty=C.y+r*Math.sin(rad(a));
  tool.id=idStr; tool.cat=cat; if(sub) tool.sub=sub;
  cat._pts.push([tx,ty]);
  addEdge(fromX,fromY,tx,ty,cat.color,fromId,tool.id);
  addNode(tx,ty,16,cat.grad,cat.color,tool.label,"tool",tool,a)._tool=tool;
  return [tx,ty];
}

CATS.forEach(cat=>{
  const hx=C.x+HUB_R*Math.cos(rad(cat.dir)), hy=C.y+HUB_R*Math.sin(rad(cat.dir));
  const hubId="h-"+cat.key;
  addEdge(C.x,C.y,hx,hy,cat.color,nucId,hubId);
  cat._pts=[[hx,hy]];
  if(cat.groups){
    cat.groups.forEach((grp,gi)=>{
      const gx=C.x+SUB_R*Math.cos(rad(grp.dir)), gy=C.y+SUB_R*Math.sin(rad(grp.dir));
      const gid="g-"+cat.key+"-"+gi;
      addEdge(hx,hy,gx,gy,cat.color,hubId,gid);
      cat._pts.push([gx,gy]);
      grp._pts=[[gx,gy]];
      const n=grp.tools.length;
      grp.tools.forEach((tool,i)=>{
        const a=n===1?grp.dir:grp.dir-grp.spread+(2*grp.spread)*(i/(n-1));
        const ring=grp.ring||[-18,22];
        const pt=layTool(tool,cat,a,TOOL_R+ring[i%ring.length],gx,gy,gid,"t-"+cat.key+"-"+gi+"-"+i,grp.title);
        grp._pts.push(pt);
      });
      addNode(gx,gy,19,cat.grad,cat.color,grp.title,"hub sub",{id:gid})._hub=grp;
    });
  } else {
    const n=cat.tools.length;
    cat.tools.forEach((tool,i)=>{
      const a=n===1?cat.dir:cat.dir-cat.spread+(2*cat.spread)*(i/(n-1));
      const ring=cat.ring||[-18,22];
      layTool(tool,cat,a,TOOL_R+ring[i%ring.length],hx,hy,hubId,"t-"+cat.key+"-"+i,null);
    });
  }
  addNode(hx,hy,26,cat.grad,cat.color,cat.title,"hub",{id:hubId})._hub=cat;
});

/* pulses */
function lerp(a,b,t){return a+(b-a)*t;}
let last=performance.now();
function tick(now){
  const dt=(now-last)/1000; last=now;
  for(const e of edges){
    e.phase=(e.phase+dt*0.26)%1; const t=e.phase, u=1-t;
    e.pl.setAttribute("cx",(u*u*e.x1+2*u*t*e.qx+t*t*e.x2).toFixed(2));
    e.pl.setAttribute("cy",(u*u*e.y1+2*u*t*e.qy+t*t*e.y2).toFixed(2));
    e.pl.setAttribute("opacity",Math.sin(t*Math.PI).toFixed(3));
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* hover */
gNodes.addEventListener("mouseover",e=>{
  const node=e.target.closest(".node"); if(!node) return;
  const id=node.dataset.id; graph.classList.add("dim"); node.classList.add("hot");
  document.querySelectorAll(".edge").forEach(ed=>{ if(ed.dataset.a===id||ed.dataset.b===id) ed.classList.add("hot"); });
  if(node.classList.contains("hub")){
    const lit=new Set([id]); let grew=true;
    const allEdges=[...document.querySelectorAll(".edge")];
    while(grew){ grew=false; allEdges.forEach(ed=>{ if(lit.has(ed.dataset.a)&&!lit.has(ed.dataset.b)){ lit.add(ed.dataset.b); grew=true; } }); }
    allEdges.forEach(ed=>{ if(lit.has(ed.dataset.a)) ed.classList.add("hot"); });
    lit.forEach(nid=>{ const t=document.querySelector(`.node[data-id="${nid}"]`); if(t) t.classList.add("hot"); });
  }
});
gNodes.addEventListener("mouseout",e=>{
  if(!e.target.closest(".node")) return;
  graph.classList.remove("dim");
  document.querySelectorAll(".node.hot").forEach(n=>n.classList.remove("hot"));
  document.querySelectorAll(".edge.hot").forEach(n=>n.classList.remove("hot"));
});

/* popover */
function openPop(node){
  const tool=node._tool; if(!tool) return; const cat=tool.cat;
  let doors="";
  (tool.doors||[]).forEach(d=>{
    const lab=d.label||(d.k.charAt(0).toUpperCase()+d.k.slice(1));
    doors+=`<a class="door ${d.k}" href="${d.url}" target="_blank" rel="noopener"><span class="d"></span>${lab}</a>`;
  });
  if(!doors) doors=`<div class="none">${tool.note||"No links yet."}</div>`;
  pop.innerHTML=`<div class="cat" style="color:${cat.color}">${cat.title}${tool.sub?" · "+tool.sub:""}</div><h3>${tool.full}</h3><div class="file">${tool.file}</div><div class="doors">${doors}</div>`;
  pop.classList.add("show");
  const r=node.getBoundingClientRect(), pw=pop.offsetWidth, ph=pop.offsetHeight;
  let left=r.left+r.width/2-pw/2; left=Math.max(12,Math.min(left,window.innerWidth-pw-12));
  let top=r.top-ph-14; if(top<66) top=r.bottom+14; top=Math.min(top,window.innerHeight-ph-12);
  pop.style.left=left+"px"; pop.style.top=top+"px";
}
function closePop(){ pop.classList.remove("show"); }
gNodes.addEventListener("click",e=>{
  const tool=e.target.closest(".node.tool");
  if(tool){ e.stopPropagation(); openPop(tool); return; }
  const hub=e.target.closest(".node.hub");
  if(hub){ e.stopPropagation(); closePop(); focusCat(hub._hub); return; }
  const core=e.target.closest(".node.nucleus");
  if(core){ e.stopPropagation(); closePop(); animateFit(); }
});
document.addEventListener("click",e=>{ if(!e.target.closest("#pop")&&!e.target.closest(".node.tool")) closePop(); });
window.addEventListener("keydown",e=>{ if(e.key==="Escape") closePop(); });

/* pan + zoom */
let scale=1,tx=0,ty=0,panning=false,sx=0,sy=0,moved=false,animId=null;
function applyT(){
  viewport.setAttribute("transform",`translate(${tx} ${ty}) scale(${scale})`);
  const lz=Math.min(2.5,Math.max(1,11/(11.5*scale)));
  graph.style.setProperty("--lz",lz.toFixed(3));
}
function fitTarget(){
  const w=window.innerWidth,h=window.innerHeight;
  const s=Math.min(w/1180,h/1020)*0.98;
  return {s, x:w/2-C.x*s, y:h/2-C.y*s};
}
function fit(){ const f=fitTarget(); scale=f.s; tx=f.x; ty=f.y; applyT(); }
function stopAnim(){ if(animId){ cancelAnimationFrame(animId); animId=null; } }
function animateTo(s2,tx2,ty2){
  stopAnim();
  const s1=scale,x1=tx,y1=ty,t0=performance.now(),D=360;
  function step(now){
    const t=Math.min(1,(now-t0)/D), e2=1-Math.pow(1-t,3);
    scale=s1+(s2-s1)*e2; tx=x1+(tx2-x1)*e2; ty=y1+(ty2-y1)*e2; applyT();
    if(t<1) animId=requestAnimationFrame(step); else animId=null;
  }
  animId=requestAnimationFrame(step);
}
function animateFit(){ const f=fitTarget(); animateTo(f.s,f.x,f.y); }
function focusCat(cat){
  if(!cat||!cat._pts) return;
  const pad=135;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  cat._pts.forEach(([px,py])=>{ x0=Math.min(x0,px); y0=Math.min(y0,py); x1=Math.max(x1,px); y1=Math.max(y1,py); });
  x0-=pad; y0-=pad-40; x1+=pad; y1+=pad-40;
  const w=window.innerWidth,h=window.innerHeight;
  const s2=Math.min(w/(x1-x0),(h-120)/(y1-y0),1.7);
  animateTo(s2, w/2-(x0+x1)/2*s2, h/2-(y0+y1)/2*s2);
}
fit();
window.addEventListener("resize",applyT);
graph.addEventListener("pointerdown",e=>{
  if(e.target.closest(".node")) return;
  stopAnim();
  panning=true; moved=false; sx=e.clientX-tx; sy=e.clientY-ty; graph.classList.add("grabbing"); graph.setPointerCapture(e.pointerId);
});
graph.addEventListener("pointermove",e=>{ if(!panning)return; tx=e.clientX-sx; ty=e.clientY-sy; moved=true; applyT(); });
graph.addEventListener("pointerup",e=>{ panning=false; graph.classList.remove("grabbing"); if(!moved&&!e.target.closest(".node")) closePop(); });
graph.addEventListener("wheel",e=>{
  e.preventDefault(); stopAnim();
  const gentle=e.ctrlKey?1.045:1.12;
  const f=e.deltaY<0?gentle:1/gentle;
  const mx=e.clientX,my=e.clientY;
  const nx=(mx-tx)/scale,ny=(my-ty)/scale; scale=Math.max(0.3,Math.min(3,scale*f)); tx=mx-nx*scale; ty=my-ny*scale; applyT(); closePop();
},{passive:false});
function zoomBy(f){ const mx=window.innerWidth/2,my=window.innerHeight/2; const nx=(mx-tx)/scale,ny=(my-ty)/scale;
  const s2=Math.max(0.3,Math.min(3,scale*f)); animateTo(s2,mx-nx*s2,my-ny*s2); }
document.getElementById("zin").onclick=()=>zoomBy(1.3);
document.getElementById("zout").onclick=()=>zoomBy(0.77);
document.getElementById("zreset").onclick=()=>{ animateFit(); closePop(); };

/* double tap or double click to zoom in */
let lastTap=0,lastTapX=0,lastTapY=0;
graph.addEventListener("pointerup",e=>{
  if(e.target.closest(".node")||moved) { lastTap=0; return; }
  const now=performance.now();
  if(now-lastTap<330 && Math.hypot(e.clientX-lastTapX,e.clientY-lastTapY)<30){
    const nx=(e.clientX-tx)/scale, ny=(e.clientY-ty)/scale;
    const s2=Math.min(3,scale*1.8);
    animateTo(s2, e.clientX-nx*s2, e.clientY-ny*s2);
    lastTap=0;
  } else { lastTap=now; lastTapX=e.clientX; lastTapY=e.clientY; }
});

/* pinch */
let pts=new Map(),pinchD=0;
graph.addEventListener("pointerdown",e=>pts.set(e.pointerId,e));
graph.addEventListener("pointermove",e=>{
  if(!pts.has(e.pointerId))return; pts.set(e.pointerId,e);
  if(pts.size===2){ panning=false; const[a,b]=[...pts.values()]; const d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
    if(pinchD){ const mx=(a.clientX+b.clientX)/2,my=(a.clientY+b.clientY)/2; const nx=(mx-tx)/scale,ny=(my-ty)/scale;
      scale=Math.max(0.3,Math.min(3,scale*(d/pinchD))); tx=mx-nx*scale; ty=my-ny*scale; applyT(); } pinchD=d; }
});
function clearPt(e){ pts.delete(e.pointerId); if(pts.size<2) pinchD=0; }
graph.addEventListener("pointerup",clearPt);
graph.addEventListener("pointercancel",clearPt);
</script>
