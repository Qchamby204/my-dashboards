<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#090a12}
body{font-family:'Outfit',system-ui,sans-serif;color:#d7dbf0;
  background:radial-gradient(1200px 700px at 50% -10%,#1c2138 0%,transparent 60%),
  radial-gradient(900px 600px at 90% 10%,#1a1f33 0%,transparent 55%),
  linear-gradient(180deg,#0c0e1a 0%,#090a12 100%);min-height:100vh}
.cinzel{font-family:'Cinzel',serif;letter-spacing:.04em}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:560px;margin:0 auto;
  padding:0 max(16px,env(safe-area-inset-left)) calc(72px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-right))}

/* App chrome. Sits under the Dynamic Island / status bar with a blurred fill so
   content never collides with the clock, signal, wifi or battery. */
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}
.appbar{position:sticky;top:0;z-index:30;
  margin:0 calc(-1 * max(16px,env(safe-area-inset-left))) 12px calc(-1 * max(16px,env(safe-area-inset-right)));
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(16px,env(safe-area-inset-left)) 11px max(16px,env(safe-area-inset-right));
  background:rgba(10,12,22,.86);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid rgba(120,130,180,.13);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.appbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#f3f4fb;letter-spacing:.04em;white-space:nowrap}
.appbar-lvl{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:99px;
  background:rgba(240,183,62,.1);border:1px solid rgba(240,183,62,.3);white-space:nowrap}

.eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:#7c84a8;font-weight:600}
.panel{background:linear-gradient(180deg,rgba(28,32,52,.92),rgba(20,23,38,.92));
  border:1px solid rgba(120,130,180,.16);border-radius:18px;
  box-shadow:0 18px 40px -28px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.04)}
.card{transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer}
.card:hover{transform:translateY(-3px)}
.row{border-radius:11px;transition:background .18s}
.row:hover{background:rgba(255,255,255,.025)}
.tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.btn{transition:transform .12s,filter .18s,box-shadow .18s;cursor:pointer;border:none;font-family:inherit}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px) scale(.99)}
.bartrack{position:relative;border-radius:99px;background:rgba(255,255,255,.07);box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
.fill{height:100%;border-radius:99px;position:relative;overflow:hidden;transition:width .9s cubic-bezier(.2,.8,.2,1)}
.fill::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 30%,rgba(255,255,255,.5) 50%,transparent 70%);transform:translateX(-120%);animation:shimmer 2.8s infinite}
@keyframes shimmer{to{transform:translateX(220%)}}
.tick{position:absolute;top:-2px;bottom:-2px;width:2px;border-radius:2px;background:#f6f1e0;box-shadow:0 0 5px rgba(255,255,255,.6)}
@keyframes pulse{0%,100%{opacity:.85}50%{opacity:1}}
.orb{animation:pulse 3.2s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fadeUp{animation:fadeUp .5s ease both}
@keyframes burst{0%{opacity:0;transform:scale(.7)}18%{opacity:1;transform:scale(1.04)}82%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.02)}}
.levelup{animation:burst .6s ease both}
@keyframes rays{to{transform:rotate(360deg)}}
.scroll-x{overflow-x:auto;scrollbar-width:thin}
.scroll-x::-webkit-scrollbar{height:6px}
.scroll-x::-webkit-scrollbar-thumb{background:rgba(120,130,180,.3);border-radius:9px}
.num{font-family:'Space Mono',monospace;background:transparent;border:none;color:#eef0fb;text-align:center;width:46px;font-size:16px;font-weight:700;outline:none}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
/* Phones: one column. Two 180px cards forced the sub-lines to wrap into ribbons. */
@media(max-width:620px){
  .grid2{grid-template-columns:1fr;gap:10px}
  .grid2>div{grid-column:1 / -1 !important}
}
.overlay{position:fixed;inset:0;z-index:50;display:grid;place-items:center;background:rgba(6,7,14,.78);backdrop-filter:blur(3px);
  padding:calc(env(safe-area-inset-top,0px) + 18px) max(18px,env(safe-area-inset-left)) calc(env(safe-area-inset-bottom,0px) + 18px) max(18px,env(safe-area-inset-right))}
:focus-visible{outline:2px solid rgba(240,183,62,.65);outline-offset:2px}
#deckViewport{cursor:grab}
#deckViewport:active{cursor:grabbing}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
#stars span{position:absolute;border-radius:99px;background:#cfd6f2;opacity:.1;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.07;transform:scale(1)}50%{opacity:.45;transform:scale(1.3)}}
.wrap{position:relative;z-index:1}
.spark{position:absolute;left:50%;top:42%;width:5px;height:5px;border-radius:99px;background:#f6cf6a;box-shadow:0 0 8px rgba(240,183,62,.9);opacity:0;animation:sparkfly 1.05s ease-out .1s forwards;pointer-events:none}

<script>
"use strict";

/* ===================== config ===================== */
var SEASON_START = Date.UTC(2026,6,13);   // Jul 13 2026 — season opens
var SEASON_END   = Date.UTC(2026,11,31);  // Dec 31 2026 — 172 days

/* Season: Jul 13 -> Dec 31 = 172 days (~24.5 weeks, ~110 workdays).
   Goals are sized for a strong-but-human ~75-85% adherence, not perfection. */
var DEFAULT_HCFG = {
  "Read":                {unit:"pages",   kind:"qty",  step:10, def:25, goal:1200, chunk:250, noun:"book",            outcome:"5 books (about 7 pages a day)"},
  "Post Content":        {unit:"pieces",  kind:"qty",  step:1,  def:2,  goal:60,   chunk:3,   noun:"week of content", outcome:"60 pieces (about 2-3 a week)", crit:"Counts when a piece is published live, not just drafted: a posted video or a written post to a platform (LinkedIn, YouTube)."},
  "Communication Drill": {unit:"days",    kind:"count",                  goal:100,  chunk:1,   noun:"drill",           outcome:"100 drills (about 4 a week)", crit:"Ran a rep in the Master Communicator studio: pick a topic, speak on it out loud, and self-score. One drill counts for the day."},
  "Run / Work Out":      {unit:"workouts",kind:"qty",  step:1,  def:1,  goal:90,   chunk:5,   noun:"training week",   outcome:"90 workouts (about 4 a week)", crit:"Counts a completed workout logged in The Forge (any training day)."},
  "Supplements":         {unit:"days",    kind:"count",                  goal:140,  chunk:1,   noun:"day",             outcome:"140 days on the stack (about 6 a week)", crit:"Took the full stack: Creatine, Omega-3, Vitamin B, Vitamin D3 with K2, Magnesium, Zinc, and a probiotic or fiber. One tap confirms the whole stack. Missing a day is fine, the goal has room for it."},
  "Sleep":               {unit:"hours",   kind:"qty",  step:0.5,def:7.5,goal:1100, chunk:49,  noun:"rested week",     outcome:"1,100 hours (about 6.5 a night)"},
  "Chambers Wealth":     {unit:"days",    kind:"count",                  goal:90,   chunk:5,   noun:"work week",       outcome:"90 days running the cadence (about 4 a week)", crit:"Cleared the Operations Command Centre task log for the day, and checked your daily, weekly, and monthly cadences. One tap once the log is clear and the tiers are checked."},
  "Prospecting":         {unit:"touches", kind:"qty",  step:1,  def:5,  goal:400,  chunk:25,  noun:"prospecting touch",outcome:"400 touches (about 5 on a working day)", crit:"Dedicated LinkedIn outbound: new connection requests, follow-up messages, and genuine engagement. Aim for 5 on a working day. Wins (qualified prospects, new clients) are tracked under Outcomes."},
  "Prep For Next Day":   {unit:"nights",  kind:"count",                  goal:120,  chunk:1,   noun:"night",           outcome:"120 nights prepped (about 5 a week)", crit:"Set tomorrow up the night before: top priorities identified, calendar checked, first task queued."},
  "Household Chore":     {unit:"chores",  kind:"qty",  step:1,  def:1,  goal:100,  chunk:1,   noun:"chore",           outcome:"100 chores handled"},
  "Money Check-In":      {unit:"days",    kind:"count",                  goal:120,  chunk:1,   noun:"check-in",        outcome:"120 check-ins (about 5 a week)", crit:"Not just glancing at balances. Run the loop: 1) review yesterday's transactions across TD, RBC, and Scotia; 2) categorize or flag each against your plan; 3) check the day's spend versus target; 4) take one improving action: move a surplus, kill a fee, or note a variance to fix. This feeds your Payday Playbook."},
  "Screen Discipline":   {unit:"days",    kind:"count",                  goal:120,  chunk:1,   noun:"clean day",       outcome:"120 days under an hour (about 5 a week)", crit:"Kept social media and video games under 1 hour combined for the day. Tap to confirm you stayed under. Work, content creation, and reading don't count against it."},
  "Board Work":          {unit:"minutes", kind:"qty",  step:15, def:30, goal:1500, chunk:60,  noun:"hour on the boards",outcome:"25 hours of board service", crit:"Board service across BizforClimate and United Way: meetings, governance prep, and follow-through. Log the minutes you actually spend."},
  "Walk Hud":            {unit:"miles",   kind:"qty",  step:0.5,def:1.5,goal:150,  chunk:26.2,noun:"marathon w/ Hudson",outcome:"150 miles, nearly 6 marathons with Hudson"}
};

var DEFAULT_HABITS = ["Read","Post Content","Communication Drill","Run / Work Out","Supplements","Sleep",
  "Chambers Wealth","Prospecting",
  "Prep For Next Day","Household Chore","Money Check-In","Screen Discipline",
  "Board Work","Walk Hud"];

var DEFAULT_PILLARS = [
  {key:"HEALTH",     title:"Health",     sub:"Strongest, best-rested year",  color:"#2fd180", glow:"rgba(47,209,128,.55)", deep:"#0f3526", icon:"vit", habits:["Run / Work Out","Supplements","Sleep"]},
  {key:"GROWTH",     title:"Growth",     sub:"A demonstrably sharper mind",  color:"#9d7bff", glow:"rgba(157,123,255,.55)",deep:"#241a45", icon:"int", habits:["Read","Post Content","Communication Drill"]},
  {key:"WEALTH",     title:"Wealth",     sub:"The practice that compounds",  color:"#f0b73e", glow:"rgba(240,183,62,.55)", deep:"#3a2c0c", icon:"for", habits:["Chambers Wealth","Prospecting"]},
  {key:"DISCIPLINE", title:"Discipline", sub:"Life & finances on rails",     color:"#4ea3e0", glow:"rgba(78,163,224,.55)", deep:"#0f2a40", icon:"dis", habits:["Prep For Next Day","Household Chore","Money Check-In","Screen Discipline"]},
  {key:"CONNECTION", title:"Connection", sub:"Present for what matters",     color:"#f0628a", glow:"rgba(240,98,138,.55)", deep:"#3a1422", icon:"leg", habits:["Board Work","Walk Hud"]}
];
/* effective config (HCFG/HABITS/PILLARS/HABIT_PILLAR/SHORT) is built by rebuildModel() below */

var DEFAULT_SHORT = {"Run / Work Out":"Workouts Complete","Walk Hud":"Walk Hudson",
  "Prep For Next Day":"Prep Tomorrow","Money Check-In":"Money Check-In",
  "Communication Drill":"Comm Drill","Screen Discipline":"Under 1 Hour"};
var HCFG, HABITS, PILLARS, HABIT_PILLAR, SHORT;
var userModel = {renames:{},moves:{},hidden:{},added:[],crit:{}};
function cloneObj(o){ return JSON.parse(JSON.stringify(o)); }
function rebuildModel(){
  HCFG = cloneObj(DEFAULT_HCFG);
  SHORT = cloneObj(DEFAULT_SHORT);
  (userModel.added||[]).forEach(function(a){
    if(!a||!a.key) return;
    HCFG[a.key]={unit:a.unit||"reps",kind:(a.kind==="count"?"count":"qty"),step:a.step||1,def:a.def||1,goal:a.goal||100,chunk:a.chunk||1,noun:a.noun||"unit",outcome:a.outcome||("Goal: "+(a.goal||100)+" "+(a.unit||"reps")),crit:a.crit||""};
    if(a.label) SHORT[a.key]=a.label;
  });
  var crits=userModel.crit||{};
  Object.keys(crits).forEach(function(hk){ if(HCFG[hk]) HCFG[hk].crit=crits[hk]; });
  Object.keys(userModel.renames||{}).forEach(function(k){ if(userModel.renames[k]) SHORT[k]=userModel.renames[k]; });
  PILLARS = cloneObj(DEFAULT_PILLARS);
  var hidden=userModel.hidden||{}, moves=userModel.moves||{};
  PILLARS.forEach(function(p){ p.habits=p.habits.filter(function(h){ if(hidden[h]) return false; if(moves[h] && moves[h]!==p.key) return false; return true; }); });
  function pById(pk){ for(var i=0;i<PILLARS.length;i++){ if(PILLARS[i].key===pk) return PILLARS[i]; } return null; }
  function addTo(pk,h){ var p=pById(pk)||PILLARS[0]; if(p.habits.indexOf(h)<0) p.habits.push(h); }
  Object.keys(moves).forEach(function(h){ if(hidden[h]) return; if(DEFAULT_HCFG[h]) addTo(moves[h],h); });
  (userModel.added||[]).forEach(function(a){ if(!a||!a.key||hidden[a.key]) return; addTo(moves[a.key]||a.pillar||PILLARS[0].key, a.key); });
  HABITS=[]; PILLARS.forEach(function(p){ p.habits.forEach(function(h){ if(HABITS.indexOf(h)<0) HABITS.push(h); }); });
  HABIT_PILLAR={}; PILLARS.forEach(function(p){ p.habits.forEach(function(h){ HABIT_PILLAR[h]=p; }); });
}
rebuildModel();
function label(h){ return SHORT[h]||h; }
function fmt(n){ return (Math.round(n*10)/10).toString(); }
function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function fmtDay(iso){ if(!iso) return ""; var p=iso.split("-"); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function plural(noun,n){ if(n===1) return noun; return noun.indexOf(" ")>=0 ? noun.replace(/^(\w+)/,"$1s") : noun+"s"; }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function singular(u){ u=String(u||""); return /(ss|ch|sh|x)es$/.test(u)?u.replace(/es$/,""):u.replace(/s$/,""); }
var LEGACY_MERGE={"BizforClimate":"Board Work","United Way":"Board Work"};
function migrateUnits(d){ if(!d.units) return; Object.keys(LEGACY_MERGE).forEach(function(k){ if(d.units[k]>0){ var t=LEGACY_MERGE[k]; d.units[t]=(d.units[t]||0)+d.units[k]; } if(k in d.units) delete d.units[k]; }); if(d.units["Run / Work Out"]>=10){ d.units["Run / Work Out"]=1; } }
function normalizeDays(list){ var ds=list.slice(); ds.sort(function(a,b){ if(!a.date&&!b.date) return 0; if(!a.date) return -1; if(!b.date) return 1; return a.date<b.date?-1:a.date>b.date?1:0; }); ds.forEach(function(d,i){ d.day=i+1; migrateUnits(d); }); return ds; }

/* ===================== storage (works in Claude artifact OR saved locally) ===================== */
var mem = {};
var store = {
  get: function(k){
    return new Promise(function(res){
      try {
        if (typeof window!=="undefined" && window.storage && window.storage.get) {
          window.storage.get(k).then(function(r){ res(r && r.value!=null ? r.value : null); }).catch(function(){ res(null); });
          return;
        }
        res(localStorage.getItem(k));
      } catch(e){ res(mem[k]!=null?mem[k]:null); }
    });
  },
  set: function(k,v){
    try {
      if (typeof window!=="undefined" && window.storage && window.storage.set) { window.storage.set(k,v); return; }
      localStorage.setItem(k,v);
    } catch(e){ mem[k]=v; }
  }
};

/* ===================== compute ===================== */
function trailingStreak(days,h){ var s=0; for(var i=days.length-1;i>=0;i--){ if((days[i].units[h]||0)>0) s++; else break; } return s; }
function isoToNum(iso){ var p=iso.split("-"); return Date.UTC(+p[0],+p[1]-1,+p[2]); }
function numToISO(ms){ var d=new Date(ms); return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0"); }
function dateMap(days){ var m={}; days.forEach(function(d){ if(!d.date) return; if(!m[d.date]) m[d.date]={}; HABITS.forEach(function(h){ if((d.units[h]||0)>0) m[d.date][h]=true; }); }); var out={}; Object.keys(m).forEach(function(k){ out[k]=Object.keys(m[k]).length; }); return out; }
function streaksFrom(dm){
  var dates=Object.keys(dm).filter(function(k){return dm[k]>0;}).sort();
  if(!dates.length) return {current:0,longest:0};
  var longest=1,run=1;
  for(var i=1;i<dates.length;i++){ if(isoToNum(dates[i])-isoToNum(dates[i-1])===86400000){ run++; if(run>longest)longest=run; } else run=1; }
  var set={}; dates.forEach(function(d){ set[isoToNum(d)]=true; });
  var cursor=isoToNum(todayISO()); if(!set[cursor]) cursor-=86400000;
  var cur=0; while(set[cursor]){ cur++; cursor-=86400000; }
  return {current:cur,longest:Math.max(longest,cur)};
}

function compute(days,goals){
  function gget(h){ return (goals && goals[h]!=null && goals[h]>0) ? goals[h] : HCFG[h].goal; }
  var now=Date.now();
  var elapsed=Math.max(0,Math.min(1,(now-SEASON_START)/(SEASON_END-SEASON_START)));
  var expectedLevel=elapsed*99;
  var daysLeft=Math.max(0,Math.ceil((SEASON_END-now)/86400000));

  var habit={};
  var allKeys=HABITS.slice();
  Object.keys(DEFAULT_HCFG).forEach(function(h){ if(allKeys.indexOf(h)<0) allKeys.push(h); });
  allKeys.forEach(function(h){
    var c=HCFG[h]||DEFAULT_HCFG[h], g=gget(h), total=0, doneDays=0;
    days.forEach(function(d){ var v=d.units[h]||0; total+=v; if(v>0) doneDays++; });
    var exact=Math.min(99,(total/g)*99);
    habit[h]={key:h,cfg:c,goal:g,total:total,doneDays:doneDays,exact:exact,level:Math.floor(exact),
      pctTo99:exact/99, onPace:exact>=expectedLevel-0.01,
      chunksDone:Math.floor(total/c.chunk), goalChunks:Math.round(g/c.chunk),
      streak:trailingStreak(days,h)};
  });

  var canForecast = elapsed>0.03 && days.length>=2;
  var pillars=PILLARS.map(function(p){
    var exact=p.habits.reduce(function(s,h){return s+habit[h].exact;},0)/p.habits.length;
    return {key:p.key,title:p.title,sub:p.sub,color:p.color,glow:p.glow,deep:p.deep,icon:p.icon,habits:p.habits,
      exact:exact,level:Math.floor(exact),pctTo99:exact/99,onPace:exact>=expectedLevel-0.01,
      proj: canForecast?Math.min(99,exact/elapsed):null};
  });
  var lifeExact=pillars.reduce(function(s,p){return s+p.exact;},0)/pillars.length;
  var life={exact:lifeExact,level:Math.floor(lifeExact),pctTo99:lifeExact/99,onPace:lifeExact>=expectedLevel-0.01,
    proj: canForecast?Math.min(99,lifeExact/elapsed):null};

  var sorted=pillars.slice().sort(function(a,b){return b.exact-a.exact;});
  var balanced=sorted[0].exact-sorted[sorted.length-1].exact<=6;
  var identity=balanced?"Everything Connected":("Led by "+sorted[0].title);

  var running={}; HABITS.forEach(function(h){running[h]=0;});
  var history=days.map(function(d){
    var done=0; HABITS.forEach(function(h){ var v=d.units[h]||0; if(v>0)done++; running[h]+=v; });
    var pex=PILLARS.map(function(p){ return p.habits.reduce(function(s,h){return s+Math.min(99,running[h]/habit[h].goal*99);},0)/p.habits.length; });
    var lvl=pex.reduce(function(s,x){return s+x;},0)/pex.length;
    return {day:d.day,done:done,life:lvl};
  });

  var consistency=days.length?days.reduce(function(s,d){var c=0;HABITS.forEach(function(h){if((d.units[h]||0)>0)c++;});return s+c/(HABITS.length||1);},0)/days.length:0;
  var active=0;
  for(var i=days.length-1;i>=0;i--){ var c=0; HABITS.forEach(function(h){if((days[i].units[h]||0)>0)c++;}); if(c>=1)active++; else break; }

  var dm=dateMap(days);
  var stk=streaksFrom(dm);
  var actDates=Object.keys(dm).filter(function(k){return dm[k]>0;});
  var bestDay={count:0,date:null}; actDates.forEach(function(k){ if(dm[k]>bestDay.count) bestDay={count:dm[k],date:k}; });

  return {habit:habit,pillars:pillars,life:life,identity:identity,balanced:balanced,history:history,days:days,
    consistency:consistency,active:active,expectedLevel:expectedLevel,daysLeft:daysLeft,elapsed:elapsed,canForecast:canForecast,lead:sorted[0],
    dateMap:dm,streak:stk,bestDay:bestDay,activeDays:actDates.length};
}

/* ===================== relics ===================== */
function pl(d,k){ for(var i=0;i<d.pillars.length;i++){ if(d.pillars[i].key===k) return d.pillars[i]; } return {level:0,onPace:false}; }
var ACHV=[

  {cat:"Milestones",name:"Servant Leader",  desc:"25 hours of board service", icon:"\u265a", test:function(d){return d.habit["Board Work"].total>=1500;}},

  {cat:"Milestones",name:"Well Spoken",     desc:"25 communication drills",   icon:"\u2665", test:function(d){return d.habit["Communication Drill"].total>=25;}},
  {cat:"Milestones",name:"Master Communicator",desc:"75 communication drills",icon:"\u2764", test:function(d){return d.habit["Communication Drill"].total>=75;}},
  // ---- Mastery (levels) ----
  {cat:"Mastery",name:"Double Digits",   desc:"Reach Life Level 10",   icon:"\u2469", test:function(d){return d.life.level>=10;}},
  {cat:"Mastery",name:"Quarter Master",  desc:"Reach Life Level 25",   icon:"\u24f5", test:function(d){return d.life.level>=25;}},

  {cat:"Consistency",name:"Season Opens", desc:"Log your first day",        icon:"\u2605", test:function(d){return d.days.length>=1;}},
  {cat:"Consistency",name:"Locked In",    desc:"Log 7 days",                icon:"\u2606", test:function(d){return d.days.length>=7;}},

  {cat:"Consistency",name:"Perfect Day",   desc:"Log every habit in a day",icon:"\u272b",test:function(d){return d.days.some(function(day){return HABITS.every(function(h){return (day.units[h]||0)>0;});});}},
  // ---- Legendary ----
  {cat:"Legendary",name:"Ahead of Pace",  desc:"Life Level above the target line",   icon:"\u27a4", test:function(d){return d.life.onPace && d.days.length>=3;}},
  {cat:"Legendary",name:"Five for Five",  desc:"All five pillars on pace",           icon:"\u2737", test:function(d){return d.days.length>=3 && d.pillars.every(function(p){return p.onPace;});}},

/* ===================== the oracle (insight engine) ===================== */
function oracleInsights(data){
  var days=data.days.filter(function(d){return d.date;});
  var out=[];
  if(days.length<5) return out;
  function doneCount(d){ var c=0; HABITS.forEach(function(h){ if((d.units[h]||0)>0) c++; }); return c; }
  var t=isoToNum(todayISO());
  // 1 · strongest / weakest weekday
  var wd=[[],[],[],[],[],[],[]];
  days.forEach(function(d){ var p=d.date.split("-"); var dw=new Date(+p[0],+p[1]-1,+p[2]).getDay(); wd[dw].push(doneCount(d)); });
  var names=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var bestI=-1,bestAvg=-1,worstI=-1,worstAvg=1e9;
  wd.forEach(function(a,i){ if(a.length>=2){ var avg=a.reduce(function(s,x){return s+x;},0)/a.length; if(avg>bestAvg){bestAvg=avg;bestI=i;} if(avg<worstAvg){worstAvg=avg;worstI=i;} } });
  if(bestI>=0&&worstI>=0&&bestI!==worstI&&bestAvg-worstAvg>=1)
    out.push({icon:"☀",title:names[bestI]+" is your power day",body:"You average "+fmt(bestAvg)+" habits on "+names[bestI]+"s — your peak — against "+fmt(worstAvg)+" on "+names[worstI]+"s, your softest day. Guard the strong day; shore up the weak one."});
  // 2 · keystone habit
  var bestH=null,bestGap=0,bestWith=0,bestWithout=0;
  HABITS.forEach(function(h){
    var w=[],wo=[];
    days.forEach(function(d){ (((d.units[h]||0)>0)?w:wo).push(doneCount(d)); });
    if(w.length>=3&&wo.length>=3){
      var aw=w.reduce(function(s,x){return s+x;},0)/w.length, awo=wo.reduce(function(s,x){return s+x;},0)/wo.length;
      if(aw-awo>bestGap){ bestGap=aw-awo; bestH=h; bestWith=aw; bestWithout=awo; }
    }
  });
  if(bestH&&bestGap>=1.5)
    out.push({icon:"⛩",title:esc(label(bestH))+" is your keystone",body:"Days you log it average <b>"+fmt(bestWith)+"</b> habits; days you don’t, just "+fmt(bestWithout)+". It pulls the whole day up — do it first."});
  // 3 · power pair (co-occurrence lift)
  var act={}; HABITS.forEach(function(h){ act[h]=days.filter(function(d){return (d.units[h]||0)>0;}).length; });
  var bp=null,bl=0;
  for(var i=0;i<HABITS.length;i++) for(var j=i+1;j<HABITS.length;j++){
    (function(a,b){
      if(act[a]<3||act[b]<3||act[a]>days.length-2||act[b]>days.length-2) return;
      var both=days.filter(function(d){return (d.units[a]||0)>0&&(d.units[b]||0)>0;}).length;
      if(both<3) return;
      var lift=(both*days.length)/(act[a]*act[b]);
      if(lift>bl){ bl=lift; bp=[a,b]; }
    })(HABITS[i],HABITS[j]);
  }
  if(bp&&bl>=1.3)
    out.push({icon:"⚭",title:esc(label(bp[0]))+" + "+esc(label(bp[1]))+" travel together",body:"They land on the same day <b>"+fmt(bl)+"×</b> more often than chance. That’s a natural ritual — chain them on purpose."});
  // 4 · 14-day momentum vs season average
  var dm=data.dateMap, r14=0;
  for(var k=0;k<14;k++){ r14+=dm[numToISO(t-k*86400000)]||0; }
  var per14=r14/14;
  var seasonDays=Math.max(1,Math.round((Math.min(Date.now(),SEASON_END)-SEASON_START)/86400000));
  var totalLogs=0; Object.keys(dm).forEach(function(kk){ totalLogs+=dm[kk]; });
  var perSeason=totalLogs/seasonDays;
  if(perSeason>0&&days.length>=10){
    var ratio=per14/perSeason;
    if(ratio>=1.15) out.push({icon:"↑",title:"You’re heating up",body:"Your last 14 days run <b>"+Math.round((ratio-1)*100)+"% above</b> your season average. This is exactly the pace that maxes the year — protect it."});
    else if(ratio<=0.85) out.push({icon:"↓",title:"The fire is dimming",body:"Your last 14 days sit "+Math.round((1-ratio)*100)+"% below your season average. One strong day turns a drift into a comeback."});
  }
  // 4.5 · mood correlation
  var moodDays=days.filter(function(d){return d.mood>0;});
  if(moodDays.length>=5){
    var bmH=null,bmGap=0,bmW=0,bmWo=0;
    HABITS.forEach(function(hh){
      var w3=[],wo3=[];
      moodDays.forEach(function(d3){ (((d3.units[hh]||0)>0)?w3:wo3).push(d3.mood); });
      if(w3.length>=3&&wo3.length>=3){
        var a3=w3.reduce(function(s,x3){return s+x3;},0)/w3.length, a4=wo3.reduce(function(s,x4){return s+x4;},0)/wo3.length;
        if(a3-a4>bmGap){ bmGap=a3-a4; bmH=hh; bmW=a3; bmWo=a4; }
      }
    });
    if(bmH&&bmGap>=0.6) out.push({icon:"☺",title:esc(label(bmH))+" days simply feel better",body:"Your mood averages <b>"+fmt(bmW)+"/5</b> on days you log it, versus "+fmt(bmWo)+" when you skip it. Do it for the feeling — the level is a bonus."});
  }
  // 5 · longest-forgotten habit
  var oldH=null,oldGap=-1;
  HABITS.forEach(function(h){
    var lastD=null;
    days.forEach(function(d){ if((d.units[h]||0)>0){ if(!lastD||d.date>lastD) lastD=d.date; } });
    if(lastD){ var gap=Math.floor((t-isoToNum(lastD))/86400000); if(gap>oldGap){ oldGap=gap; oldH=h; } }
  });
  if(oldH&&oldGap>=7)
    out.push({icon:"⏳",title:esc(label(oldH))+" awaits",body:"No sign of it for <b>"+oldGap+" days</b>. Even the smallest entry keeps the thread alive — and it’s dragging its pillar."});
  // 6 · projection callback
  if(data.canForecast&&data.life.proj!=null){
    var pr=Math.round(data.life.proj);
    if(pr>=99) out.push({icon:"♕",title:"The Oracle sees Level 99",body:"At your current rate, every value maxes before Dec 31. The prophecy holds as long as you do."});
    else out.push({icon:"☉",title:"The season ends at Level "+pr,body:"That’s the year-end reading at today’s pace — "+(99-pr)+" levels shy. The Pace Coach shows exactly which habits close the gap."});
  }
  return out;
}

/* ===================== persistence ===================== */
var KEY="lifeledger:v2";
var GOALKEY="lifeledger:goals:v2";
var MODELKEY="lifeledger:model:v1";
var METRICKEY="lifeledger:metrics:v1";
function save(){ store.set(KEY,JSON.stringify(state.days)); }
function saveGoals(){ store.set(GOALKEY,JSON.stringify(state.goals)); }
function saveModel(){ store.set(MODELKEY,JSON.stringify(userModel)); }
function saveMetrics(){ store.set(METRICKEY,JSON.stringify(state.metrics)); }
function slug(s){ return (String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"").slice(0,24))||"habit"; }

/* ===================== actions ===================== */
function commit(){
  var filledN=HABITS.filter(function(h){return (state.draft[h]||0)>0;}).length;
  if(filledN===0 && !window.confirm("Nothing is logged yet \u2014 save an empty day anyway?")) return;
  var before=compute(state.days,state.goals);
  var snapshot=JSON.stringify(state.days);
  var date=state.logDate||todayISO();
  var units={}; HABITS.forEach(function(h){units[h]=state.draft[h]||0;});
  var existing=null;
  for(var i=0;i<state.days.length;i++){ if(state.days[i].date===date){ existing=state.days[i]; break; } }
  var merged=!!existing;
  var noteTxt=(state.draftNote||"").trim();
  if(existing){
    Object.keys(units).forEach(function(h){ if(units[h]>0) existing.units[h]=(existing.units[h]||0)+units[h]; });
    if(state.draftMood) existing.mood=state.draftMood;
    if(noteTxt) existing.note=noteTxt;
  }
  else {
    var entry={date:date,units:units};
    if(state.draftMood) entry.mood=state.draftMood;
    if(noteTxt) entry.note=noteTxt;
    state.days=state.days.concat([entry]);
  }
  state.days=normalizeDays(state.days);
  var after=compute(state.days,state.goals);
  state.draft=freshDraft();
  state.draftMood=0; state.draftNote="";
  state.logDate=todayISO();
  state.cardIndex=0;
  state.lastUndo=snapshot;
  save();
  if(navigator.vibrate){ try{ navigator.vibrate(12); }catch(e){} }

  var perfect=HABITS.length>0 && HABITS.every(function(h){return units[h]>0;});
  if(after.life.level>=99 && before.life.level<99){
    state.levelInfo={kicker:"Season Complete",title:"Life Level 99",detail:"You maxed every value before the year was out. Everything connected."};
  } else if(perfect){
    state.levelInfo={kicker:"Perfect Day",title:"Every habit. One day.",detail:"All "+HABITS.length+" habits logged for "+fmtDay(date)+" \u2014 the rarest kind of day."};
  } else if(after.life.level>before.life.level){
    state.levelInfo={kicker:"Level Up",title:"Life Level "+after.life.level,detail:after.life.onPace?"Ahead of pace for a maxed year.":"Keep stacking days to catch the pace line."};
  } else {
    var hk=HABITS.filter(function(k){return after.habit[k].chunksDone>before.habit[k].chunksDone;})[0];
    if(hk){ var hb=after.habit[hk]; state.levelInfo={kicker:"Outcome Reached",title:hb.chunksDone+" "+plural(hb.cfg.noun,hb.chunksDone),detail:label(hk)+" \u2014 goal is "+hb.cfg.outcome+"."}; }
  }
  render();
  window.scrollTo({top:0,behavior:"smooth"});

  var fresh=ACHV.filter(function(a){ return a.test(after) && !a.test(before); });
  state.achvQueue=fresh.slice();
  if(fresh.length){ render(); if(navigator.vibrate){ try{ navigator.vibrate([12,60,18]); }catch(e){} } }
  else if(after.streak.longest>before.streak.longest && after.streak.current===after.streak.longest && after.streak.current>=2) toast("\ud83d\udd25 New longest streak: "+after.streak.current+" days!");
  else if(after.bestDay.count>before.bestDay.count && after.bestDay.count>=5) toast("\u2b50 Best day yet: "+after.bestDay.count+" habits logged!");
  else toast(merged?("\u269c Added to "+fmtDay(date)):("\u269c "+fmtDay(date)+" saved"),"Undo",undoLast);
}
function undoLast(){
  if(!state.lastUndo) return;
  try{ state.days=JSON.parse(state.lastUndo); }catch(e){ return; }
  state.lastUndo=null;
  save(); render(); toast("\u21ba Last save undone");
}

function goCard(idx){
  var n=Math.max(1,HABITS.length); idx=Math.max(0,Math.min(n-1,idx)); state.cardIndex=idx;
  var track=document.getElementById("deckTrack");
  if(track){ track.style.transition="transform .28s cubic-bezier(.22,.61,.36,1)"; track.style.transform="translateX(-"+(idx*100)+"%)"; }
  updateDeckChrome(idx,n);
}
function updateDeckChrome(idx,n){
  var c=document.getElementById("deckCounter"); if(c) c.textContent=(idx+1)+" / "+n;
  var b=document.getElementById("deckBar"); if(b) b.style.width=((idx+1)/n*100).toFixed(1)+"%";
  var pv=document.getElementById("deckPrev"); if(pv) pv.style.opacity=idx===0?".35":"1";
  var nx=document.getElementById("deckNext"); if(nx){ nx.style.opacity=idx===n-1?".35":"1"; nx.textContent=idx===n-1?"You\u2019re at the end":"Next \u203a"; }
}
var deckDrag=null;
app.addEventListener("touchstart",function(e){
  var vp=e.target.closest&&e.target.closest("#deckViewport"); if(!vp) return;
  if(e.target.closest("button,input")){ deckDrag=null; return; }
  var track=document.getElementById("deckTrack"); if(!track) return;
  deckDrag={x:e.touches[0].clientX,y:e.touches[0].clientY,vw:vp.clientWidth,track:track,idx:state.cardIndex,horiz:false,decided:false};
  track.style.transition="none";
},{passive:true});
app.addEventListener("touchmove",function(e){
  if(!deckDrag) return;
  var dx=e.touches[0].clientX-deckDrag.x, dy=e.touches[0].clientY-deckDrag.y;
  if(!deckDrag.decided){ if(Math.abs(dx)>8||Math.abs(dy)>8){ deckDrag.decided=true; deckDrag.horiz=Math.abs(dx)>Math.abs(dy); } }
  if(deckDrag.horiz){ var base=-deckDrag.idx*deckDrag.vw; var off=dx; if((deckDrag.idx===0&&dx>0)||(deckDrag.idx===HABITS.length-1&&dx<0)) off=dx*0.32; deckDrag.track.style.transform="translateX("+(base+off)+"px)"; }
},{passive:true});
app.addEventListener("touchend",function(e){
  if(!deckDrag) return; var d=deckDrag; deckDrag=null;
  if(!d.horiz){ d.track.style.transition="transform .28s cubic-bezier(.22,.61,.36,1)"; d.track.style.transform="translateX(-"+(d.idx*100)+"%)"; return; }
  var dx=e.changedTouches[0].clientX-d.x, n=HABITS.length, idx=d.idx;
  if(dx<-d.vw*0.18&&idx<n-1) idx++; else if(dx>d.vw*0.18&&idx>0) idx--;
  state.cardIndex=idx;
  d.track.style.transition="transform .28s cubic-bezier(.22,.61,.36,1)"; d.track.style.transform="translateX(-"+(idx*100)+"%)";
  updateDeckChrome(idx,n);
},{passive:true});

document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){
    if(state.levelInfo||state.settingsOpen||state.habitsOpen||state.metricsOpen||state.cardOpen){
      state.levelInfo=null;
      if(state.settingsOpen){ state.settingsOpen=false; saveGoals(); }
      if(state.habitsOpen){ state.habitsOpen=false; saveModel(); rebuildModel(); }
      if(state.metricsOpen){ state.metricsOpen=false; saveMetrics(); }
      if(state.cardOpen){ state.cardOpen=false; }
      render();
    }
    return;
  }
  if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
    var ae=document.activeElement;
    if(ae && /^(INPUT|SELECT|TEXTAREA)$/.test(ae.tagName)) return;
    if(state.logMode==="list") return;
    if(!document.getElementById("deckTrack")) return;
    goCard(state.cardIndex+(e.key==="ArrowRight"?1:-1));
    e.preventDefault();
  }
});
app.addEventListener("mousedown",function(e){

document.addEventListener("mousemove",function(e){

  if(deckDrag.horiz){ var base=-deckDrag.idx*deckDrag.vw; var off=dx; if((deckDrag.idx===0&&dx>0)||(deckDrag.idx===HABITS.length-1&&dx<0)) off=dx*0.32; deckDrag.track.style.transform="translateX("+(base+off)+"px)"; }
});
document.addEventListener("mouseup",function(e){

app.addEventListener("input",function(e){

});
app.addEventListener("click",function(e){
  if(e.target.classList && e.target.classList.contains("overlay") && !e.target.dataset.act){
    if(state.settingsOpen){ state.settingsOpen=false; saveGoals(); render(); return; }
    if(state.habitsOpen){ state.habitsOpen=false; saveModel(); rebuildModel(); render(); return; }
    if(state.metricsOpen){ state.metricsOpen=false; saveMetrics(); render(); return; }
    if(state.cardOpen){ state.cardOpen=false; render(); return; }
  }
  var el=e.target.closest("[data-act]");
  if(!el) return;
  var act=el.dataset.act, habit=el.dataset.habit, key=el.dataset.key, id=el.dataset.id;
  if(act==="num"||act==="goal") return; // handled on change
  if(act==="pillar"){ state.openP = state.openP===key?null:key; state.active=key; render(); }
  else if(act==="node"){ state.active=key; state.openP=key; render(); var c=document.querySelector('[data-act="pillar"][data-key="'+key+'"]'); if(c) c.scrollIntoView({behavior:"smooth",block:"center"}); }
  else if(act==="toggle"){ var on=!(state.draft[habit]>0); state.draft[habit]=on?1:0; if(on&&navigator.vibrate){ try{ navigator.vibrate(8); }catch(e2){} } if(on && state.logMode!=="list" && HABITS[state.cardIndex]===habit && state.cardIndex<HABITS.length-1){ state.cardIndex++; } render(); }
  else if(act==="inc"){ var ci=HCFG[habit]; state.draft[habit]=Math.round(((state.draft[habit]||0)+ci.step)*10)/10; render(); }
  else if(act==="dec"){ var cd=HCFG[habit]; state.draft[habit]=Math.max(0,Math.round(((state.draft[habit]||0)-cd.step)*10)/10); render(); }
  else if(act==="mood"){ var mval2=+el.dataset.v; state.draftMood=(state.draftMood===mval2)?0:mval2; render(); }
  else if(act==="clear"){ state.draft=freshDraft(); state.draftMood=0; state.draftNote=""; render(); }
  else if(act==="commit"){ commit(); }
  else if(act==="logmode"){ state.logMode=el.dataset.mode; render(); }
  else if(act==="cardprev"){ goCard(state.cardIndex-1); }
  else if(act==="cardnext"){ goCard(state.cardIndex+1); }
  else if(act==="section"){ if(!state.openSections) state.openSections={}; state.openSections[key]=!state.openSections[key]; render(); }
  else if(act==="hinfo"){ state.infoHabit=(state.infoHabit===habit)?null:habit; render(); }
  else if(act==="achvNext"){ (state.achvQueue||[]).shift(); if(!(state.achvQueue||[]).length) state.achvReview=false; render(); }
  else if(act==="relic"){ var ri=+el.dataset.idx; if(!isNaN(ri)&&ACHV[ri]){ state.achvQueue=[ACHV[ri]]; state.achvReview=true; render(); } }
  else if(act==="achvAll"){ state.achvQueue=[]; state.achvReview=false; if(!state.openSections) state.openSections={}; state.openSections.relics=true; render(); var rc=document.querySelector('[data-act="section"][data-key="relics"]'); if(rc) rc.scrollIntoView({behavior:"smooth",block:"start"}); }
  else if(act==="reset"){ if(state.days.length===0 || window.confirm("Reset the season? This clears all logged days. (Export a backup first if you want to keep it.)")){ state.days=[]; state.draft=freshDraft(); state.openP=null; save(); render(); } }
  else if(act==="closeLevel"){ state.levelInfo=null; render(); }
  else if(act==="settings"){ state.settingsOpen=true; render(); }
  else if(act==="closeSettings"){ state.settingsOpen=false; saveGoals(); render(); }
  else if(act==="resetGoals"){ state.goals={}; saveGoals(); render(); }

    else { var m=(state.metrics||[]).filter(function(x){return x.id===id;})[0]; if(m){ if(!m.readings)m.readings=[]; m.readings.push({date:md.date||todayISO(),value:v}); m.readings.sort(function(a,b){return (a.date<b.date?-1:a.date>b.date?1:0);}); state.metricDraft[id]={value:"",date:todayISO()}; saveMetrics(); render(); toast("\u2713 Logged "+m.name+": "+v+" "+m.unit); } }

    try{
      var cv2=document.getElementById("seasonCard");
      var a2=document.createElement("a"); a2.download="life-ledger-season-"+todayISO()+".png"; a2.href=cv2.toDataURL("image/png");
      document.body.appendChild(a2); a2.click(); document.body.removeChild(a2);
      toast("Season Card saved \u2713");
    }catch(e3){ toast("Couldn\u2019t render the card in this browser"); }
  }
  else if(act==="export"){ exportData(); }
  else if(act==="import"){ var f=document.getElementById("importFile"); if(f) f.click(); }
});
app.addEventListener("change",function(e){
  var mv=e.target.closest('[data-act="mval"]');
  if(mv){ var id=mv.dataset.id; if(!state.metricDraft[id]) state.metricDraft[id]={value:"",date:todayISO()}; state.metricDraft[id].value=mv.value; return; }
  var mdt=e.target.closest('[data-act="mdate"]');
  if(mdt){ var id2=mdt.dataset.id; if(!state.metricDraft[id2]) state.metricDraft[id2]={value:"",date:todayISO()}; state.metricDraft[id2].date=mdt.value||todayISO(); return; }
  var nme=e.target.closest('[data-act="nmet"]');
  if(nme){ if(!state.newMetric) state.newMetric={}; state.newMetric[nme.dataset.field]=nme.value; return; }
  var mcfg=e.target.closest('[data-act="mname"],[data-act="mpillar"],[data-act="munit"],[data-act="mdir"],[data-act="mtarget"]');
  if(mcfg){ var m=(state.metrics||[]).filter(function(x){return x.id===mcfg.dataset.id;})[0]; if(m){ var f=mcfg.dataset.act; if(f==="mname") m.name=mcfg.value; else if(f==="mpillar") m.pillar=mcfg.value; else if(f==="munit") m.unit=mcfg.value; else if(f==="mdir") m.dir=mcfg.value; else if(f==="mtarget"){ var t=parseFloat(mcfg.value); m.target=isNaN(t)?null:t; } saveMetrics(); render(); } return; }
  var rn=e.target.closest('[data-act="rename"]');
  if(rn){ var hb=rn.dataset.habit, val=rn.value.trim(); if(val) userModel.renames[hb]=val; else delete userModel.renames[hb]; saveModel(); rebuildModel(); render(); return; }
  var mvSel=e.target.closest('[data-act="move"]');
  if(mvSel){ userModel.moves[mvSel.dataset.habit]=mvSel.value; saveModel(); rebuildModel(); render(); return; }
  var hc=e.target.closest('[data-act="hcrit"]');
  if(hc){ if(!userModel.crit) userModel.crit={}; var hcv=hc.value.trim(); if(hcv) userModel.crit[hc.dataset.habit]=hcv; else delete userModel.crit[hc.dataset.habit]; saveModel(); rebuildModel(); return; }
  var nhf=e.target.closest('[data-act="nh"]');
  if(nhf){ if(!state.newHabit) state.newHabit={}; state.newHabit[nhf.dataset.field]=nhf.value; return; }
  var ld=e.target.closest('[data-act="logdate"]');
  if(ld){ state.logDate=ld.value||todayISO(); render(); return; }
  var el=e.target.closest('[data-act="num"]');
  if(el){ var n=parseFloat(el.value); state.draft[el.dataset.habit]=isNaN(n)?0:Math.max(0,n); render(); return; }
  var ge=e.target.closest('[data-act="goal"]');
  if(ge){ var g=parseFloat(ge.value); var hb=ge.dataset.habit; if(isNaN(g)||g<=0){ delete state.goals[hb]; } else { state.goals[hb]=g; } saveGoals(); render(); return; }
  var fi=e.target.closest('#importFile');
  if(fi && fi.files && fi.files[0]){ importData(fi.files[0]); fi.value=""; return; }
});

/* ===================== boot ===================== */
store.get(MODELKEY).then(function(m){
  if(m){ try{ var pm=JSON.parse(m); if(pm&&typeof pm==="object"){ userModel.renames=pm.renames||{}; userModel.moves=pm.moves||{}; userModel.hidden=pm.hidden||{}; userModel.added=Array.isArray(pm.added)?pm.added:[]; userModel.crit=pm.crit||{}; } }catch(e){} }
  rebuildModel(); state.draft=freshDraft();
  return store.get(GOALKEY);
}).then(function(g){
  if(g){ try{ var pg=JSON.parse(g); if(pg && typeof pg==="object") state.goals=pg; }catch(e){} }
  return store.get(KEY);
}).then(function(v){
  if(v){ try{ var parsed=JSON.parse(v); if(Array.isArray(parsed)) state.days=normalizeDays(parsed); }catch(e){} }
  return store.get(METRICKEY);
}).then(function(mm){
  if(mm){ try{ var pm=JSON.parse(mm); if(Array.isArray(pm)) state.metrics=pm; }catch(e){} }
  try{
    var q=new URLSearchParams(location.search);
    if(q.get('forge')==='1'){
      var qd=q.get('d');
      if(qd && /^\d{4}-\d{2}-\d{2}$/.test(qd) && qd<=todayISO()) state.logDate=qd;
      state.draft["Run / Work Out"]=(state.draft["Run / Work Out"]||0)+1;
      if(window.history && history.replaceState) history.replaceState(null,'',location.pathname);
      setTimeout(function(){ toast("\ud83c\udfcb\ufe0f Forge workout added to the draft \u2014 \u269c Save Day to bank it"); },400);
    }
  }catch(e){}
  render();
});
render();

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();

</script>
