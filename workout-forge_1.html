<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#090a12}
body{font-family:'Outfit',system-ui,sans-serif;color:#d7dbf0;
  background:radial-gradient(1200px 700px at 50% -10%,#221a2e 0%,transparent 60%),
  radial-gradient(900px 600px at 90% 10%,#1a2333 0%,transparent 55%),
  linear-gradient(180deg,#0c0e1a 0%,#090a12 100%);min-height:100vh}
.cinzel{font-family:'Cinzel',serif;letter-spacing:.04em}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:600px;margin:0 auto;padding:26px 16px 60px}
.panel{background:linear-gradient(180deg,rgba(28,32,52,.92),rgba(20,23,38,.92));
  border:1px solid rgba(120,130,180,.16);border-radius:18px;
  box-shadow:0 18px 40px -28px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.04)}
.eyebrow{font-size:10.5px;letter-spacing:.32em;text-transform:uppercase;color:#7c84a8;font-weight:600}
.card{transition:transform .25s,box-shadow .25s,border-color .25s;cursor:pointer}
.card:hover{transform:translateY(-3px)}
.row{border-radius:11px}
.tap{cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.btn{transition:transform .12s,filter .18s;cursor:pointer;border:none;font-family:inherit}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:translateY(1px) scale(.99)}
.chip{font-size:8.5px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
.bartrack{position:relative;border-radius:99px;background:rgba(255,255,255,.07);overflow:hidden}
.fill{height:100%;border-radius:99px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fadeUp{animation:fadeUp .4s ease both}
.num{font-family:'Space Mono',monospace;background:rgba(255,255,255,.05);border:1px solid rgba(150,160,200,.2);color:#eef0fb;text-align:center;font-size:13px;font-weight:700;outline:none;border-radius:7px;padding:6px 2px}
.setw{width:62px}.setr{width:50px}
.num:focus{border-color:rgba(240,183,62,.6)}
.scroll-x{overflow-x:auto;scrollbar-width:thin}
.scroll-x::-webkit-scrollbar{height:6px}
.scroll-x::-webkit-scrollbar-thumb{background:rgba(120,130,180,.3);border-radius:9px}
</style>

/* ---------- dates ---------- */
function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function weekStart(){ var d=new Date(); var day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d.getTime(); }
function fmtDate(iso){ var p=iso.split("-"); return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function daysAgo(iso){ var p=iso.split("-"); var d=new Date(+p[0],+p[1]-1,+p[2]); var diff=Math.floor((Date.now()-d.getTime())/86400000); return diff<=0?"today":diff===1?"yesterday":diff+" days ago"; }

/* ---------- e1RM + history ---------- */
function e1RM(w,r){ w=parseFloat(w); r=parseFloat(r); if(!w||!r) return 0; return w*(1+r/30); }
function setsTopE1RM(sets){ var b=0; (sets||[]).forEach(function(s){ var e=e1RM(s.w,s.r); if(e>b)b=e; }); return b; }

function lastSets(exId){ for(var i=state.sessions.length-1;i>=0;i--){ var it=state.sessions[i].items&&state.sessions[i].items[exId]; if(it&&it.sets&&it.sets.length) return it.sets; } return null; }

/* ---------- stats ---------- */
function stats(){
  var s=state.sessions, total=s.length, ws=weekStart();
  var thisWeek=s.filter(function(x){ var p=x.date.split("-"); return new Date(+p[0],+p[1]-1,+p[2]).getTime()>=ws; }).length;
  var byType={}; PROGRAM.forEach(function(d){byType[d.key]=0;});
  s.forEach(function(x){ if(byType[x.type]!=null) byType[x.type]++; });
  var daysLeft=Math.max(0,Math.ceil((SEASON_END-Date.now())/86400000));
  return {total:total,thisWeek:thisWeek,byType:byType,last:s.length?s[s.length-1]:null,daysLeft:daysLeft,weeksLeft:Math.ceil(daysLeft/7)};

/* ---------- view helpers ---------- */
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }

function spark(arr,color){
  if(arr.length<2) return '';
  var W=120,H=26,p=3, vals=arr.map(function(o){return o.e;});
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals); if(mx===mn){mx=mn+1;}
  var pts=arr.map(function(o,i){ var x=p+i*(W-2*p)/(arr.length-1); var y=H-p-(o.e-mn)/(mx-mn)*(H-2*p); return x.toFixed(1)+","+y.toFixed(1); }).join(" ");
  var last=arr[arr.length-1], lx=p+(arr.length-1)*(W-2*p)/(arr.length-1), ly=H-p-(last.e-mn)/(mx-mn)*(H-2*p);
  return '<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" style="display:block"><polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/><circle cx="'+lx.toFixed(1)+'" cy="'+ly.toFixed(1)+'" r="2" fill="'+color+'"/></svg>';
}

function setRows(it, accent){

/* ---------- rest timer ---------- */
function parseRest(str){
  if(!str) return 90;
  if(/superset/i.test(str)) return 75;
  var nums=(str.match(/\d+(\.\d+)?/g)||[]).map(Number);
  if(!nums.length) return 90;
  var v=nums.length>=2?(nums[0]+nums[1])/2:nums[0];
  if(/min/i.test(str)) v*=60;
  return Math.round(v);
}
function clk(sec){ sec=Math.max(0,Math.round(sec)); return Math.floor(sec/60)+":"+String(sec%60).padStart(2,"0"); }
var timerInterval=null, audioCtx=null, timerNode=null, timer=null;
function beep(){ try{ if(!audioCtx) return; var t=audioCtx.currentTime; [0,0.2,0.4].forEach(function(o){ var osc=audioCtx.createOscillator(),g=audioCtx.createGain(); osc.frequency.value=880; osc.type="sine"; osc.connect(g); g.connect(audioCtx.destination); g.gain.setValueAtTime(0.0001,t+o); g.gain.exponentialRampToValueAtTime(0.32,t+o+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+o+0.16); osc.start(t+o); osc.stop(t+o+0.17); }); }catch(e){} }
function ensureTimerNode(){
  if(timerNode) return timerNode;
  var n=document.createElement("div");
  n.style.cssText="position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:70;display:none;align-items:center;gap:11px;background:rgba(20,23,38,.97);border:1px solid rgba(69,200,216,.5);border-radius:14px;padding:10px 13px;box-shadow:0 14px 40px rgba(0,0,0,.6);font-family:'Outfit',sans-serif";
  n.innerHTML='<div style="display:flex;flex-direction:column;line-height:1.1"><div id="tlabel" style="font-size:8.5px;color:#7c84a8;letter-spacing:.16em;text-transform:uppercase">Rest</div><div id="ttime" class="mono" style="font-size:22px;font-weight:700;color:#45c8d8;min-width:58px">0:00</div></div>'
    +'<button id="tplus" class="btn" style="padding:8px 11px;border-radius:9px;font-size:11px;font-weight:700;color:#cfd4ea;background:rgba(255,255,255,.06);border:1px solid rgba(120,130,180,.25)">+30s</button>'
    +'<button id="tstop" class="btn" style="padding:8px 11px;border-radius:9px;font-size:11px;font-weight:700;color:#0c0e1a;background:#45c8d8;border:none">Stop</button>';
  document.body.appendChild(n);
  n.querySelector("#tplus").onclick=function(){ if(timer){ timer.endAt+=30000; timer.fired=false; n.style.borderColor="rgba(69,200,216,.5)"; n.querySelector("#ttime").style.color="#45c8d8"; n.querySelector("#tlabel").textContent="Rest"; tickTimer(); } };
  n.querySelector("#tstop").onclick=function(){ stopTimer(); };
  timerNode=n; return n;
}
function startTimer(sec){
  if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state==="suspended"){ try{ audioCtx.resume(); }catch(e){} }
  timer={endAt:Date.now()+sec*1000, total:sec, fired:false};
  var n=ensureTimerNode(); n.style.display="flex"; n.style.borderColor="rgba(69,200,216,.5)";
  n.querySelector("#ttime").style.color="#45c8d8"; n.querySelector("#tlabel").textContent="Rest";
  if(!timerInterval) timerInterval=setInterval(tickTimer,200);
  tickTimer();
}
function stopTimer(){ timer=null; if(timerNode) timerNode.style.display="none"; if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
function tickTimer(){
  if(!timer) return;
  var rem=timer.endAt-Date.now(), n=ensureTimerNode();
  n.querySelector("#ttime").textContent=clk(rem/1000);
  if(rem<=0 && !timer.fired){
    timer.fired=true; beep(); try{ if(navigator.vibrate) navigator.vibrate([200,90,200]); }catch(e){}
    n.querySelector("#ttime").textContent="0:00"; n.querySelector("#ttime").style.color="#2fd180";
    n.style.borderColor="rgba(47,209,128,.75)"; n.querySelector("#tlabel").textContent="Rest done \u2014 go";
    setTimeout(function(){ if(timer&&timer.fired) stopTimer(); },5000);
  }
}

/* ---------- persistence ---------- */
var KEY="forge:sessions:v2", SWAPKEY="forge:swaps:v1";
function save(){ store.set(KEY,JSON.stringify(state.sessions)); }

/* ---------- actions ---------- */
function logDay(key){
  var d=dayBy(key); if(!d) return;
  var items={}, any=false;
  allItems(d).forEach(function(it){
    var eid=effId(it); var dr=state.draft[eid]; if(!dr) return;
    if(it.track==="load"){
      var sets=(dr.sets||[]).filter(function(s){ return s.w||s.r; }).map(function(s){ return {w:s.w||"",r:s.r||""}; });
      if(sets.length||dr.done){ items[eid]={done:!!dr.done,sets:sets,name:effName(it)}; any=true; }
    } else if(dr.done){ items[eid]={done:true}; any=true; }
  });
  if(!any){ toast("Check off or log a few exercises first"); return; }
  var prior=priorBestMap();
  var prs=[];
  Object.keys(items).forEach(function(k){ var it=items[k]; if(it&&it.sets&&it.sets.length){ var b=setsTopE1RM(it.sets); if(b>0 && (prior[k]||0)>0 && b>prior[k]+0.01){ it.pr=true; prs.push({name:it.name||k,e:b}); } } });
  state.sessions.push({date:todayISO(),type:key,items:items});
  allItems(d).forEach(function(it){ delete state.draft[effId(it)]; });
  save(); render();
  if(prs.length===1){ toast("\ud83c\udfc6 New PR! "+prs[0].name+" \u2014 "+Math.round(prs[0].e)+" lbs \u00b7 "+d.tag+" logged"); }
  else if(prs.length>1){ toast("\ud83c\udfc6 "+prs.length+" new PRs! \u00b7 "+d.tag+" logged"); }
  else { toast("\u2714 "+d.tag+" logged \u2014 nice work"); }
}

function exportData(){
  try{ var payload={app:"forge",version:2,exportedAt:new Date().toISOString(),sessions:state.sessions};
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"}); var url=URL.createObjectURL(blob);
    var a=document.createElement("a"); a.href=url; a.download="forge-training-"+todayISO()+".json"; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000); toast("Backup exported \u2713");
  }catch(e){ toast("Export failed"); }
}
function importData(file){
  var r=new FileReader();
  r.onload=function(){ try{ var o=JSON.parse(r.result); var ss=Array.isArray(o)?o:o.sessions; if(Array.isArray(ss)){ state.sessions=ss; save(); render(); toast("Imported \u2713 ("+ss.length+" sessions)"); } else toast("No sessions in that file"); }catch(e){ toast("Couldn\u2019t read that file"); } };
  r.onerror=function(){ toast("Couldn\u2019t read that file"); };
  r.readAsText(file);
}

app.addEventListener("click",function(e){
  var el=e.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act, key=el.dataset.key, id=el.dataset.id;
  if(act==="setw"||act==="setr") return;
  if(act==="day"){ state.openDay=state.openDay===key?null:key; render(); if(state.openDay){ var c=document.querySelector('[data-act="day"][data-key="'+key+'"]'); if(c) c.scrollIntoView({behavior:"smooth",block:"start"}); } }
  else if(act==="check"){ var dr=state.draft[id]||{sets:[]}; dr.done=!dr.done; state.draft[id]=dr; render(); }
  else if(act==="log"){ logDay(key); }
  else if(act==="clearday"){ var d=dayBy(key); if(d) allItems(d).forEach(function(it){ delete state.draft[effId(it)]; }); render(); }
  else if(act==="del"){ var i=+el.dataset.idx; if(!isNaN(i)){ state.sessions.splice(i,1); save(); render(); } }
  else if(act==="rest"){ startTimer(+el.dataset.sec||90); }
  else if(act==="export"){ exportData(); }
  else if(act==="import"){ var f=document.getElementById("importFile"); if(f) f.click(); }
  else if(act==="reset"){ if(state.sessions.length===0||window.confirm("Clear the whole training log? Export a backup first if you want to keep it.")){ state.sessions=[]; state.draft={}; save(); render(); } }
  else if(act==="swapmenu"){ state.swapOpen=state.swapOpen===id?null:id; render(); }
  else if(act==="swap"){ var idx=+el.dataset.idx; if(idx>0) state.swaps[id]=idx; else delete state.swaps[id]; state.swapOpen=null; store.set(SWAPKEY,JSON.stringify(state.swaps)); render(); }
  else if(act==="plates"){ state.plateOpen=true; render(); }
  else if(act==="closeplate"){ state.plateOpen=false; render(); }
  else if(act==="bar"){ state.bar=+el.dataset.v; render(); }
  else if(act==="platestep"){ state.plateW=Math.max(0,Math.round((state.plateW+parseFloat(el.dataset.v))*10)/10); render(); }
});
/* live set capture without re-render (keeps input focus for fast entry) */
app.addEventListener("input",function(e){
  var el=e.target.closest('[data-act="setw"],[data-act="setr"]'); if(!el) return;
  var id=el.dataset.id, si=+el.dataset.set, field=el.dataset.act==="setw"?"w":"r";
  var dr=state.draft[id]||{done:false,sets:[]}; while(dr.sets.length<=si) dr.sets.push({w:"",r:""});
  dr.sets[si][field]=el.value.trim(); state.draft[id]=dr;
});
app.addEventListener("change",function(e){
  var pw=e.target.closest('[data-act="platew"]'); if(pw){ var n=parseFloat(pw.value); state.plateW=isNaN(n)?0:Math.max(0,n); render(); return; }
  var fi=e.target.closest('#importFile'); if(fi&&fi.files&&fi.files[0]){ importData(fi.files[0]); fi.value=""; }
});

/* ---------- boot ---------- */
store.get(SWAPKEY).then(function(sw){ if(sw){ try{ var o=JSON.parse(sw); if(o&&typeof o==="object") state.swaps=o; }catch(e){} } return store.get(KEY); }).then(function(v){ if(v){ try{ var a=JSON.parse(v); if(Array.isArray(a)) state.sessions=a; }catch(e){} } render(); });
render();
</script>
</body>
</html>
