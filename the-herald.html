<style>
:root{
  --ink:#0b0d13; --panel:#12151d; --panel2:#171b26; --border:#242a3a; --border2:#2e3548;
  --text:#e8e6df; --dim:#8b90a0; --faint:#5c6172;
  --gold:#e6b450; --gold-soft:rgba(230,180,80,.14);
  --cyan:#22d3ee; --cyan-soft:rgba(34,211,238,.12);
  --green:#4ade80; --green-soft:rgba(74,222,128,.12);
  --am:#a78bfa; --am-soft:rgba(167,139,250,.12);
  --rose:#f87171; --rose-soft:rgba(248,113,113,.12);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;line-height:1.5;
  background-image:radial-gradient(1100px 500px at 50% -220px, rgba(230,180,80,.07), transparent 65%);
  min-height:100vh;padding-bottom:70px}
.wrap{max-width:1060px;margin:0 auto;
  padding:0 max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right))}
h1,h2,.cz{font-family:'Cinzel',serif}
.mono{font-family:'Space Mono',monospace}

/* App chrome. The blurred fill runs up under the Dynamic Island so the clock,
   signal, wifi and battery never sit on top of content. */
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}
.appbar{position:sticky;top:0;z-index:50;
  margin:0 calc(-1 * max(14px,env(safe-area-inset-left)));
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(14px,env(safe-area-inset-left)) 11px max(14px,env(safe-area-inset-right));
  background:rgba(11,13,19,.90);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--border);

.iconbtn{width:33px;height:33px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);

::placeholder{color:var(--faint)}

/* ---------- header (legacy; the sticky app bar replaces it) ---------- */
header{display:none}
.brand h1{font-size:26px;letter-spacing:.14em;color:var(--gold);font-weight:600;text-shadow:0 0 26px rgba(230,180,80,.35)}

/* ---------- assembly rail (signature) ---------- */
.rail-card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:var(--r);

.rail::before{content:"";position:absolute;top:17px;left:8%;right:8%;height:2px;
  background:linear-gradient(90deg,var(--faint),var(--gold) 55%,var(--green));opacity:.5}
.ember{position:absolute;top:14px;left:8%;width:8px;height:8px;border-radius:50%;background:var(--gold);
  box-shadow:0 0 12px 4px rgba(230,180,80,.55);animation:travel 6s linear infinite}
@keyframes travel{0%{left:8%;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:calc(92% - 8px);opacity:0}}

.stage.pub .node{border-color:rgba(74,222,128,.6);color:var(--green)}

.season{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:16px}

.c-gold{color:var(--gold)}.c-cyan{color:var(--cyan)}.c-green{color:var(--green)}.c-am{color:var(--am)}.c-rose{color:var(--rose)}

/* ---------- shared ---------- */

.bar{height:5px;background:var(--ink);border-radius:99px;overflow:hidden;margin-top:8px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:99px;transition:width .3s}

  font-size:13px;color:transparent;cursor:pointer;margin-top:2px}

/* cadence */
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}

.pip{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border2);margin:4px auto;display:flex;
  align-items:center;justify-content:center;font-size:12px;cursor:pointer;color:var(--faint)}
.pip.on.p-l{border-color:var(--gold);color:var(--gold);background:var(--gold-soft);font-weight:700}

.pip.on.p-e{border-color:var(--am);color:var(--am);background:var(--am-soft)}
.pip.on.p-c{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-soft)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11.5px;color:var(--dim)}
.longslot{display:flex;align-items:center;gap:10px;background:var(--panel2);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px}

/* metrics table */
.mtable{width:100%;border-collapse:collapse;font-size:12.5px}
.mtable th{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);text-align:left;padding:6px 6px;border-bottom:1px solid var(--border)}
.mtable td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.mtable input{padding:5px 6px;font-size:12.5px;border-radius:7px}
.rollup{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:12px}

/* funnel */
.fstages{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px}
.fs{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:9px 4px;text-align:center}
.fs .v{font-size:18px;font-weight:700;color:var(--gold)}

.lead:last-child{border-bottom:none}
.lead .ln{flex:1;min-width:120px;font-weight:600;font-size:13.5px}
.lead select{width:auto;font-size:12px;padding:5px 8px}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--panel2);
  border:1px solid var(--gold);color:var(--gold);border-radius:999px;padding:9px 18px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:all .3s;z-index:99;box-shadow:0 6px 30px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:640px){
  .season{grid-template-columns:repeat(2,1fr)}
  .fstages{grid-template-columns:repeat(3,1fr)}
  .rail .nm{font-size:8.5px}
  .brand h1{font-size:22px}
}

<script>
/* ============ storage (localStorage on GitHub Pages, in-memory fallback in preview) ============ */
const store=(()=>{try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return localStorage;}
catch(e){const m={};return{getItem:k=>m[k]??null,setItem:(k,v)=>{m[k]=String(v)},removeItem:k=>{delete m[k]}};}})();
const KEY='herald:v1';
const uid=()=>Math.random().toString(36).slice(2,9);
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};

/* ============ optimization checklist template ============ */
const OPT=[
 {k:'title', l:'Title', g:'Front-loaded exact-match keyword, under 60 characters. Score it in vidIQ: 80+ is publish-ready, below 70 means the framing is wrong, reframe before filming. Never publish an unscored title.'},
 {k:'desc',  l:'Description', g:'First two lines are the mini-ad shown in search: hook plus value with the primary keyword. Then 150 to 300 words weaving secondary keywords, timestamps, the clarity call CTA link, and 3 to 5 hashtags at the bottom.'},
 {k:'thumb', l:'Thumbnail', g:'The proven pattern: bold text, a specific dollar figure, your face. 3 to 5 words max, readable at phone size. Score against the live thumbnail in vidIQ and only swap if the new one scores strictly higher.'},
 {k:'broll', l:'Assets / B-roll', g:'Charts, screen shares, props. One visual change every 15 to 30 seconds for retention.'},
 {k:'emph',  l:'Points to emphasize', g:'The 2 or 3 moments worth clipping into shorts. Flag them in the script.'},
 {k:'tags',  l:'SEO tags', g:'Primary keyword, close variants, 5 to 10 related terms. Validate in vidIQ before locking.'},
 {k:'blog',  l:'Companion blog post', g:'For SEO and AEO: question-based headings, the direct answer in the first sentence of each section, FAQ block, video embedded, booking CTA. Not a transcript dump.'},
 {k:'cta',   l:'CTA', g:'One next step only: verbal, pinned comment, end screen, description link. All four point to the same place.'}
];
const STAGES=['draft','approved','produced','scheduled','published'];
const STAGE_L={draft:'Draft',approved:'Approved',produced:'Filmed / Edited',scheduled:'Scheduled',published:'Published'};
const PUBC=[
 {k:'p1',l:'vidIQ SEO score checked at upload, suggestions fixed'},
 {k:'p2',l:'Title, description, and tags pasted from the vault'},
 {k:'p3',l:'Thumbnail uploaded, readable at phone size'},
 {k:'p4',l:'End screen and cards point to the next video in the cluster'},
 {k:'p5',l:'Added to the right playlist for its vertical'},
 {k:'p6',l:'Pinned comment posted: open loop plus one specific, low-friction question'},
 {k:'p7',l:'Companion blog post live on the site, video embedded'},
 {k:'p8',l:'Publish time set to the consistent weekly slot'},
 {k:'p9',l:'Shorts clipped from emphasis points and queued'},
 {k:'p10',l:'Short posted natively to LinkedIn, link in comments'}
];
const VERTS=['Business Owners','Physicians','Life Transitions','General'];
const FSTAGES=['New','Contacted','Booked','Met','Proposal','Client'];

/* ============ seeds ============ */
function seedCapture(){return[
 {id:uid(),l:'VSL live on the contact page, above the scheduler',d:false},
 {id:uid(),l:'Acuity set to a 15-minute intro call with 3 qualifying questions',d:false},
 {id:uid(),l:'Every video description carries one CTA link to the VSL page',d:false},
 {id:uid(),l:'Pinned comment with the booking link on every video',d:false},
 {id:uid(),l:'Business Owner Playbook wired as secondary capture for not-ready viewers',d:false},
 {id:uid(),l:'Retirement Roadmap wired as secondary capture for not-ready viewers',d:false},
 {id:uid(),l:'LinkedIn featured section links to the VSL page',d:false},
 {id:uid(),l:'YouTube banner, about section, and channel links point to the booking page',d:false}
];}
function seedRoadmap(){return[
 {id:uid(),t:'Salary vs Dividends Canada 2026: How Business Owners Should Pay Themselves',v:'Business Owners',i:'High intent, evergreen head term',p:1},
 {id:uid(),t:'Canadian Departure Tax Explained: What Happens When You Leave Canada',v:'Life Transitions',i:'Low competition, high intent. Document already written, fastest to produce',p:1},
 {id:uid(),t:'When to Take CPP: 60 vs 65 vs 70',v:'Life Transitions',i:'Highest search volume in the niche, discovery engine',p:1},
 {id:uid(),t:'CPP vs OAS: The Difference Every Canadian Retiree Needs to Know',v:'Life Transitions',i:'Comparison intent, ranks fast, feeds CPP video',p:2},
 {id:uid(),t:'Corporate Investing in Canada: The Passive Income Grind Explained',v:'Business Owners',i:'Niche expertise proof, low competition',p:2},
 {id:uid(),t:'OAS Clawback: How to Avoid It',v:'Life Transitions',i:'Problem-aware search, strong CTA fit',p:2},
 {id:uid(),t:'Retirement Planning for Business Owners in Canada',v:'Business Owners',i:'Head term for your core vertical',p:2},
 {id:uid(),t:'RRSP vs Investing Inside Your Corporation',v:'Business Owners',i:'Decision-stage comparison, books calls',p:3},
 {id:uid(),t:'Lifetime Capital Gains Exemption: How to Sell Your Business Tax-Free',v:'Business Owners',i:'Exit-stage owners, highest value viewer',p:3},
 {id:uid(),t:'Physician Financial Planning in Canada: The Complete Guide',v:'Physicians',i:'Vertical flagship, long watch time',p:3},
 {id:uid(),t:'Incorporated Physicians: Salary, Dividends, and Your Medical Corporation',v:'Physicians',i:'MD-specific intent, low competition',p:4},
 {id:uid(),t:'Individual Pension Plan (IPP) Explained for Business Owners',v:'Business Owners',i:'Sophisticated topic, positions expertise',p:4}
];}
function blankOpt(){const o={};OPT.forEach(x=>o[x.k]={t:'',d:false});return o;}
function blankMetrics(){return{ctr:'',avd:'',ret:'',likes:'',com:'',subs:'',leads:''};}

function defaultState(){return{
 videos:[],cadence:{},weeks:{},leads:[],capture:seedCapture(),roadmap:seedRoadmap(),sys:{once:{},w:{},m:{}},
 goals:{leads:50,booked:20}
};}
let S=load();
function load(){try{const r=store.getItem(KEY);if(r){const s=Object.assign(defaultState(),JSON.parse(r));delete s.vsl;(s.videos||[]).forEach(v=>{if(v.status==='optimized')v.status='approved';if(!v.pub)v.pub={};if(!v.opt.blog)v.opt.blog={t:'',d:false};});Object.values(s.cadence||{}).forEach(d=>{if('s' in d){d.m=d.s;delete d.s;}});return s;}}catch(e){}return defaultState();}
function save(){store.setItem(KEY,JSON.stringify(S));renderRail();}

/* Destructive actions were one-way. Snapshot first, then keep Undo on screen. */
var __undoT=null;
function undoToast(msg, restore){
  var t=document.getElementById('undoToast');
  if(!t){ t=document.createElement('div'); t.id='undoToast'; document.body.appendChild(t); }
  t.style.cssText="position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:95;"
   +"background:rgba(20,23,38,.97);border:1px solid rgba(240,183,62,.5);color:#f6e2ad;padding:10px 16px;border-radius:12px;"
   +"font-family:'Outfit',sans-serif;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.55);display:flex;align-items:center;gap:12px;max-width:92vw";
  t.textContent='';
  var s=document.createElement('span'); s.textContent=msg; t.appendChild(s);
  var b=document.createElement('button'); b.textContent='Undo';
  b.style.cssText="background:rgba(240,183,62,.16);border:1px solid rgba(240,183,62,.5);color:#f0b73e;font-family:inherit;"
   +"font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer;flex-shrink:0";
  b.onclick=function(){ try{ restore(); }catch(e){} t.remove(); };
  t.appendChild(b);
  clearTimeout(__undoT); __undoT=setTimeout(function(){ if(t&&t.parentNode) t.remove(); },7000);
}

/* iOS silently blocks confirm() in home-screen apps, so native dialogs are
   banned here. Deletion is immediate; the Undo toast is the safety net. */
function delScript(id){
  var v=(S.videos||[]).filter(function(x){return x.id===id;})[0]; if(!v) return;
  var snap=JSON.stringify(S.videos);
  S.videos=S.videos.filter(function(x){return x.id!==id;}); save(); renderAll();
  undoToast('Deleted: '+String(v.title||'Untitled').slice(0,26), function(){ try{ S.videos=JSON.parse(snap); save(); renderAll(); }catch(e){} });
}
function delLead(id){
  var l=(S.leads||[]).filter(function(x){return x.id===id;})[0];
  var snap=JSON.stringify(S.leads);
  S.leads=S.leads.filter(function(x){return x.id!==id;}); save(); renderAll();
  undoToast('Lead removed'+(l&&l.name?': '+String(l.name).slice(0,22):''), function(){ try{ S.leads=JSON.parse(snap); save(); renderAll(); }catch(e){} });

 if(lines.length&&/^script\s*\d+\s*[:\-]/i.test(lines[0])&&lines[0].length<130){t=lines[0].replace(/^script\s*\d+\s*[:\-]\s*/i,'').trim();lines.shift();}
 t=titleCaseIf(t);
 while(lines.length&&((/\|/.test(lines[0])&&lines[0].length<130)||/^segment\s*:/i.test(lines[0])))lines.shift();
 const secs=[];let curS={n:'',raw:'',c:[]};
 lines.forEach(l=>{
  if(isSecMarker(l)){secs.push(curS);const raw=l.replace(/^#+\s*/,'').replace(/^\[/,'').replace(/\]$/,'').replace(/\s*\(.*\)\s*$/,'').trim();curS={n:raw.toLowerCase(),raw,c:[]};}
  else if(isBracket(l)){/* stage direction like [CUT TO...] or [On camera...]: skip */}
  else curS.c.push(l);});
 secs.push(curS);
 const find=re=>secs.filter(s=>re.test(s.n));
 const secText=(re,sep)=>{const s=find(re)[0];return s?s.c.map(x=>x.replace(/^[-•*]\s*/,'')).join(sep||'\n').trim():'';};
 const hookS=find(/^(hook|intro)\b/)[0];
 const ctaS=find(/^(close|call to action|cta|final thoughts|conclusion)\b/)[0];
 let emph=find(/^(reason|point)\s*\d+/).map(s=>s.c[0]).filter(x=>x&&x.length<120);
 if(!emph.length){const es=find(/^(emphasis|clip points)/)[0];if(es)emph=es.c.map(x=>x.replace(/^[-•*]\s*/,'')).filter(Boolean).slice(0,8);}
 if(!emph.length)emph=find(/^on-screen card/).map(s=>s.c[0]).filter(x=>x&&x.length<140);
 if(!emph.length)emph=find(/^[a-z]\s*:\s*\S/).map(s=>titleCaseIf(s.raw)).filter(x=>x&&x.length<80);
 if(t)item.title=t;
 item.extract={
  hook:hookS?firstSent(hookS.c.join(' '),2):'',
  cta:ctaS?firstSent(ctaS.c.join(' '),3):'',
  emph,
  tags:secText(/^seo keywords/,' ').replace(/\.\s*$/,''),
  desc:secText(/^suggested video description/),
  kw:(find(/^target keyword/)[0]||{c:[]}).c[0]||'',
  thumb:secText(/^thumbnail/),
  broll:secText(/^(b-?roll|assets)/),
  blog:secText(/^blog post/),
  disc:!!find(/^(required\s+)?disclaimer/)[0]};
 return item;}
function descDraft(x){const e=x.extract||{};
 if(e.desc)return e.desc+(e.disc?'\n\n[Add the required Scotia disclaimer from the script doc]':'');
 if(!e.hook&&!(e.emph&&e.emph.length))return'';
 let d=e.hook?e.hook+'\n\n':'';
 if(e.emph&&e.emph.length)d+='In this video:\n'+e.emph.map(p=>'- '+p).join('\n')+'\n\n';
 d+='Book a 15 minute intro call: [link]\nFree resource: [link]';return d;}
function extractMeta(x){const e=x.extract||{};const p=[];
 if(e.emph&&e.emph.length)p.push(e.emph.length+' clip pts');if(e.hook)p.push('hook');if(e.cta)p.push('CTA');
 if(e.desc)p.push('desc');if(e.tags)p.push('tags');if(e.kw)p.push('kw');if(e.thumb)p.push('thumb');if(e.broll)p.push('b-roll');if(e.blog)p.push('blog');
 return p.join(' · ');}

function splitHtml(html,pred){const div=document.createElement('div');div.innerHTML=html;
 const out=[];let cur=null;
 [...div.children].forEach(el=>{const t=el.textContent.trim();if(!t)return;
  if(pred(el,t)){if(cur&&(cur.title||cur.body))out.push(cur);cur={title:t.replace(/^title\s*:\s*/i,'').trim().slice(0,120),body:''};}
  else{if(!cur)cur={title:'',body:''};cur.body+=(cur.body?'\n\n':'')+t;}});
 if(cur&&(cur.title||cur.body))out.push(cur);return out;}
const isHead=lv=>(el,t)=>new RegExp('^H[1-'+lv+']$').test(el.tagName)&&t.length<=120;
const isBoldP=(el,t)=>t.length<=120&&el.tagName==='P'&&el.children.length===1&&/^(STRONG|B)$/.test(el.children[0].tagName)&&el.children[0].textContent.trim()===t;
const isScriptN=(el,t)=>/^(script|video)\s*\d+/i.test(t)&&t.length<=120;

function parseHtmlMode(html,mode,name){
 if(mode==='one')return[{title:cleanName(name),body:htmlToText(html)}];
 if(mode==='head')return splitHtml(html,isHead(4));
 if(mode==='bold')return splitHtml(html,(el,t)=>isHead(4)(el,t)||isBoldP(el,t));
 if(mode==='scriptn')return splitHtml(html,isScriptN);
 if(mode==='dashes'){return parseTextMode(htmlToText(html),'dashes',name);}
 /* auto: split only on H1/H2 headings that are NOT known script sections, keep the split only if pieces look like real scripts */
 let items=splitHtml(html,(el,t)=>isHead(2)(el,t)&&!SECWORDS.test(t));
 if(items.length<2){const sn=splitHtml(html,isScriptN);if(sn.length>=2)items=sn;}
 if(items.length<2||medianWords(items)<30){const fh=firstNonMetaHeading(html);items=[{title:fh||cleanName(name),body:htmlToText(html)}];}
 return items;}
function firstNonMetaHeading(html){const div=document.createElement('div');div.innerHTML=html;
 for(const el of div.children){if(/^H[1-2]$/.test(el.tagName)){const t=el.textContent.trim();if(t&&!SECWORDS.test(t))return t.slice(0,120);}}
 return'';}
function singleText(txt,name){
 const ls=txt.split('\n');const first=(ls[0]||'').trim();const core=first.replace(/^#+\s*/,'').trim();
 const markers=ls.filter(l=>isSecMarker(l.trim())).length;
 if(core&&core.length<120&&!looksLikePath(core)&&!isSecMarker(first)&&(first.startsWith('#')||markers>=2))
  return{title:core,body:ls.slice(1).join('\n').trim()};
 return{title:cleanName(name),body:txt};}
function parseTextMode(txt,mode,name){
 txt=(txt||'').trim();if(!txt)return[];
 if(looksLikePath(txt.split('\n')[0])&&txt.split('\n').filter(Boolean).length<=2)return[];
 const mk=blocks=>blocks.map(b=>{b=b.trim();if(!b)return null;const lines=b.split('\n');
  let title=lines[0].replace(/^#+\s*/,'').replace(/^title\s*:\s*/i,'').trim();
  let body=lines.slice(1).join('\n').trim();
  if(title.length>120||looksLikePath(title)){body=b;title='';}
  return{title,body};}).filter(Boolean);
 if(mode==='one')return[singleText(txt,name)];
 if(mode==='dashes')return mk(txt.split(/\n\s*-{3,}\s*\n/));
 if(mode==='scriptn')return mk(txt.split(/(?=^(?:script|video)\s*\d+)/gim));
 if(mode==='head'||mode==='bold')return mk(txt.split(/(?=^#{1,4}\s)/gm));
 /* auto */
 if(/\n\s*-{3,}\s*\n/.test(txt))return mk(txt.split(/\n\s*-{3,}\s*\n/));
 const sn=(txt.match(/^(?:script|video)\s*\d+/gim)||[]).length;
 if(sn>=2){const items=mk(txt.split(/(?=^(?:script|video)\s*\d+)/gim));if(medianWords(items)>=30)return items;}
 return[singleText(txt,name)];}

function parseGroup(g){
 let items=g.kind==='html'?parseHtmlMode(g.src,g.mode,g.name):parseTextMode(g.src,g.mode,g.name);
 if(!items.length)items=[{title:cleanName(g.name),body:g.kind==='html'?htmlToText(g.src):g.src.trim()}];
 if(items.length>1)items=items.filter(x=>words(x.body)>=15);
 items.forEach(enrich);
 items.forEach((x,i)=>{if(!x.title||looksLikePath(x.title))x.title=cleanName(g.name)+(items.length>1?' · part '+(i+1):'');x.title=x.title.slice(0,120);});
 g.items=items;}
function setMode(gi,mode){bulkGroups[gi].mode=mode;parseGroup(bulkGroups[gi]);renderAll();}
function addGroup(name,kind,src){const g={name,kind,src,mode:'auto',items:[]};parseGroup(g);bulkGroups.push(g);renderAll();
 toast(name+': found '+g.items.length+' script'+(g.items.length===1?'':'s')+'. Review below');}

function handleFiles(files){[...files].forEach(f=>{
 if(/\.docx$/i.test(f.name)){loadMammoth(()=>{const r=new FileReader();
  r.onload=()=>{mammoth.convertToHtml({arrayBuffer:r.result}).then(res=>addGroup(f.name,'html',res.value))
   .catch(()=>toast('Could not read '+f.name+'. Try pasting the text instead'));};
  r.readAsArrayBuffer(f);});}
 else if(/\.(txt|md|text)$/i.test(f.name)||f.type.startsWith('text')){
  const r=new FileReader();r.onload=()=>addGroup(f.name,'text',r.result);r.readAsText(f);}
 else toast(f.name+': not a readable format. Use .docx, .txt, or .md');});}
function loadMammoth(cb){if(window.mammoth)return cb();const s=document.createElement('script');
 s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js';s.onload=cb;
 s.onerror=()=>toast('Could not load the Word reader. Paste the text instead');document.body.appendChild(s);}
function dropScripts(e){e.preventDefault();e.stopPropagation();e.currentTarget.querySelector('.dropzone').classList.remove('drag');
 if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);
 else toast('That drop had no file in it. Use the button to pick the file instead');}
function importPaste(){const txt=document.getElementById('bulk-txt').value.trim();
 if(!txt){toast('Paste the scripts first');return;}
 addGroup('Pasted scripts','text',txt);document.getElementById('bulk-txt').value='';}
function bulkTitle(gi,i,val){bulkGroups[gi].items[i].title=val;}
function bulkRemove(gi,i){bulkGroups[gi].items.splice(i,1);if(!bulkGroups[gi].items.length)bulkGroups.splice(gi,1);renderAll();}
function bulkClear(){bulkGroups=[];renderAll();}
function bulkCount(){return bulkGroups.reduce((a,g)=>a+g.items.length,0);}
function bulkAdd(){const list=bulkGroups.flatMap(g=>g.items).filter(x=>x.title.trim());
 if(!list.length){toast('Give each script a title first');return;}
 addBulk(list);bulkGroups=[];}
function addBulk(list){list.forEach(x=>{
 const opt=blankOpt();const e=x.extract||{};
 opt.title.t=x.title.trim();
 if(e.emph&&e.emph.length)opt.emph.t=e.emph.join('\n');
 if(e.cta)opt.cta.t=e.cta;
 if(e.tags)opt.tags.t=e.tags;
 if(e.thumb)opt.thumb.t=e.thumb;
 if(e.broll)opt.broll.t=e.broll;
 if(e.blog)opt.blog.t=e.blog;
 const dd=descDraft(x);if(dd)opt.desc.t=dd;
 S.videos.push({id:uid(),title:x.title.trim(),kw:(e.kw||'').trim(),fmt:'long',vert:'General',status:'draft',opt,metrics:blankMetrics(),flow:false,pub:{},script:x.body||''});});
 save();renderAll();toast(list.length+' script(s) added with fields pre-filled');}

/* ============ PACKAGING WITH CLAUDE ============
   The old importer tried to parse packaging out of raw scripts by pattern
   matching, and it guessed wrong more than it guessed right. This replaces it
   with a delegated loop: the tool writes a rigid prompt around the script,
   Claude does the thinking, and the reply comes back in a format the tool can
   read without guessing. Same pattern as the Communicator's topic refresh. */
const PKG_SECTIONS=[['TITLE','title'],['DESCRIPTION','desc'],['THUMBNAIL','thumb'],['BROLL','broll'],['EMPHASIS','emph'],['TAGS','tags'],['BLOG','blog'],['CTA','cta']];
function setScript(id,val){const v=vById(id);if(!v)return;v.script=val;save();toast('Script saved');}
function buildPkgPrompt(v){
 const reqs=OPT.map(o=>{
  const name=PKG_SECTIONS.find(x=>x[1]===o.k)[0];
  return name+': '+o.g;}).join('\n\n');
 return `You are packaging a YouTube video for Quinton Chambers, a Wealth Advisor in Winnipeg. Audience: Canadian incorporated business owners, physicians, and people in major life transitions. Tone: clear, specific, evidence based, no hype. Never use em dashes anywhere in your output.

Working title: ${v.title}
${v.kw?'Current target keyword: '+v.kw:''}

Read the script at the bottom, then produce the complete packaging.

Section requirements:

${reqs}

KEYWORD: The single primary target keyword for this video, on one line.

Reply with EXACTLY this structure: plain text, no markdown formatting, no commentary before or after, and keep every === line exactly as shown.

===TITLE===
(the title)
===DESCRIPTION===
(the full description)
===THUMBNAIL===
(the thumbnail text)
===BROLL===
(the b-roll and asset list)
===EMPHASIS===
(the 2 or 3 clip-worthy moments)
===TAGS===
(the tags, comma separated)
===BLOG===
(the companion blog post)
===CTA===
(the one CTA)
===KEYWORD===
(the keyword)

SCRIPT:
---
${v.script||''}`;
}
function copyPkgPrompt(id){const v=vById(id);if(!v)return;
 if(!(v.script||'').trim()){toast('Paste the script in first');return;}
 copyText(buildPkgPrompt(v),'Prompt copied. Paste it into Claude.');}
function applyPkg(id){const v=vById(id);if(!v)return;
 const el=document.getElementById('pkg-'+id);
 const raw=(el&&el.value||'').trim();
 if(!raw){toast("Paste Claude's reply in first");return;}
 const txt=raw.replace(/```[a-z]*\n?/gi,'');
 const parts=txt.split(/^===\s*([A-Za-z -]+?)\s*===\s*$/m);
 const map={};PKG_SECTIONS.forEach(x=>map[x[0]]=x[1]);map.ASSETS='broll';map.KEYWORD='kw';
 let filled=0;const snap=JSON.stringify({opt:v.opt,kw:v.kw});
 for(let i=1;i<parts.length;i+=2){
  const key=(parts[i]||'').toUpperCase().replace(/[^A-Z]/g,'');
  const val=(parts[i+1]||'').trim();
  const k=map[key];if(!k||!val)continue;
  if(k==='kw'){v.kw=val.split('\n')[0].trim();}
  else{v.opt[k].t=val;v.opt[k].d=true;}
  filled++;
 }
 if(!filled){toast('Could not read that. Keep the ===SECTION=== lines intact and try again.');return;}
 if(el)el.value='';
 save();renderAll();
 undoToast(filled+' field'+(filled===1?'':'s')+' filled from Claude',()=>{try{const o=JSON.parse(snap);v.opt=o.opt;v.kw=o.kw;save();renderAll();}catch(e){}});
}

function weekKey(d){const x=new Date(d);const day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0');}
const SLOTS=[
 {l:'S4',k:'short',ti:'Short 4, clipped from Saturday\'s long form'},
 {l:'L1',k:'long',ti:'Long form #1, publish 1pm'},
 {l:'S1',k:'short',ti:'Short 1, also posted natively on LinkedIn between 8 and 9:30am, link in comments'},

 {l:'L2',k:'long',ti:'Long form #2, publish 9am'},

     <div class="pip p-c ${c.c?'on':''}" title="10 connects sent, no pitch" onclick="tDay('${d.k}','c')">C</div>`:''}

  </div>

 </div>`;

function openVideo(id){openVid=id;vaultFilter='';selMode=false;go('vault');}
function nextAction(){
 const drafts=S.videos.filter(v=>v.status==='draft');
 const inc=drafts.find(v=>optPct(v)<100||!(parseFloat(v.score)>=80));
 const ready=drafts.filter(v=>optPct(v)===100&&parseFloat(v.score)>=80);
 const approved=S.videos.filter(v=>v.status==='approved');
 const produced=S.videos.filter(v=>v.status==='produced');
 const sched=S.videos.filter(v=>v.status==='scheduled');
 const schedInc=sched.find(v=>PUBC.some(p=>!(v.pub&&v.pub[p.k])));
 const pubNoMetrics=S.videos.filter(v=>v.status==='published'&&!num(v.metrics.ctr));
 if(!S.videos.length&&!S.roadmap.length)return{t:'The system is empty. Run your first vidIQ research batch to fill the roadmap.',b:'Open the research loop',fn:"go('roadmap')"};
 if(!S.videos.length)return{t:'The roadmap has ideas but the vault is empty. Promote your top idea, or bulk-import your existing script library.',b:'Open the vault',fn:"go('vault')"};
 if(inc)return{t:'Optimize "'+inc.title.slice(0,52)+'": fill the checklist and get the title scored 80+ in vidIQ.',b:'Open that script',fn:"openVideo('"+inc.id+"')"};
 if(ready.length)return{t:ready.length+' script'+(ready.length===1?' is':'s are')+' fully optimized and scored. Send to marketing, then flip to Approved when cleared.',b:'View ready drafts',fn:"vaultFilter='draft';go('vault')"};
 if(approved.length)return{t:approved.length+' approved script'+(approved.length===1?'':'s')+' waiting to be filmed. Batch them, then flip to Filmed / Edited.',b:'View approved',fn:"vaultFilter='approved';go('vault')"};
 if(schedInc)return{t:'Finish the publish checklist on "'+schedInc.title.slice(0,44)+'" before it goes live.',b:'Open that video',fn:"openVideo('"+schedInc.id+"')"};
 if(produced.length)return{t:produced.length+' edited video'+(produced.length===1?'':'s')+' ready to upload. Schedule for Tue 1pm or Sat 9am and run the publish checklist.',b:'View edited',fn:"vaultFilter='produced';go('vault')"};
 if(pubNoMetrics.length)return{t:'Enter the 7-day numbers for '+pubNoMetrics.length+' published video'+(pubNoMetrics.length===1?'':'s')+'.',b:'Open Metrics',fn:"go('metrics')"};
 return{t:'Pipeline is clear. Run the weekly research batch to keep the roadmap full.',b:'Open research',fn:"go('roadmap')"};
}
function renderFlow(){

 const wk=weekKey(new Date());const start=new Date(wk);const dk=[];
 for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);dk.push(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));}
 const longsDone=((S.cadence[dk[1]]||{}).m?1:0)+((S.cadence[dk[5]]||{}).m?1:0);

  ${step(4,false,'Get marketing approval','Send the finished draft package to marketing. When it clears, flip the status to Approved. Nothing films without this.','','')}

   month view of those dates: what goes out, and when. */
let calYM=(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};})();
let calSel=null;
const ST_LABEL={draft:'Draft',approved:'Approved',produced:'Filmed',scheduled:'Scheduled',published:'Published'};
const ST_ORDER=['draft','approved','produced','scheduled','published'];
function isoD(y,m,d){return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');}
function schedOn(ds){return S.videos.filter(v=>v.sched===ds);}
function calNav(dir){calYM.m+=dir;if(calYM.m<0){calYM.m=11;calYM.y--;}if(calYM.m>11){calYM.m=0;calYM.y++;}calSel=null;renderAll();}
function calPick(ds){calSel=(calSel===ds?null:ds);renderAll();}
function schedFromPicker(){
 const sel=document.getElementById('calPickScript'),dt=document.getElementById('calPickDate');
 if(!sel||!sel.value){toast('Nothing to schedule');return;}
 if(!dt||!dt.value){toast('Pick a date first');dt&&dt.focus();return;}
 const ds=dt.value;
 calYM={y:+ds.slice(0,4),m:+ds.slice(5,7)-1};
 calSel=ds;
 schedVid(sel.value,ds);
}
function schedVid(id,ds){const v=vById(id);if(!v)return;v.sched=ds||undefined;save();renderAll();if(ds)toast('On the calendar: '+ds);}
function unschedVid(id){const v=vById(id);if(!v)return;const was=v.sched;v.sched=undefined;save();renderAll();
 undoToast('Taken off '+(was||'the calendar'),()=>{try{v.sched=was;save();renderAll();}catch(e){}});}
function renderCalendar(){
 const y=calYM.y,m=calYM.m;
 const first=new Date(y,m,1),days=new Date(y,m+1,0).getDate(),lead=first.getDay();
 const today=(()=>{const d=new Date();return isoD(d.getFullYear(),d.getMonth(),d.getDate());})();
 const monthName=first.toLocaleDateString('en-CA',{month:'long',year:'numeric'});
 let cells='';
 for(let i=0;i<lead;i++)cells+='<div></div>';
 for(let d=1;d<=days;d++){
  const ds=isoD(y,m,d),items=schedOn(ds);
  const longs=items.filter(v=>v.fmt!=='short').length,shorts=items.filter(v=>v.fmt==='short').length;
  const isToday=ds===today,isSel=ds===calSel;
  cells+=`<div onclick="calPick('${ds}')" style="min-height:46px;border-radius:9px;padding:4px 3px;cursor:pointer;text-align:center;
   border:1px solid ${isSel?'rgba(255,255,255,.5)':isToday?'rgba(69,200,216,.55)':'rgba(120,130,180,.12)'};
   background:${isSel?'rgba(255,255,255,.07)':items.length?'rgba(255,255,255,.03)':'transparent'}">
   <div style="font-size:10.5px;font-family:'Space Mono',monospace;color:${isToday?'#45c8d8':'#8a93a8'}">${d}</div>
   <div style="display:flex;gap:2px;justify-content:center;margin-top:3px;flex-wrap:wrap">
    ${Array(Math.min(longs,3)).fill('<span style="width:6px;height:6px;border-radius:2px;background:#e6c872"></span>').join('')}
    ${Array(Math.min(shorts,4)).fill('<span style="width:5px;height:5px;border-radius:99px;background:#b79bff"></span>').join('')}
   </div></div>`;
 }
 const selItems=calSel?schedOn(calSel):[];
 const unsched=S.videos.filter(v=>!v.sched&&v.status!=='published').slice().reverse();
 return `
 <div class="card">
  <h2 style="margin-top:0">Schedule a script</h2>
  <div class="hint">Pick a script, pick a day, done. Or tap any day in the grid below and use Schedule here. Either way it lands on the calendar and in the month list.</div>
  ${unsched.length?`<div class="row">
   <select id="calPickScript" style="flex:1;min-width:150px">${unsched.map(v=>`<option value="${v.id}">${v.fmt==='short'?'[S] ':'[L] '}${esc(v.title.slice(0,48))}</option>`).join('')}</select>
   <input type="date" id="calPickDate" style="width:auto">
   <button class="btn sm" onclick="schedFromPicker()">Schedule</button>
  </div>`:'<div class="empty">Everything unpublished already has a date. Add a script in the vault and it will appear here.</div>'}
 </div>
 <div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
   <button class="btn sm line" onclick="calNav(-1)">&#8249; prev</button>
   <h2 style="margin:0">${monthName}</h2>
   <button class="btn sm line" onclick="calNav(1)">next &#8250;</button>
  </div>
  <div class="hint">One square, one day. <span style="color:#e6c872">&#9632;</span> long form &middot; <span style="color:#b79bff">&#9679;</span> short. Tap a day to see it, schedule to it, or clear it.</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:9px;letter-spacing:.08em;color:#6b7280;text-align:center;margin-bottom:4px">
   <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
 </div>
 ${calSel?`<div class="card">
  <h3 style="margin-top:0">${new Date(calSel+'T12:00').toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'})}</h3>
  ${selItems.length?selItems.map(v=>`
   <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(120,130,180,.1)">
    <div style="min-width:0">
     <span class="chip" style="font-size:9px;background:${v.fmt==='short'?'rgba(157,123,255,.16);color:#c9b3ff':'rgba(230,200,114,.14);color:#e6c872'}">${v.fmt==='short'?'Short':'Long'}</span>
     <span style="font-size:12.5px">${esc(v.title.slice(0,52))}</span>

    <button class="btn sm line" onclick="unschedVid('${v.id}')" style="flex-shrink:0">clear</button>
   </div>`).join(''):'<div class="empty">Nothing scheduled this day yet.</div>'}
  ${unsched.length?`<div class="row" style="margin-top:10px">
   <select id="calAssign" style="flex:1;min-width:160px">${unsched.map(v=>`<option value="${v.id}">${v.fmt==='short'?'[S] ':'[L] '}${esc(v.title.slice(0,48))}</option>`).join('')}</select>

  </div>`:''}
 </div>`:''}
 <div class="card">
  <h3 style="margin-top:0">This month, in order</h3>
  ${(()=>{const monthItems=S.videos.filter(v=>v.sched&&v.sched.slice(0,7)===isoD(y,m,1).slice(0,7)).sort((a,b)=>a.sched<b.sched?-1:1);
   return monthItems.length?monthItems.map(v=>`

    </div>`).join(''):'<div class="empty">Nothing on the calendar this month. Tap a day above and schedule a script to it.</div>';})()}
 </div>`;
}

 return `

   <div style="display:flex;justify-content:space-between;gap:8px;align-items:baseline">
    <h3 style="margin:0;font-size:13.5px">${esc(v.title.slice(0,60))}</h3>
    <span class="mono" style="font-size:10px;color:#8a93a8;flex-shrink:0">${done}/${kids.length} live</span>
   </div>
   <div style="font-size:10px;color:#8a93a8;margin:2px 0 4px">${ST_LABEL[v.status]||v.status}${v.sched?' &middot; long form on '+v.sched:''}</div>
   ${kids.map(shortRow).join('')}
  </div>`;}).join('')}
 ${(byParent._none||[]).length?`<div class="card"><h3 style="margin-top:0">Not linked yet</h3>
  <div class="hint">These shorts have no parent long form. Link them so the bench stays organized.</div>
  ${byParent._none.map(shortRow).join('')}</div>`:''}
 ${(()=>{const bare=longs.filter(v=>!(byParent[v.id]||[]).length&&(v.status==='published'||v.status==='scheduled'||v.status==='produced'));
  return bare.length?`<div class="card"><h3 style="margin-top:0">Long forms with no shorts yet</h3>
   <div class="hint">Every long form should feed the shorts bench eventually. One tap drafts a short from its emphasis points.</div>
   ${bare.slice().reverse().map(v=>`<div style="display:flex;justify-content:space-between;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(120,130,180,.08)">
    <span style="font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.title)}</span>
    <button class="btn sm line" onclick="spawnShort('${v.id}')" style="flex-shrink:0">+ Draft short</button>
   </div>`).join('')}</div>`:'';})()}
 `;
}

function renderAll(){renderTabs();renderRail();
 const v=document.getElementById('view');
 v.innerHTML={flow:renderFlow,vault:renderVault,calendar:renderCalendar,shorts:renderShorts,cadence:renderCadence,metrics:renderMetrics,funnel:renderFunnel,systems:renderSystems,roadmap:renderRoadmap}[cur]();}
renderAll();

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();

</script>
