<style>
:root{
  --bg:#0c0e1a; --card:#141830; --card2:#1a1f3a; --line:rgba(120,130,180,.16);
  --gold:#f0b73e; --gold2:#f6cf6a; --green:#2fd180; --rose:#f0628a; --blue:#4ea3e0; --violet:#9d7bff; --amber:#f0683e;
  --txt:#eef0fb; --muted:#8089a8; --dim:#6f7798;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:
   radial-gradient(1100px 600px at 50% -10%,rgba(240,183,62,.07),transparent 60%),
   var(--bg);
  color:var(--txt);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;
  padding:0;-webkit-font-smoothing:antialiased}
#app{max-width:640px;margin:0 auto;
  padding:0 max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right))}

/* App chrome. The blurred fill runs up under the Dynamic Island so the clock,
   signal, wifi and battery never sit on top of content. */
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}
.appbar{position:sticky;top:0;z-index:50;
  margin:0 calc(-1 * max(14px,env(safe-area-inset-left))) 12px;
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(14px,env(safe-area-inset-left)) 11px max(14px,env(safe-area-inset-right));
  background:rgba(12,14,26,.90);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.appbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#f3f4fb;letter-spacing:.04em;white-space:nowrap;line-height:1.1}
.appbar-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;white-space:nowrap}
.appbar-pill{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:99px;
  background:rgba(240,183,62,.1);border:1px solid rgba(240,183,62,.35);
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap;flex-shrink:0}
.cinzel{font-family:'Cinzel',serif}
.mono{font-family:'Space Mono',monospace}
.eyebrow{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
.panel{background:linear-gradient(180deg,rgba(26,31,58,.9),rgba(20,24,48,.9));border:1px solid var(--line);border-radius:16px;backdrop-filter:blur(8px)}
.btn{font-family:inherit;cursor:pointer;border:none;background:transparent;color:inherit}
.tap{transition:transform .1s,filter .15s}
.tap:active{transform:scale(.94)}
.row{border-radius:10px;transition:background .15s}
.row:active{background:rgba(255,255,255,.03)}
.bartrack{width:100%;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.22,.61,.36,1)}
input,select,textarea{font-family:inherit;outline:none;color-scheme:dark}
.num{width:56px;background:transparent;border:none;color:var(--txt);text-align:center;font-family:'Space Mono',monospace;font-size:13px}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}
.overlay{position:fixed;inset:0;background:rgba(6,7,14,.86);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:18px;z-index:60;animation:fade .2s ease-out}
@keyframes fade{from{opacity:0}to{opacity:1}}
.fadeUp{animation:fu .28s cubic-bezier(.22,.61,.36,1)}
@keyframes fu{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
#toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(80px);
  background:rgba(20,23,38,.97);border:1px solid rgba(240,183,62,.45);color:var(--txt);padding:11px 18px;border-radius:99px;
  font-size:12.5px;z-index:80;opacity:0;transition:.28s;white-space:nowrap;box-shadow:0 12px 32px rgba(0,0,0,.5);pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:600;white-space:nowrap}
a{color:inherit}
</style>

/* ===================== storage ===================== */
var KEY="lifemap_v1";
var store=(function(){
  var mem={};
  function ok(){ try{ localStorage.setItem("__t","1"); localStorage.removeItem("__t"); return true; }catch(e){ return false; } }
  var has=ok();
  return {
    get:function(k){ try{ return Promise.resolve(has?localStorage.getItem(k):(mem[k]||null)); }catch(e){ return Promise.resolve(mem[k]||null); } },
    set:function(k,v){ try{ if(has) localStorage.setItem(k,v); else mem[k]=v; }catch(e){ mem[k]=v; } }
  };
})();
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(m){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]; }); }

var S={projects:[],chores:[],checks:{},log:[]};

/* ===================== dates + periods ===================== */
function todayISO(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function isoToTs(iso){ if(!iso) return NaN; var p=String(iso).split("-"); var d=new Date(+p[0],+p[1]-1,+p[2]); d.setHours(0,0,0,0); return d.getTime(); }
function todayTs(){ var d=new Date(); d.setHours(0,0,0,0); return d.getTime(); }
function daysUntil(iso){ var t=isoToTs(iso); if(isNaN(t)) return null; return Math.round((t-todayTs())/86400000); }
function fmtDay(iso){ var t=isoToTs(iso); if(isNaN(t)) return ""; return new Date(t).toLocaleDateString(undefined,{month:"short",day:"numeric"}); }
function periodKey(cad){
  var d=new Date(), y=d.getFullYear();
  if(cad==="Daily") return d.toDateString();
  if(cad==="Weekly"){ var t=new Date(d); t.setHours(0,0,0,0); t.setDate(t.getDate()-((t.getDay()+6)%7)); return "W"+t.toDateString(); }
  if(cad==="Monthly") return "M"+y+"-"+d.getMonth();
  if(cad==="Quarterly") return "Q"+y+"-"+Math.floor(d.getMonth()/3);
  return "Y"+y;
}
function isChecked(c){ return S.checks[c.id]===periodKey(c.cad); }

/* ===================== model helpers ===================== */
var STATUSES=["Not started","In progress","Done"];
var PRIS=["High","Med","Low"];
var CADS=["Daily","Weekly","Monthly","Quarterly","Annual"];
function priColor(p){ return p==="High"?"var(--rose)":p==="Med"?"var(--gold)":"var(--muted)"; }
function statusColor(s){ return s==="Done"?"var(--green)":s==="In progress"?"var(--blue)":"var(--muted)"; }
function areaBy(name){ for(var i=0;i<AREAS.length;i++){ if(AREAS[i].name===name) return AREAS[i]; } return {name:name,icon:"\u2727",desc:""}; }
function openProjects(){ return S.projects.filter(function(p){ return p.status!=="Done"; }); }
function isOverdue(p){ var d=daysUntil(p.due); return p.status!=="Done" && d!==null && d<0; }
function isDueSoon(p){ var d=daysUntil(p.due); return p.status!=="Done" && d!==null && d>=0 && d<=14; }
function choresDue(){ return S.chores.filter(function(c){ return !isChecked(c); }); }
function choresDueByCad(cad){ return S.chores.filter(function(c){ return c.cad===cad && !isChecked(c); }); }

/* Focus = what actually deserves attention right now, ranked. */
function focusItems(){
  var out=[];
  S.projects.forEach(function(p){
    if(p.status==="Done") return;
    var d=daysUntil(p.due), score=0, why="";
    if(d!==null && d<0){ score=100+Math.min(60,-d); why=Math.abs(d)+"d overdue"; }
    else if(d!==null && d<=14){ score=70-d; why=(d===0?"due today":d===1?"due tomorrow":"due in "+d+"d"); }
    else if(p.pri==="High"){ score=50; why="high priority"; }
    else return;
    if(p.pri==="High") score+=12; else if(p.pri==="Med") score+=4;
    if(p.status==="In progress") score+=6;
    out.push({p:p,score:score,why:why});
  });
  out.sort(function(a,b){ return b.score-a.score; });
  return out;
}

/* ===================== stats ===================== */
function stats(){
  var total=S.projects.length;
  var done=S.projects.filter(function(p){ return p.status==="Done"; }).length;
  var prog=S.projects.filter(function(p){ return p.status==="In progress"; }).length;
  var open=total-done;
  var hi=S.projects.filter(function(p){ return p.status!=="Done" && p.pri==="High"; }).length;
  var over=S.projects.filter(isOverdue).length;
  var soon=S.projects.filter(isDueSoon).length;
  var ck=S.chores.filter(isChecked).length;
  return {total:total,done:done,open:open,prog:prog,hi:hi,over:over,soon:soon,
          pct: total?Math.round(done/total*100):0, choreDone:ck, choreTotal:S.chores.length,
          chorePct: S.chores.length?Math.round(ck/S.chores.length*100):0};
}
function doneInLastDays(n){
  var cut=todayTs()-(n-1)*86400000;
  return (S.log||[]).filter(function(e){ return e.t==="proj" && isoToTs(e.d)>=cut; }).length;
}

  var cur=null;

      h+='<div style="display:flex;align-items:center;gap:6px;margin:13px 2px 5px"><span style="font-size:12px">'+a.icon+'</span><span class="eyebrow" style="font-size:9px;color:var(--muted)">'+esc(cur)+'</span></div>';

/* ===================== UI: momentum ===================== */
function momentumView(st){
  var h='';
  var w4=doneInLastDays(28), w1=doneInLastDays(7);
  function tile(v,l,c){ return '<div style="flex:1;text-align:center;padding:10px 4px;border-radius:11px;background:rgba(255,255,255,.025);border:1px solid rgba(120,130,180,.1)"><div class="mono" style="font-size:17px;font-weight:700;color:'+(c||"var(--txt)")+'">'+v+'</div><div class="eyebrow" style="font-size:8px;margin-top:3px">'+l+'</div></div>'; }
  h+='<div style="display:flex;gap:7px">'+tile(w1,"Done (7d)","var(--green)")+tile(w4,"Done (28d)","var(--green)")+tile(st.chorePct+"%","Chores cycle","var(--gold)")+'</div>';

  // 12-week bars of completions
  var weeks=12, buckets=new Array(weeks).fill(0), t0=todayTs();
  (S.log||[]).forEach(function(e){
    if(e.t!=="proj") return;
    var ts=isoToTs(e.d); if(isNaN(ts)) return;
    var wk=Math.floor((t0-ts)/(7*86400000));
    if(wk>=0 && wk<weeks) buckets[weeks-1-wk]++;
  });
  var mx=Math.max.apply(null,buckets.concat([1]));
  h+='<div style="margin-top:14px"><div class="eyebrow" style="font-size:9px;color:var(--muted);margin-bottom:7px">Completions \u00b7 last 12 weeks</div>';
  h+='<div style="display:flex;align-items:flex-end;gap:3px;height:56px">';
  buckets.forEach(function(b,i){
    var pct=Math.max(3,Math.round(b/mx*100));
    h+='<div title="'+b+'" style="flex:1;height:'+pct+'%;border-radius:4px 4px 2px 2px;background:'+(b?"linear-gradient(180deg,#f6cf6a,#e2a32f)":"rgba(255,255,255,.05)")+'"></div>';
  });
  h+='</div><div style="display:flex;justify-content:space-between;margin-top:5px"><span style="font-size:8.5px;color:var(--dim)">12 wks ago</span><span style="font-size:8.5px;color:var(--dim)">this week</span></div></div>';

  if(!(S.log||[]).length) h+='<div style="font-size:10.5px;color:var(--dim);margin-top:10px;line-height:1.5;font-style:italic">Mark projects Done and this fills in. It only counts completions from here forward, so the first bars start now.</div>';

  // area leaderboard: most open
  var rows=AREAS.map(function(a){
    var ps=S.projects.filter(function(p){ return p.area===a.name && p.status!=="Done"; });
    return {a:a,n:ps.length};
  }).filter(function(r){ return r.n>0; }).sort(function(x,y){ return y.n-x.n; }).slice(0,5);
  if(rows.length){
    h+='<div style="margin-top:16px"><div class="eyebrow" style="font-size:9px;color:var(--muted);margin-bottom:7px">Heaviest areas \u00b7 most open</div>';
    var top=rows[0].n;
    rows.forEach(function(r){
      h+='<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--txt)">'+r.a.icon+' '+esc(r.a.name)+'</span><span class="mono" style="color:var(--muted);font-size:10px">'+r.n+'</span></div>';
      h+='<div class="bartrack" style="height:4px;margin-top:3px"><div class="fill" style="width:'+Math.round(r.n/top*100)+'%;background:linear-gradient(90deg,#e2a32f,#f6cf6a)"></div></div></div>';
    });
    h+='</div>';
  }
  return h;
}

/* ===================== actions ===================== */

/* Destructive actions were one-way. Snapshot first, then keep Undo on screen. */
var __undoT=null;
function undoToast(msg, restore){
  var t=document.getElementById('undoToast');
  if(!t){ t=document.createElement('div'); t.id='undoToast'; document.body.appendChild(t); }
  t.style.cssText="position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:95;"
   +"background:rgba(20,23,38,.97);border:1px solid rgba(240,183,62,.5);color:#f6e2ad;padding:10px 16px;border-radius:12px;"
   +"font-family:'Outfit',sans-serif;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.55);display:flex;align-items:center;gap:12px;max-width:92vw";
  t.textContent='';
  var s=document.createElement('span'); s.textContent=msg; t.appendChild(s);
  var b=document.createElement('button'); b.textContent='Undo';
  b.style.cssText="background:rgba(240,183,62,.16);border:1px solid rgba(240,183,62,.5);color:#f0b73e;font-family:inherit;"
   +"font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer;flex-shrink:0";
  b.onclick=function(){ try{ restore(); }catch(e){} t.remove(); };
  t.appendChild(b);
  clearTimeout(__undoT); __undoT=setTimeout(function(){ if(t&&t.parentNode) t.remove(); },7000);
}

function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("on"); clearTimeout(toast._t); toast._t=setTimeout(function(){ t.classList.remove("on"); },2200); }

function advance(id){
  var p=S.projects.find(function(x){ return x.id===id; }); if(!p) return;
  var i=STATUSES.indexOf(p.status); if(i<0) i=0;
  var next=STATUSES[(i+1)%STATUSES.length];
  p.status=next;
  if(next==="Done"){ p.doneAt=todayISO(); S.log=S.log||[]; S.log.push({t:"proj",id:p.id,d:todayISO()}); toast("\u2713 Done: "+p.task.slice(0,38)); }
  else { delete p.doneAt; S.log=(S.log||[]).filter(function(e){ return !(e.t==="proj"&&e.id===p.id); }); }
  save(); render();
}
function tick(id){
  var c=S.chores.find(function(x){ return x.id===id; }); if(!c) return;
  var k=periodKey(c.cad);
  if(S.checks[c.id]===k){ delete S.checks[c.id]; }
  else { S.checks[c.id]=k; toast("\u2713 "+c.chore.slice(0,38)); }
  save(); render();
}

app.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act, id=el.dataset.id, key=el.dataset.key;
  if(act==="f") return;
  if(act==="section"){ view.open[key]=!view.open[key]; render(); }
  else if(act==="advance"){ advance(id); }
  else if(act==="tick"){ tick(id); }
  else if(act==="focusAll"){ view.focusAll=!view.focusAll; render(); }
  else if(act==="area"){ view.fArea=el.dataset.area; view.fStatus="_open"; view.open.proj=true; render();
    var pc=document.querySelector('[data-act="section"][data-key="proj"]'); if(pc) pc.scrollIntoView({behavior:"smooth",block:"start"}); }
  else if(act==="edit"){ var p=S.projects.find(function(x){ return x.id===id; }); if(p){ view.editor=Object.assign({kind:"proj"},p); render(); } }
  else if(act==="editc"){ var c=S.chores.find(function(x){ return x.id===id; }); if(c){ view.editor=Object.assign({kind:"chore"},c); render(); } }
  else if(act==="add"){ view.editor=(el.dataset.kind==="chore")?{kind:"chore",cad:"Weekly"}:{kind:"proj",area:(view.fArea||AREAS[0].name),pri:"Med",status:"Not started"}; render(); }
  else if(act==="closeEditor"){ view.editor=null; render(); }
  else if(act==="saveEditor"){ saveEditor(); }
  else if(act==="delEditor"){ delEditor(); }
  else if(act==="export"){ exportData(); }
  else if(act==="import"){ var f=document.getElementById("importFile"); if(f) f.click(); }
  else if(act==="reset"){ if(window.confirm("Reset the whole board to the seeded defaults? Export a backup first if you want to keep your edits.")){
      var snap=JSON.stringify(S); S=seedState(); save(); render();
      undoToast("Board reset to defaults", function(){ try{ S=JSON.parse(snap); save(); render(); }catch(e){} });
    } }
});
app.addEventListener("input",function(ev){
  var el=ev.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act;
  if(act==="f"){ if(view.editor) view.editor[el.dataset.k]=el.value; return; }
  if(act==="q"){ view.q=el.value; var pos=el.selectionStart; render();
    var q2=document.querySelector('[data-act="q"]'); if(q2){ q2.focus(); try{ q2.setSelectionRange(pos,pos); }catch(e){} } }
});
app.addEventListener("change",function(ev){
  var el=ev.target.closest("[data-act]"); if(!el) return;
  var act=el.dataset.act;
  if(act==="f"){ if(view.editor) view.editor[el.dataset.k]=el.value; return; }
  if(act==="fArea"){ view.fArea=el.value; render(); }
  else if(act==="fStatus"){ view.fStatus=el.value; render(); }

  else if(el.id==="importFile"){ if(el.files&&el.files[0]) importData(el.files[0]); }
});

function saveEditor(){
  var e=view.editor; if(!e) return;
  if(e.kind==="chore"){
    if(!(e.chore||"").trim()){ toast("Name the chore first"); return; }
    if(e.id){ var c=S.chores.find(function(x){ return x.id===e.id; }); if(c){ c.chore=e.chore.trim(); c.cad=e.cad||"Weekly"; c.zone=e.zone||""; c.who=e.who||""; c.notes=e.notes||""; } }
    else { S.chores.push({id:uid(),cad:e.cad||"Weekly",chore:e.chore.trim(),zone:e.zone||"",who:e.who||"",notes:e.notes||""}); }
  } else {
    if(!(e.task||"").trim()){ toast("Describe the task first"); return; }
    if(e.id){ var p=S.projects.find(function(x){ return x.id===e.id; });
      if(p){ var wasDone=p.status==="Done";
        p.task=e.task.trim(); p.area=e.area||AREAS[0].name; p.sub=e.sub||""; p.pri=e.pri||"Med"; p.status=e.status||"Not started"; p.due=e.due||""; p.notes=e.notes||"";
        if(p.status==="Done" && !wasDone){ p.doneAt=todayISO(); S.log=S.log||[]; S.log.push({t:"proj",id:p.id,d:todayISO()}); }
        if(p.status!=="Done" && wasDone){ delete p.doneAt; S.log=(S.log||[]).filter(function(x){ return !(x.t==="proj"&&x.id===p.id); }); }
      } }
    else { var np={id:uid(),area:e.area||AREAS[0].name,sub:e.sub||"",task:e.task.trim(),pri:e.pri||"Med",status:e.status||"Not started",due:e.due||"",notes:e.notes||""};
      if(np.status==="Done"){ np.doneAt=todayISO(); S.log=S.log||[]; S.log.push({t:"proj",id:np.id,d:todayISO()}); }
      S.projects.push(np); }
  }
  view.editor=null; save(); render(); toast("Saved");
}
function delEditor(){
  var e=view.editor; if(!e||!e.id) return;
  var what=(e.kind==="chore")?(e.chore||"chore"):(e.task||"project");
  if(!window.confirm("Delete this?\n\n"+what)) return;
  var snap=JSON.stringify(S);
  if(e.kind==="chore"){ S.chores=S.chores.filter(function(x){ return x.id!==e.id; }); delete S.checks[e.id]; }
  else { S.projects=S.projects.filter(function(x){ return x.id!==e.id; }); S.log=(S.log||[]).filter(function(x){ return x.id!==e.id; }); }
  view.editor=null; save(); render();
  undoToast("Deleted \u201c"+String(what).slice(0,30)+"\u201d", function(){ try{ S=JSON.parse(snap); save(); render(); }catch(err){} });
}
function exportData(){
  try{
    var payload={app:"life-map",version:2,exportedAt:new Date().toISOString(),projects:S.projects,chores:S.chores,checks:S.checks,log:S.log||[]};
    var blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    var url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download="life-map-"+todayISO()+".json"; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },500);
    toast("\u2713 Backup exported");
  }catch(e){ toast("Export failed"); }
}
function importData(file){
  var r=new FileReader();
  r.onload=function(){
    try{
      var o=JSON.parse(r.result);
      if(!o || !Array.isArray(o.projects)){ toast("No board in that file"); return; }
      S.projects=o.projects; 
      if(Array.isArray(o.chores)) S.chores=o.chores;
      if(o.checks && typeof o.checks==="object") S.checks=o.checks;
      S.log=Array.isArray(o.log)?o.log:[];
      save(); render(); toast("\u2713 Imported ("+S.projects.length+" projects)");
    }catch(e){ toast("Couldn\u2019t read that file"); }
  };
  r.onerror=function(){ toast("Couldn\u2019t read that file"); };
  r.readAsText(file);
}

/* Chores reset by period, so a page left open across a rollover would show
   stale ticks. Re-render when the day changes or the app is resumed. */
var lastDay=todayISO();
function dayRollCheck(){ var t=todayISO(); if(t!==lastDay){ lastDay=t; render(); } }
document.addEventListener("visibilitychange",function(){ if(!document.hidden) dayRollCheck(); });
window.addEventListener("pageshow",function(e){ if(e && e.persisted) dayRollCheck(); });
window.addEventListener("focus",dayRollCheck);
setInterval(dayRollCheck,60000);

/* ===================== boot ===================== */
store.get(KEY).then(function(v){
  var parsed=null;
  if(v){ try{ parsed=JSON.parse(v); }catch(e){ parsed=null; } }
  if(parsed && Array.isArray(parsed.projects)){
    S=parsed;
    if(!Array.isArray(S.chores)) S.chores=[];
    if(!S.checks || typeof S.checks!=="object") S.checks={};
    if(!Array.isArray(S.log)) S.log=[];   // migrate older saves
  } else {
    S=seedState(); save();
  }
  render();
});
render();

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();

</script>
