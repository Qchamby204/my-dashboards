:root{
  --bg:#0c0e1a; --card:#141830; --card2:#1a1f3a; --line:#262c4d;
  --gold:#c9a227; --gold2:#e8c95a; --green:#3ddc84; --rose:#e56399;
  --cyan:#57c7ff; --violet:#a78bfa; --txt:#f5f1e8; --muted:#8f97b3;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;padding-bottom:90px}
#stars{position:fixed;inset:0;z-index:0;pointer-events:none}
.wrap{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:18px 14px}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
h1{font-family:'Cinzel',serif;font-size:1.35rem;color:var(--gold);letter-spacing:.06em}
h1 span{color:var(--txt);font-size:.8rem;font-family:'Outfit',sans-serif;letter-spacing:.02em;display:block;color:var(--muted)}
.hbtns{display:flex;gap:8px;flex-wrap:wrap}
button{font-family:'Outfit',sans-serif;cursor:pointer;border:none;border-radius:10px;font-size:.85rem}
.ghost{background:var(--card);color:var(--muted);border:1px solid var(--line);padding:9px 13px;min-height:44px}
.ghost:hover{color:var(--txt);border-color:var(--gold)}
.gold{background:linear-gradient(135deg,var(--gold),#a8841c);color:#0c0e1a;font-weight:700;padding:9px 15px;min-height:44px}
nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
nav button{flex:0 0 auto;padding:10px 16px;min-height:44px;background:var(--card);color:var(--muted);border:1px solid var(--line);font-weight:600}
nav button.on{background:var(--card2);color:var(--gold);border-color:var(--gold)}
.statbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 16px;text-align:center;flex:1;min-width:100px}
.stat b{display:block;font-size:1.3rem;color:var(--gold)}
.stat.gr b{color:var(--green)}
.stat small{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em}
/* MAP */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.acard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .15s,transform .15s;position:relative}
.acard:hover{border-color:var(--gold);transform:translateY(-2px)}
.acard h3{font-size:.95rem;margin-bottom:2px;display:flex;gap:8px;align-items:center}
.acard .ic{font-size:1.05rem}
.acard p{color:var(--muted);font-size:.76rem;line-height:1.35;margin-bottom:10px;min-height:2.6em}
.bar{height:6px;background:#0a0c16;border-radius:4px;overflow:hidden;margin-bottom:7px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:4px}
.acard .nums{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted)}
.acard .nums b{color:var(--gold2)}
.acard .nums .d{color:var(--green)}
/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
select,input,textarea{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 10px;font-family:'Outfit',sans-serif;font-size:16px;min-height:44px}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--gold)}
.filters select{max-width:220px}
.count{color:var(--muted);font-size:.8rem;margin-left:auto}
/* PROJECT ROWS */
.rows{display:flex;flex-direction:column;gap:8px}
.row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
.row.done{opacity:.55}
.row .main{flex:1;min-width:220px}
.row .task{font-size:.92rem;font-weight:500}
.row.done .task{text-decoration:line-through}
.row .meta{font-size:.73rem;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:8px;font-size:.7rem;border:1px solid var(--line);background:var(--card2)}
.tag.area{color:var(--gold2);border-color:#4a3d10}
.pri-High{color:var(--rose)} .pri-Med{color:var(--gold2)} .pri-Low{color:var(--muted)}
.hyp{color:var(--violet);font-style:italic}
.row .acts{display:flex;gap:6px;align-items:center}
.pill{padding:7px 11px;border-radius:20px;font-size:.74rem;font-weight:600;border:1px solid var(--line);min-height:36px}
.st-Notstarted{background:var(--card2);color:var(--muted)}
.st-Inprogress{background:#1c2a1e;color:var(--gold2);border-color:#4a3d10}
.st-Waiting{background:#241a2e;color:var(--violet);border-color:#3c2d52}
.st-Done{background:#12291c;color:var(--green);border-color:#1e4a30}
.mini{background:var(--card2);border:1px solid var(--line);color:var(--muted);width:36px;height:36px;border-radius:9px;font-size:.85rem}
.mini:hover{color:var(--txt);border-color:var(--gold)}
.editbox{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.editbox .full{grid-column:1/-1}
/* CHORES */
.cadsec{margin-bottom:18px}
.cadsec h2{font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.cadsec h2 small{font-family:'Outfit',sans-serif;color:var(--muted);font-size:.72rem;letter-spacing:.02em;font-weight:400}
.c-Daily{color:var(--gold2)} .c-Weekly{color:var(--txt)} .c-Monthly{color:var(--cyan)} .c-Quarterly{color:var(--violet)} .c-Annual{color:var(--green)}
.chrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;display:flex;gap:11px;align-items:center;margin-bottom:7px}
.chk{width:26px;height:26px;min-width:26px;border-radius:8px;border:2px solid var(--line);background:transparent;display:flex;align-items:center;justify-content:center;font-size:.9rem;color:transparent}
.chrow.ck .chk{background:var(--green);border-color:var(--green);color:#0c0e1a}
.chrow.ck .cname{text-decoration:line-through;color:var(--muted)}
.chrow .cmain{flex:1}
.cname{font-size:.9rem}
.czone{font-size:.71rem;color:var(--muted);margin-top:1px}
.cwho{font-size:.72rem;color:var(--cyan);background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:3px 8px;cursor:pointer;min-height:30px}
/* MODAL */
.modal{position:fixed;inset:0;background:rgba(5,6,12,.75);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal.on{display:flex}
.sheet{background:var(--card2);border:1px solid var(--line);border-radius:18px 18px 0 0;padding:18px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.sheet h2{font-family:'Cinzel',serif;color:var(--gold);font-size:1rem;margin-bottom:12px}
.sheet .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sheet .full{grid-column:1/-1}
.sheet label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px}
.sheet .btns{display:flex;gap:9px;margin-top:14px}
.sheet .btns button{flex:1;min-height:48px}
#toast{position:fixed;bottom:104px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--gold);color:var(--txt);padding:11px 20px;border-radius:12px;font-size:.85rem;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
footer{position:relative;z-index:1;max-width:1080px;margin:26px auto 0;padding:0 14px 20px;border-top:1px solid var(--line)}
.suite{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;justify-content:center}

@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
@media (max-width:560px){.grid{grid-template-columns:1fr 1fr}.acard p{display:none}.row .main{min-width:150px}}

</head>

  </div>

</nav>

<div class="statbar" id="statbar"></div>
<div id="v-map" class="grid"></div>
<div id="v-proj" style="display:none">
  <div class="filters">
    <select id="fArea" onchange="render()"></select>

      <option value="">All statuses</option><option>Not started</option><option>In progress</option><option>Waiting</option><option value="Done">Done</option><option value="_open">Open only</option>
    </select>
    <select id="fPri" onchange="render()">
      <option value="">Any priority</option><option>High</option><option>Med</option><option>Low</option>
    </select>
    <span class="count" id="pCount"></span>
  </div>
  <div class="rows" id="pRows"></div>
</div>
<div id="v-chores" style="display:none"></div>
</div>

<button class="fab" onclick="openAdd()" title="Add">+</button>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <h2 id="mTitle">Add item</h2>
    <div class="fgrid">
      <div class="full"><label>Type</label>
        <select id="mType" onchange="mTypeSwap()" style="width:100%"><option value="p">Project / Task</option><option value="c">Chore</option></select></div>
      <div id="mProjF" class="full">
        <div class="fgrid">
          <div><label>Life area</label><select id="mArea" style="width:100%"></select></div>
          <div><label>Sub-area / room</label><input id="mSub" style="width:100%" placeholder="e.g. Kitchen"></div>
          <div class="full"><label>Task</label><input id="mTask" style="width:100%" placeholder="What needs doing"></div>
          <div><label>Priority</label><select id="mPri" style="width:100%"><option>High</option><option selected>Med</option><option>Low</option></select></div>
          <div><label>Status</label><select id="mStatus" style="width:100%"><option selected>Not started</option><option>In progress</option><option>Waiting</option><option>Done</option></select></div>
          <div><label>Due (optional)</label><input id="mDue" type="date" style="width:100%"></div>
          <div><label>Notes</label><input id="mNotes" style="width:100%"></div>
        </div>
      </div>
      <div id="mChoreF" class="full" style="display:none">
        <div class="fgrid">
          <div><label>Cadence</label><select id="mCad" style="width:100%"><option>Daily</option><option selected>Weekly</option><option>Monthly</option><option>Quarterly</option><option>Annual</option></select></div>
          <div><label>Zone</label><input id="mZone" style="width:100%" placeholder="e.g. Kitchen"></div>
          <div class="full"><label>Chore</label><input id="mChore" style="width:100%"></div>
          <div><label>Who</label><input id="mWho" style="width:100%" placeholder="Q / Jo / both"></div>
          <div><label>Notes</label><input id="mCNotes" style="width:100%"></div>
        </div>
      </div>
    </div>
    <div class="btns">
      <button class="ghost" onclick="closeModal()">Cancel</button>
      <button class="gold" onclick="saveAdd()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <div class="suite">
    <a class="me" href="life-map.html">⟡ Life Map</a>

</footer>

/* ============ STATE ============ */
const KEY="lifemap_v1";
let S=null;
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function load(){
  try{S=JSON.parse(localStorage.getItem(KEY))}catch(e){S=null}
  if(!S||!S.projects){
    S={projects:SEED_P.map(p=>({id:uid(),area:p[0],sub:p[1],task:p[2],pri:p[3],status:p[4],due:p[5],notes:p[6]})),
       chores:SEED_C.map(c=>({id:uid(),cad:c[0],chore:c[1],zone:c[2],who:c[3],notes:c[4]})),
       checks:{}};
    save();
  }
}
function save(){localStorage.setItem(KEY,JSON.stringify(S))}

/* period keys — chores auto-reset when the period rolls over */
function periodKey(cad){
  const d=new Date(),y=d.getFullYear();
  if(cad==="Daily")return d.toDateString();
  if(cad==="Weekly"){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()-((t.getDay()+6)%7));return"W"+t.toDateString()}
  if(cad==="Monthly")return"M"+y+"-"+d.getMonth();
  if(cad==="Quarterly")return"Q"+y+"-"+Math.floor(d.getMonth()/3);
  return"Y"+y;
}
function isChecked(c){return S.checks[c.id]===periodKey(c.cad)}

/* ============ NAV / RENDER ============ */
let view="map";
function go(v){view=v;
  ["map","proj","chores"].forEach(x=>{
    document.getElementById("v-"+x).style.display=(x===v)?(x==="map"?"grid":"block"):"none";
    document.getElementById("nav-"+x).classList.toggle("on",x===v);
  });
  render();
}
function esc(s){return(s||"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}

function render(){
  renderStats();
  if(view==="map")renderMap();
  if(view==="proj")renderProj();
  if(view==="chores")renderChores();
}
function renderStats(){
  const open=S.projects.filter(p=>p.status!=="Done").length;
  const done=S.projects.filter(p=>p.status==="Done").length;
  const hi=S.projects.filter(p=>p.status!=="Done"&&p.pri==="High").length;
  const ck=S.chores.filter(isChecked).length;
  document.getElementById("statbar").innerHTML=
    `<div class="stat"><b>${open}</b><small>open</small></div>
     <div class="stat"><b style="color:var(--rose)">${hi}</b><small>high priority</small></div>
     <div class="stat gr"><b>${done}</b><small>done</small></div>
     <div class="stat gr"><b>${ck}/${S.chores.length}</b><small>chores this cycle</small></div>`;
}
function renderMap(){
  const el=document.getElementById("v-map");
  el.innerHTML=AREAS.map(a=>{
    const ps=S.projects.filter(p=>p.area===a.name);
    const done=ps.filter(p=>p.status==="Done").length;
    const pct=ps.length?Math.round(done/ps.length*100):0;
    return`<div class="acard" onclick="jump('${esc(a.name).replace(/'/g,"\\'")}')">
      <h3><span class="ic">${a.icon}</span>${esc(a.name)}</h3><p>${esc(a.desc)}</p>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="nums"><span><b>${ps.length-done}</b> open</span><span class="d">${done} done</span></div></div>`;
  }).join("");
}
function jump(area){document.getElementById("fArea").value=area;document.getElementById("fStatus").value="_open";go("proj")}

function renderProj(){
  const fA=document.getElementById("fArea"),sel=fA.value;
  if(fA.options.length<2){fA.innerHTML='<option value="">All areas</option>'+AREAS.map(a=>`<option>${esc(a.name)}</option>`).join("");fA.value=sel}
  const fS=document.getElementById("fStatus").value,fP=document.getElementById("fPri").value;
  const priRank={High:0,Med:1,Low:2},stRank={"In progress":0,"Not started":1,"Waiting":2,"Done":3};
  let list=S.projects.filter(p=>
    (!fA.value||p.area===fA.value)&&
    (fS==="_open"?p.status!=="Done":(!fS||p.status===fS))&&
    (!fP||p.pri===fP));
  list=[...list].sort((a,b)=>(stRank[a.status]-stRank[b.status])||(priRank[a.pri]-priRank[b.pri]));
  document.getElementById("pCount").textContent=list.length+" items";
  document.getElementById("pRows").innerHTML=list.map(p=>{
    const stCls="st-"+p.status.replace(/ /g,"");
    const hyp=/hypothetical/i.test(p.notes||"");
    return`<div class="row ${p.status==="Done"?"done":""}" id="r-${p.id}">
      <div class="main">
        <div class="task">${esc(p.task)}</div>
        <div class="meta">
          <span class="tag area">${esc(p.area)}</span>
          ${p.sub?`<span class="tag">${esc(p.sub)}</span>`:""}
          <span class="tag pri-${p.pri}">${p.pri}</span>
          ${p.due?`<span class="tag">📅 ${esc(p.due)}</span>`:""}
          ${p.notes?`<span class="${hyp?"hyp":""}">${esc(p.notes)}</span>`:""}
        </div>
      </div>
      <div class="acts">
        <button class="pill ${stCls}" onclick="cycle('${p.id}')">${p.status}</button>
        <button class="mini" onclick="editP('${p.id}')">✎</button>
        <button class="mini" onclick="delP('${p.id}')">×</button>
      </div>
    </div>`;
  }).join("")||'<div style="color:var(--muted);padding:30px;text-align:center">Nothing here — adjust filters or add with +</div>';
}
const CYCLE=["Not started","In progress","Waiting","Done"];
function cycle(id){const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.status=CYCLE[(CYCLE.indexOf(p.status)+1)%CYCLE.length];save();render();
  if(p.status==="Done")toast("✓ Done — "+p.task.slice(0,40));
}
function delP(id){const p=S.projects.find(x=>x.id===id);if(!p)return;
  if(!confirm("Delete: "+p.task+"?"))return;
  S.projects=S.projects.filter(x=>x.id!==id);save();render();toast("Deleted");
}
function editP(id){
  const p=S.projects.find(x=>x.id===id);if(!p)return;
  const row=document.getElementById("r-"+id);
  row.innerHTML=`<div class="editbox">
    <select id="eArea">${AREAS.map(a=>`<option ${a.name===p.area?"selected":""}>${esc(a.name)}</option>`).join("")}</select>
    <input id="eSub" value="${esc(p.sub)}" placeholder="Sub-area / room">
    <input id="eTask" class="full" value="${esc(p.task)}" placeholder="Task">
    <select id="ePri">${["High","Med","Low"].map(x=>`<option ${x===p.pri?"selected":""}>${x}</option>`).join("")}</select>
    <input id="eDue" type="date" value="${esc(p.due)}">
    <input id="eNotes" class="full" value="${esc(p.notes)}" placeholder="Notes">
    <button class="ghost" onclick="render()">Cancel</button>
    <button class="gold" onclick="saveEdit('${id}')">Save</button>
  </div>`;
}
function saveEdit(id){const p=S.projects.find(x=>x.id===id);if(!p)return;
  p.area=document.getElementById("eArea").value;p.sub=document.getElementById("eSub").value.trim();
  p.task=document.getElementById("eTask").value.trim()||p.task;p.pri=document.getElementById("ePri").value;
  p.due=document.getElementById("eDue").value;p.notes=document.getElementById("eNotes").value.trim();
  save();render();toast("Saved");
}

function renderChores(){
  const el=document.getElementById("v-chores");
  el.innerHTML=["Daily","Weekly","Monthly","Quarterly","Annual"].map(cad=>{
    const cs=S.chores.filter(c=>c.cad===cad);if(!cs.length)return"";
    const ck=cs.filter(isChecked).length;
    const resetNote={Daily:"resets each day",Weekly:"resets Monday",Monthly:"resets on the 1st",Quarterly:"resets each quarter",Annual:"resets Jan 1"}[cad];
    return`<div class="cadsec"><h2 class="c-${cad}">${cad.toUpperCase()} <small>${ck}/${cs.length} · ${resetNote}</small></h2>`+
      cs.map(c=>`<div class="chrow ${isChecked(c)?"ck":""}">
        <button class="chk" onclick="tick('${c.id}')">✓</button>
        <div class="cmain"><div class="cname">${esc(c.chore)}</div>
        <div class="czone">${esc(c.zone)}${c.notes?" · "+esc(c.notes):""}</div></div>
        <button class="cwho" onclick="who('${c.id}')">${esc(c.who)||"who?"}</button>
        <button class="mini" onclick="delC('${c.id}')">×</button>
      </div>`).join("")+`</div>`;
  }).join("");
}
function tick(id){const c=S.chores.find(x=>x.id===id);if(!c)return;
  const k=periodKey(c.cad);
  if(S.checks[id]===k)delete S.checks[id];else S.checks[id]=k;
  save();render();
}
function who(id){const c=S.chores.find(x=>x.id===id);if(!c)return;
  const w=prompt("Who owns this? (Q / Jo / both)",c.who||"");
  if(w!==null){c.who=w.trim();save();render()}
}
function delC(id){const c=S.chores.find(x=>x.id===id);if(!c)return;
  if(!confirm("Delete chore: "+c.chore+"?"))return;
  S.chores=S.chores.filter(x=>x.id!==id);delete S.checks[id];save();render();toast("Deleted");
}

/* ============ ADD MODAL ============ */
function openAdd(){
  const mA=document.getElementById("mArea");
  if(mA.options.length<1)mA.innerHTML=AREAS.map(a=>`<option>${esc(a.name)}</option>`).join("");
  const cur=document.getElementById("fArea").value;if(cur)mA.value=cur;
  document.getElementById("mType").value=view==="chores"?"c":"p";mTypeSwap();
  document.getElementById("modal").classList.add("on");
}
function mTypeSwap(){const t=document.getElementById("mType").value;
  document.getElementById("mProjF").style.display=t==="p"?"block":"none";
  document.getElementById("mChoreF").style.display=t==="c"?"block":"none";
}
function closeModal(){document.getElementById("modal").classList.remove("on")}
function saveAdd(){
  const t=document.getElementById("mType").value;
  if(t==="p"){
    const task=document.getElementById("mTask").value.trim();
    if(!task){toast("Task needs a name");return}
    S.projects.push({id:uid(),area:document.getElementById("mArea").value,
      sub:document.getElementById("mSub").value.trim(),task,
      pri:document.getElementById("mPri").value,status:document.getElementById("mStatus").value,
      due:document.getElementById("mDue").value,notes:document.getElementById("mNotes").value.trim()});
    document.getElementById("mTask").value="";document.getElementById("mSub").value="";
    document.getElementById("mDue").value="";document.getElementById("mNotes").value="";
  }else{
    const chore=document.getElementById("mChore").value.trim();
    if(!chore){toast("Chore needs a name");return}
    S.chores.push({id:uid(),cad:document.getElementById("mCad").value,chore,
      zone:document.getElementById("mZone").value.trim(),
      who:document.getElementById("mWho").value.trim(),notes:document.getElementById("mCNotes").value.trim()});
    document.getElementById("mChore").value="";document.getElementById("mZone").value="";
  }
  save();closeModal();render();toast("Added ✓");
}

/* ============ BACKUP / RESTORE ============ */
function doBackup(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download="life-map-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
  toast("Backup downloaded ⬇");
}
function doRestore(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{
    const d=JSON.parse(e.target.result);
    if(!d.projects||!d.chores)throw 0;
    S=d;S.checks=S.checks||{};save();render();toast("Restored ✓ "+S.projects.length+" projects, "+S.chores.length+" chores");
  }catch(_){toast("⚠ Not a valid Life Map backup")}};
  r.readAsText(f);inp.value="";
}

/* ============ TOAST / ICON / STARS ============ */
let tt=null;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("on");
  clearTimeout(tt);tt=setTimeout(()=>t.classList.remove("on"),2200)}

(function icon(){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" rx="40" fill="#0c0e1a"/><rect x="6" y="6" width="168" height="168" rx="36" fill="none" stroke="#c9a227" stroke-width="4"/><circle cx="90" cy="90" r="52" fill="none" stroke="#c9a227" stroke-width="3" opacity=".5"/><circle cx="90" cy="90" r="9" fill="#c9a227"/><path d="M90 34 L100 80 L146 90 L100 100 L90 146 L80 100 L34 90 L80 80 Z" fill="none" stroke="#e8c95a" stroke-width="4" stroke-linejoin="round"/><circle cx="90" cy="34" r="6" fill="#3ddc84"/><circle cx="146" cy="90" r="6" fill="#57c7ff"/><circle cx="90" cy="146" r="6" fill="#e56399"/><circle cx="34" cy="90" r="6" fill="#a78bfa"/></svg>`;
  const uri="data:image/svg+xml,"+encodeURIComponent(svg);
  document.getElementById("favicon").href=uri;
  const img=new Image();img.onload=()=>{const c=document.createElement("canvas");c.width=c.height=180;
    c.getContext("2d").drawImage(img,0,0,180,180);
    document.getElementById("touchicon").href=c.toDataURL("image/png")};
  img.src=uri;
})();

(function stars(){
  const cv=document.getElementById("stars"),cx=cv.getContext("2d");
  let st=[];const reduce=matchMedia("(prefers-reduced-motion: reduce)").matches;
  function size(){cv.width=innerWidth;cv.height=innerHeight;
    st=Array.from({length:90},()=>({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.3+.3,p:Math.random()*Math.PI*2}))}
  size();addEventListener("resize",size);
  function draw(t){cx.clearRect(0,0,cv.width,cv.height);
    st.forEach(s=>{const a=reduce?.5:.3+.4*Math.abs(Math.sin(t/1600+s.p));
      cx.globalAlpha=a;cx.fillStyle="#f5f1e8";cx.beginPath();cx.arc(s.x,s.y,s.r,0,7);cx.fill()});
    if(!reduce)requestAnimationFrame(draw)}
  reduce?draw(0):requestAnimationFrame(draw);
})();

load();go("map");
</script>
