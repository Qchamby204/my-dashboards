<style>
:root{--bg:#0c0e1a;--txt:#eef0fb;--muted:#8089a8;--dim:#6f7798;--line:rgba(120,130,180,.16);
  --gold:#f0b73e;--green:#2fd180;--blue:#4ea3e0;--violet:#9d7bff;--rose:#f0628a;--amber:#f0683e;--cyan:#45c8d8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(1100px 600px at 50% -10%,rgba(240,183,62,.07),transparent 60%),var(--bg);
  color:var(--txt);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
#app{max-width:640px;margin:0 auto;
  padding:0 max(14px,env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right))}
.cinzel{font-family:'Cinzel',serif}
.mono{font-family:'Space Mono',monospace}
.appbar{position:sticky;top:0;z-index:50;
  margin:0 calc(-1 * max(14px,env(safe-area-inset-left))) 14px;
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(14px,env(safe-area-inset-left)) 11px;
  background:rgba(12,14,26,.90);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
.appbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:#f3f4fb;letter-spacing:.05em;white-space:nowrap}
.appbar-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;white-space:nowrap}
.appbar-pill{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:99px;
  background:rgba(240,183,62,.1);border:1px solid rgba(240,183,62,.35);
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--gold);white-space:nowrap}
.eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:600}
.tool{display:flex;align-items:center;gap:13px;padding:14px;border-radius:15px;text-decoration:none;color:inherit;
  background:linear-gradient(180deg,rgba(26,31,58,.9),rgba(20,24,48,.9));border:1px solid var(--line);
  transition:transform .12s,border-color .2s}
.tool:active{transform:scale(.98)}
.ic{width:44px;height:44px;border-radius:13px;flex-shrink:0;display:grid;place-items:center;font-size:20px}
.stat{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;white-space:nowrap}
.chev{color:var(--dim);font-size:17px;flex-shrink:0}
</style>

<body>
<div id="app"></div>
<script>
"use strict";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m];});}
function J(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fmtM(n){ return "$"+(Math.round(n/1e5)/10)+"M"; }

/* Read each tool's real state. Same origin, so this is their live data.
   Every read is defensive: a tool you have not opened yet just shows a dash. */
function readLedger(){
  var days=J("lifeledger:v2",[]);
  if(!Array.isArray(days)||!days.length) return {v:"\u2014",s:"Not started",c:"var(--dim)"};
  var logged=days.some(function(d){return d.date===todayISO();});
  return {v:days.length+"d", s:logged?"Logged today":"Not logged today", c:logged?"var(--green)":"var(--amber)"};
}
function readForge(){
  var s=J("forge:sessions:v2",[]);
  if(!Array.isArray(s)||!s.length) return {v:"\u2014",s:"No sessions",c:"var(--dim)"};
  var wk=new Date(); wk.setDate(wk.getDate()-6); wk.setHours(0,0,0,0);
  var n=s.filter(function(x){ var p=String(x.date).split("-"); return new Date(+p[0],+p[1]-1,+p[2])>=wk; }).length;
  return {v:n+"/wk", s:s.length+" sessions", c:n>0?"var(--green)":"var(--amber)"};
}
function readClimb(){
  var a=J("climb_a",null), h=J("climb_h",[]);
  var start=(a&&a.startAUM)||40000000;
  var add=(Array.isArray(h)?h:[]).reduce(function(t,x){return t+(+x.assets||0);},0);
  var cur=start+add;
  return {v:fmtM(cur), s:(Array.isArray(h)?h.length:0)+" households logged", c:"var(--gold)"};
}
function readProspect(){
  var log=J("qc3_log",[]);
  if(!Array.isArray(log)) log=[];
  var t=todayISO();
  var sends=log.filter(function(a){ return (a.to==="messaged"||a.to==="followup") && String(a.ts||"").slice(0,10)===t; }).length;
  return {v:sends+"/20", s:sends>=20?"Target hit":"Sends today", c:sends>=20?"var(--green)":(sends>0?"var(--gold)":"var(--amber)")};
}
function readCadence(){
  var st=J("operationsCadence.v1",null);
  if(!st) return {v:"\u2014",s:"Not started",c:"var(--dim)"};
  var checks=st.checks||st.checked||{};
  var n=Object.keys(checks).filter(function(k){ return checks[k]; }).length;
  return {v:n?String(n):"0", s:"tasks checked", c:n>0?"var(--green)":"var(--amber)"};
}
function readHerald(){
  var s=J("herald:v1",null);
  if(!s) return {v:"\u2014",s:"Not started",c:"var(--dim)"};
  var pub=(s.videos||[]).filter(function(v){return v.status==="published";}).length;
  var leads=(s.leads||[]).length;
  return {v:pub+" pub", s:leads+" leads captured", c:"var(--cyan)"};
}
function readComm(){
  var reps=J("mc_reps",[]);
  if(!Array.isArray(reps)||!reps.length) return {v:"\u2014",s:"No drills yet",c:"var(--dim)"};
  var t=todayISO();
  var today=reps.filter(function(r){ return String(r.date||"").slice(0,10)===t; }).length;
  return {v:reps.length+" reps", s:today?"Drilled today":"Not drilled today", c:today?"var(--green)":"var(--amber)"};
}
function readMap(){
  var s=J("lifemap_v1",null);
  if(!s||!Array.isArray(s.projects)) return {v:"\u2014",s:"Not started",c:"var(--dim)"};
  var open=s.projects.filter(function(p){return p.status!=="Done";}).length;
  var over=s.projects.filter(function(p){
    if(p.status==="Done"||!p.due) return false;
    var q=String(p.due).split("-"); var d=new Date(+q[0],+q[1]-1,+q[2]); d.setHours(0,0,0,0);
    var t=new Date(); t.setHours(0,0,0,0);
    return d<t;
  }).length;
  return {v:open+" open", s:over?(over+" overdue"):"nothing overdue", c:over?"var(--amber)":"var(--green)"};
}

var TOOLS=[
  {g:"The Practice", items:[
    {f:"chambers-wealth-hq.html", n:"Chambers Wealth HQ", d:"The Climb \u00b7 the book", i:"\u26f0", c:"var(--gold)", r:readClimb},
    {f:"prospecting-command-center.html", n:"Prospecting Command Center", d:"The pipeline \u00b7 3,719 contacts", i:"\u25ce", c:"var(--gold)", r:readProspect},
    {f:"operations-cadence.html", n:"Operations Cadence", d:"Back-office rhythms", i:"\u21bb", c:"var(--green)", r:readCadence},
    {f:"the-herald.html", n:"The Herald", d:"Content \u00b7 lead generation", i:"\u2691", c:"var(--cyan)", r:readHerald}
  ]},
  {g:"The Person", items:[
    {f:"life-ledger.html", n:"Life Ledger", d:"Daily habits \u00b7 the season", i:"\u269c", c:"var(--gold)", r:readLedger},
    {f:"workout-forge.html", n:"The Forge", d:"Training \u00b7 live workouts", i:"\u2692", c:"var(--amber)", r:readForge},
    {f:"communication-trainer.html", n:"Master Communicator", d:"Speaking drills", i:"\u25c8", c:"var(--violet)", r:readComm},
    {f:"life-map.html", n:"Life Map", d:"22 areas \u00b7 projects & chores", i:"\u2732", c:"var(--gold)", r:readMap}
  ]}
];

/* ---------- The Vault: one backup for the whole suite ----------
   Every tool stores its data in this browser under its own keys. Clearing the
   browser wipes all eight at once, so the backup has to be all-or-nothing too.
   We snapshot the entire origin rather than a hand-written key list, so a tool
   that adds a new key later is still captured without touching this code. */
var LASTBK="atlas:lastBackup";
var TOOL_KEYS=[
  {n:"Life Ledger",              p:["lifeledger:"]},
  {n:"The Forge",                p:["forge:"]},
  {n:"Chambers Wealth HQ",       p:["climb_"]},
  {n:"Prospecting Command Center",p:["qc3_","qc_reengage"]},
  {n:"Operations Cadence",       p:["operationsCadence"]},
  {n:"The Herald",               p:["herald:"]},
  {n:"Master Communicator",      p:["mc_"]},
  {n:"Life Map",                 p:["lifemap_"]}
];
function allKeys(){ var a=[]; try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k && k!=="__t") a.push(k); } }catch(e){} return a; }
function keysFor(t){ return allKeys().filter(function(k){ return t.p.some(function(pre){ return k.indexOf(pre)===0; }); }); }
function bytes(ks){ var n=0; ks.forEach(function(k){ try{ n+=(localStorage.getItem(k)||"").length; }catch(e){} }); return n; }
function fmtBytes(n){ return n<1024?(n+" B"):n<1048576?((n/1024).toFixed(0)+" KB"):((n/1048576).toFixed(1)+" MB"); }
function daysSinceBackup(){
  var v=null; try{ v=localStorage.getItem(LASTBK); }catch(e){}
  if(!v) return null;
  var t=Date.parse(v); if(isNaN(t)) return null;
  return Math.floor((Date.now()-t)/86400000);
}
function backupAll(){
  try{
    var data={};
    allKeys().forEach(function(k){ if(k===LASTBK) return; try{ data[k]=localStorage.getItem(k); }catch(e){} });
    var n=Object.keys(data).length;
    if(!n){ alert("Nothing to back up yet. Use a tool first."); return; }
    var payload={app:"atlas",version:1,exportedAt:new Date().toISOString(),keys:n,data:data};
    var blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
    var url=URL.createObjectURL(blob), a=document.createElement("a");
    a.href=url; a.download="atlas-backup-"+todayISO()+".json";
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); },600);
    try{ localStorage.setItem(LASTBK,new Date().toISOString()); }catch(e){}
    render();
  }catch(e){ alert("Backup failed: "+e.message); }
}
function restoreAll(file){
  var r=new FileReader();
  r.onload=function(){
    try{
      var o=JSON.parse(r.result);
      var d=(o && o.data) ? o.data : null;
      if(!d || typeof d!=="object"){ alert("That is not an Atlas backup file."); return; }
      var n=Object.keys(d).length;
      if(!window.confirm("Restore "+n+" saved keys across all tools?\n\nThis OVERWRITES the current data in this browser. If you have newer work here, back it up first.")) return;
      Object.keys(d).forEach(function(k){ try{ localStorage.setItem(k,d[k]); }catch(e){} });
      alert("\u2713 Restored "+n+" keys. All tools now hold the backed-up data.");
      render();
    }catch(e){ alert("Could not read that file."); }
  };
  r.onerror=function(){ alert("Could not read that file."); };
  r.readAsText(file);
}
function vaultPanel(){
  var live=TOOL_KEYS.map(function(t){ var ks=keysFor(t); return {n:t.n,k:ks.length,b:bytes(ks)}; });
  var used=live.filter(function(x){ return x.k>0; });
  var totalB=live.reduce(function(a,x){ return a+x.b; },0);
  var ds=daysSinceBackup();
  var warn = ds===null || ds>=7;

  var h='<div class="eyebrow" style="margin:22px 2px 9px">The Vault \u00b7 one backup, all eight</div>';
  h+='<div style="padding:15px;border-radius:15px;background:linear-gradient(180deg,rgba(26,31,58,.9),rgba(20,24,48,.9));border:1px solid '+(warn?"rgba(240,104,62,.4)":"var(--line)")+'">';

  h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:10px">';
  h+='<div style="min-width:0"><div style="font-size:13px;color:var(--txt);font-weight:600">'+used.length+' of 8 tools hold data</div>';
  h+='<div style="font-size:10.5px;color:'+(warn?"var(--amber)":"var(--dim)")+';margin-top:2px">'
     + (ds===null ? "Never backed up" : (ds===0 ? "Backed up today" : ("Last backup "+ds+" day"+(ds===1?"":"s")+" ago")))
     + ' \u00b7 '+fmtBytes(totalB)+'</div></div>';
  h+='<div class="mono" style="font-size:15px;font-weight:700;color:'+(warn?"var(--amber)":"var(--green)")+'">'+(warn?"\u26a0":"\u2713")+'</div>';
  h+='</div>';

  if(used.length){
    h+='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:11px">';
    used.forEach(function(x){
      h+='<span style="font-size:9.5px;padding:3px 8px;border-radius:99px;background:rgba(47,209,128,.1);border:1px solid rgba(47,209,128,.28);color:var(--green);white-space:nowrap">'+esc(x.n)+'</span>';
    });
    h+='</div>';
  }

  h+='<div style="display:flex;gap:8px;margin-top:13px">';
  h+='<button onclick="backupAll()" style="flex:1;padding:11px;border-radius:11px;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:#0c0e1a;background:linear-gradient(180deg,#f6cf6a,#e2a32f)">\u2913 Back up everything</button>';
  h+='<button onclick="document.getElementById(\'atlasRestore\').click()" style="flex:1;padding:11px;border-radius:11px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line)">\u2911 Restore</button>';
  h+='<input type="file" id="atlasRestore" accept="application/json,.json" style="display:none" onchange="if(this.files&&this.files[0])restoreAll(this.files[0])"/>';
  h+='</div>';

  h+='<div style="font-size:10px;color:var(--dim);margin-top:10px;line-height:1.55">One file captures every tool. Keep it somewhere real (email it to yourself, or drop it in Drive). Clearing your browser, switching phones, or Safari evicting site data will wipe all eight at once, and this file is the only way back.</div>';
  h+='</div>';
  return h;
}

function stats0(){
  var used=TOOL_KEYS.filter(function(t){ return keysFor(t).length>0; }).length;
  return {used:used, ds:daysSinceBackup()};
}
function backupBanner(st){
  if(!st.used) return '';                 // nothing to lose yet
  if(st.ds!==null && st.ds<7) return '';  // backed up recently
  var never = st.ds===null;
  var h='<div style="padding:13px 14px;border-radius:14px;margin-bottom:14px;background:rgba(240,104,62,.09);border:1px solid rgba(240,104,62,.45);display:flex;align-items:center;gap:11px">';
  h+='<span style="font-size:17px;flex-shrink:0">\u26a0</span>';
  h+='<div style="flex:1;min-width:0">';
  h+='<div style="font-size:12.5px;color:#f6d0be;font-weight:600;line-height:1.3">'+(never?"Your data has never been backed up":("Last backup was "+st.ds+" days ago"))+'</div>';
  h+='<div style="font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4">'+(st.used===1?"1 tool holds data in this browser":("All "+st.used+" tools live in this browser"))+'. One clear and it is gone.</div>';
  h+='</div>';
  h+='<button onclick="backupAll()" style="flex-shrink:0;padding:8px 13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;font-size:11.5px;font-weight:700;color:#0c0e1a;background:linear-gradient(180deg,#f6cf6a,#e2a32f)">Back up</button>';
  h+='</div>';
  return h;
}
function render(){
  var st=stats0();
  var h='';
  h+='<div class="appbar"><div style="min-width:0">';
  h+='<div class="appbar-title">The Atlas</div><div class="appbar-sub">Everything is connected</div></div>';
  var lg=readLedger();
  h+='<div class="appbar-pill">'+esc(lg.v)+'</div></div>';

  h+='<div style="text-align:center;margin-bottom:16px"><div style="font-size:12px;color:var(--muted);font-style:italic;line-height:1.45">Eight tools, one life. Tap in.</div></div>';

  h+=backupBanner(st);

  TOOLS.forEach(function(grp){
    h+='<div class="eyebrow" style="margin:18px 2px 9px">'+esc(grp.g)+'</div>';
    h+='<div style="display:flex;flex-direction:column;gap:9px">';
    grp.items.forEach(function(t){
      var st={v:"\u2014",s:"",c:"var(--dim)"};
      try{ st=t.r()||st; }catch(e){}
      h+='<a class="tool" href="'+t.f+'">';
      h+='<div class="ic" style="background:radial-gradient(circle at 30% 25%,'+t.c+'33,transparent 72%);border:1px solid '+t.c+'55;color:'+t.c+'">'+t.i+'</div>';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-size:14px;font-weight:600;color:var(--txt);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.n)+'</div>';
      h+='<div style="font-size:10.5px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.d)+'</div>';
      h+='</div>';
      h+='<div style="text-align:right;flex-shrink:0"><div class="stat" style="color:'+st.c+'">'+esc(st.v)+'</div>';
      if(st.s) h+='<div style="font-size:9px;color:var(--dim);margin-top:2px;white-space:nowrap">'+esc(st.s)+'</div>';
      h+='</div>';
      h+='<span class="chev">\u203a</span>';
      h+='</a>';
    });
    h+='</div>';
  });

  h+=vaultPanel();

  h+='<div class="mono" style="text-align:center;margin-top:16px;font-size:10px;color:#4e5573">Quinton Chambers \u00b7 Everything is connected. So the advice has to be too.</div>';

  document.getElementById("app").innerHTML=h;
}
render();
/* Re-read when you come back from a tool, so the numbers are never stale. */
document.addEventListener("visibilitychange",function(){ if(!document.hidden) render(); });
window.addEventListener("pageshow",function(){ render(); });
window.addEventListener("focus",render);

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();

</script>
</body>
</html>
