<style>
:root{
  --bg:#0c0a12; --panel:#15111e; --panel2:#1d1830; --border:#2c2440;
  --text:#ece8f4; --muted:#9b93ad; --accent:#a479ff; --accent2:#c9a6ff;
  --gold:#e6b955; --good:#54d6a4; --warn:#e6b955; --bad:#e0697e; --radius:14px;
  --serif:'Cinzel',serif; --body:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; --mono:'Space Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:radial-gradient(1100px 560px at 50% -12%,rgba(164,121,255,.10),transparent 60%),var(--bg);color:var(--text);font-family:var(--body);line-height:1.55;-webkit-font-smoothing:antialiased}

/* App chrome. Blurred fill runs up under the Dynamic Island so the clock,
   signal, wifi and battery never sit on top of content. */
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}
.appbar{position:sticky;top:0;z-index:40;
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(16px,env(safe-area-inset-left)) 11px max(16px,env(safe-area-inset-right));
  background:rgba(12,10,18,.88);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px}
.appbar h1{font-family:var(--serif);font-weight:700;font-size:15px;letter-spacing:.04em;white-space:nowrap}
.appbar h1 span{background:linear-gradient(90deg,var(--accent),var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.season{font-family:var(--mono);font-size:.66rem;color:var(--gold);letter-spacing:.05em;text-transform:uppercase;opacity:.85;text-align:center;margin-bottom:14px}
.sub{color:var(--muted);font-size:.85rem;font-weight:300}
.appbar-pill{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;
  background:rgba(164,121,255,.12);border:1px solid rgba(164,121,255,.35);white-space:nowrap;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent2)}

/* Bottom tab bar. Six pages is too many for wrapping pills on a phone. */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:45;display:flex;
  padding:6px max(6px,env(safe-area-inset-left)) calc(env(safe-area-inset-bottom,0px) + 6px) max(6px,env(safe-area-inset-right));
  background:rgba(12,10,18,.92);backdrop-filter:saturate(140%) blur(16px);-webkit-backdrop-filter:saturate(140%) blur(16px);
  border-top:1px solid var(--border)}
.tabbar button{flex:1;min-width:0;background:transparent;border:none;cursor:pointer;font-family:var(--body);
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px;border-radius:12px;color:var(--muted);transition:color .15s}
.tabbar button .ti{font-size:16px;line-height:1}
.tabbar button .tl{font-size:9px;font-weight:600;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.tabbar button.active{color:var(--accent2)}
.tabbar button.active .ti{filter:drop-shadow(0 0 7px rgba(164,121,255,.75))}
.tabbar button:active{transform:scale(.93)}

main{max-width:1080px;margin:0 auto;
  padding:16px max(16px,env(safe-area-inset-left)) calc(96px + env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-right))}
.page{display:none}.page.active{display:block}
.card{background:linear-gradient(180deg,rgba(255,255,255,.015),transparent),var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.card h2{font-family:var(--serif);font-weight:600;font-size:1.12rem;margin-bottom:8px;letter-spacing:.4px}
.card h3{font-family:var(--serif);font-weight:500;font-size:.98rem;margin:12px 0 6px;letter-spacing:.3px}
.grid{display:grid;gap:16px}
.grid2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.muted{color:var(--muted);font-size:.88rem}
.pill{display:inline-block;background:var(--panel2);border:1px solid var(--border);border-radius:999px;padding:3px 11px;font-size:.78rem;color:var(--muted);margin:2px 4px 2px 0}
.pill.on{background:rgba(164,121,255,.18);border-color:var(--accent);color:var(--accent2)}
button.btn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#0c0a12;padding:10px 18px;border-radius:10px;cursor:pointer;font-size:.9rem;font-weight:600;font-family:var(--body);letter-spacing:.02em}
button.btn.ghost{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-weight:500}
button.btn:active{transform:scale(.98)}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:11px 6px;text-align:center;min-width:0}
.stat .v{font-family:var(--mono);font-size:1.15rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat .l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(min-width:620px){
  .statrow{grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{padding:14px}
  .stat .v{font-size:1.5rem}
  .stat .l{font-size:.68rem;letter-spacing:.08em}
}
.likert{display:flex;gap:6px;margin:6px 0 14px}
.likert button{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--muted);padding:8px 4px;border-radius:8px;cursor:pointer;font-size:.8rem;font-family:var(--body)}
.likert button.sel{background:rgba(164,121,255,.25);border-color:var(--accent);color:#fff}
.q{font-size:.93rem;margin-top:10px}
.bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:4px 0 10px}
.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px}
.lesson{border:1px solid var(--border);border-radius:10px;margin:8px 0;overflow:hidden}
.lesson>.lhead{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--panel2)}
.lesson>.lhead:hover{background:#252036}
.lesson .lbody{display:none;padding:14px 16px;font-size:.92rem;border-top:1px solid var(--border)}
.lesson.open .lbody{display:block}
.lesson .lbody ul{margin:8px 0 8px 20px}
.lesson .lbody li{margin:4px 0}
.lesson .lbody p{margin:6px 0}
.lesson .lbody em{color:var(--accent2);font-style:normal;font-weight:600}
.check{width:18px;height:18px;border:2px solid var(--muted);border-radius:5px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:12px}
.check.done{background:var(--good);border-color:var(--good);color:#08251a}
.drillcard{border:1px solid var(--accent);border-radius:var(--radius);padding:20px;background:linear-gradient(135deg,rgba(164,121,255,.10),rgba(201,166,255,.05))}
.drillcard .topic{font-family:var(--serif);font-size:1.2rem;font-weight:600;margin:8px 0;letter-spacing:.3px}
.timer{font-family:var(--mono);font-size:2.4rem;font-weight:700;font-variant-numeric:tabular-nums;text-align:center;margin:10px 0}
.rubric label{display:block;font-size:.88rem;margin-top:10px}
input[type=range]{width:100%;accent-color:var(--accent)}
input[type=text],select,textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:.9rem;width:100%;font-family:var(--body)}
.topicitem{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 10px;border-bottom:1px solid var(--border);font-size:.9rem}
.topicitem:last-child{border-bottom:none}
.del{color:var(--bad);cursor:pointer;font-size:.85rem;background:none;border:none}
canvas{max-width:100%}
.flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.note{background:rgba(230,185,85,.08);border:1px solid rgba(230,185,85,.3);border-radius:10px;padding:10px 14px;font-size:.85rem;color:var(--gold);margin:10px 0}
.tag{font-family:var(--mono);font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent2);font-weight:700}
.heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:3px;overflow-x:auto;padding-bottom:6px}
.heat .cell{width:13px;height:13px;border-radius:3px;background:var(--panel2);border:1px solid rgba(255,255,255,.02)}
.heat .cell.l1{background:rgba(164,121,255,.30)}
.heat .cell.l2{background:rgba(164,121,255,.55)}
.heat .cell.l3{background:rgba(164,121,255,.88)}
.heat .cell.future{opacity:.4}
.heat .cell.today{outline:1.5px solid var(--gold);outline-offset:1px}
.heatlabels{display:flex;gap:12px;font-family:var(--mono);font-size:.66rem;color:var(--muted);margin-top:8px;flex-wrap:wrap;align-items:center}
.heatkey{display:inline-flex;align-items:center;gap:4px}
.heatkey .cell{width:11px;height:11px;border-radius:3px;display:inline-block;border:1px solid rgba(255,255,255,.04)}
.records .rt{font-family:var(--mono);color:var(--gold);white-space:nowrap;font-size:.82rem}
#toasts{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none}
.toast{background:linear-gradient(135deg,#1d1830,#241b3a);border:1px solid var(--accent);border-radius:12px;padding:13px 20px;min-width:240px;max-width:90vw;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.5);animation:pop .35s ease both}
.toast.fade{animation:fade .5s ease forwards}
.toast .tt{font-family:var(--serif);font-weight:600;color:var(--gold);font-size:1rem;letter-spacing:.4px}
.toast .ts{font-size:.84rem;color:var(--muted);margin-top:3px}
@keyframes pop{0%{transform:translateY(16px) scale(.95);opacity:0}100%{transform:translateY(0) scale(1);opacity:1}}
@keyframes fade{to{opacity:0;transform:translateY(-8px)}}
@media(max-width:640px){main,header,nav{padding-left:14px;padding-right:14px}}
</style>
</head>

<script>
'use strict';
/* ============ STORAGE (localStorage with in-memory fallback + export/import) ============ */
const Store = (()=>{
  let mem = {}; let usable = true;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); } catch(e){ usable = false; }
  return {
    get(k,d){ try{ const v = usable? localStorage.getItem('mc_'+k) : mem[k]; return v? JSON.parse(v) : d; }catch(e){ return d; } },
    set(k,v){ const s = JSON.stringify(v); if(usable){ try{ localStorage.setItem('mc_'+k,s); }catch(e){} } mem[k]=s; },
    usable: ()=>usable,
    dump(){ const keys=['assessments','reps','lessonsDone','topics','customTopics','catsEnabled','city','goalNote','prepNotes','refreshed','bankUpdated']; const o={}; keys.forEach(k=>o[k]=this.get(k,null)); return o; },
    load(o){ Object.entries(o).forEach(([k,v])=>{ if(v!==null) this.set(k,v); }); }
  };
})();

/* ============ SKILL PILLARS ============ */
const SKILLS = [
 {id:'clarity',  name:'Clarity & Structure',     desc:'Getting to the point, organizing ideas so they land'},
 {id:'story',    name:'Storytelling & Engagement',desc:'Hooks, narrative, vivid specifics that hold attention'},
 {id:'persuade', name:'Persuasion & Influence',  desc:'Building arguments, reading motivations, moving people'},
 {id:'listen',   name:'Listening & Empathy',     desc:'Active listening, questions, making others feel heard'},
 {id:'delivery', name:'Delivery & Presence',     desc:'Voice, pace, pausing, body language, composure'},
 {id:'adapt',    name:'Adaptability & Awareness', desc:'Reading the room, impromptu speaking, audience tailoring'},
];

/* ============ SELF-ASSESSMENT (behaviorally anchored, 4 per pillar) ============ */
const ASSESS = [
 {s:'clarity', t:'When I explain something complex, people rarely ask me to repeat or clarify.'},
 {s:'clarity', t:'I state my main point first, then support it (rather than building up to it).'},
 {s:'clarity', t:'My emails/messages get the response I wanted on the first try.'},
 {s:'clarity', t:'I can summarize a 30-minute discussion in 2–3 sentences accurately.'},
 {s:'story',   t:'I regularly use specific stories or examples instead of abstract statements.'},
 {s:'story',   t:'People lean in or react visibly when I tell a story.'},
 {s:'story',   t:'I can turn a dry topic into something a listener finds interesting.'},
 {s:'story',   t:'I open talks/conversations with a hook, not background or throat-clearing.'},
 {s:'persuade',t:'I can argue the other side’s position as well as they can.'},
 {s:'persuade',t:'I tailor my argument to what the listener cares about, not what I care about.'},
 {s:'persuade',t:'I change minds in meetings or debates more often than not.'},
 {s:'persuade',t:'I use evidence, emotion, and credibility deliberately, not just one of them.'},
 {s:'listen',  t:'I can repeat back someone’s point to their satisfaction before responding.'},
 {s:'listen',  t:'I ask follow-up questions more than I make statements in conversations.'},
 {s:'listen',  t:'People open up to me and tell me things they don’t tell others.'},
 {s:'listen',  t:'I notice and respond to what’s NOT being said (tone, hesitation, body language).'},
 {s:'delivery',t:'I speak without filler words (um, like, you know) under pressure.'},
 {s:'delivery',t:'I use pauses deliberately rather than rushing to fill silence.'},
 {s:'delivery',t:'My voice varies in pace, pitch, and volume to keep attention.'},
 {s:'delivery',t:'I stay composed and articulate when challenged or put on the spot.'},
 {s:'adapt',   t:'I can speak coherently for 60 seconds on almost any topic with no prep.'},
 {s:'adapt',   t:'I adjust my style depending on who I’m talking to (exec vs. friend vs. stranger).'},
 {s:'adapt',   t:'I can sense when I’m losing an audience and change course mid-stream.'},
 {s:'adapt',   t:'I handle hostile or curveball questions without getting flustered.'},

/* ============ CURRICULUM (best-practice frameworks) ============ */
const CURRICULUM = [
 {id:'m1', skill:'clarity', title:'Module 1 · Clarity & Structure', lessons:[
   {id:'m1l1', title:'BLUF & the Pyramid Principle', body:`<p><em>Bottom Line Up Front:</em> lead with your conclusion, then support it. Barbara Minto's Pyramid Principle: answer first → grouped supporting arguments → data. Audiences retain the first and last things you say (primacy/recency), so spend them wisely.</p><ul><li>Before speaking/writing, complete: "My point is ___. It matters because ___."</li><li>If you can't state your point in one sentence, you don't have one yet.</li></ul><p><em>Drill:</em> rewrite your last 3 emails BLUF-style.</p>`},
   {id:'m1l2', title:'PREP & the Rule of Three', body:`<p><em>PREP</em> = Point → Reason → Example → Point (restated). The fastest structure for any answer, toast, or comment. The <em>Rule of Three</em>: people remember triads ("blood, sweat, and tears"). Cap any list at three; if you have seven points, group them into three buckets.</p><ul><li>Use PREP for every opinion you give this week.</li><li>Signpost: "Three reasons. First… Second… Finally…", it makes you sound organized even when improvising.</li></ul>`},
   {id:'m1l3', title:'Concision: cut the throat-clearing', body:`<p>Most communication fails from excess, not absence. Kill: "I just wanted to quickly say…", hedges ("sort of", "kind of"), and warm-up sentences. Strong verbs over adverbs. One idea per sentence.</p><ul><li>Test: delete every sentence of a draft that doesn't change the listener's mind or action. Usually 30–40% goes.</li><li>Spoken: end your sentence, then stop. Don't trail into "…so, yeah."</li></ul>`},
 ]},
 {id:'m2', skill:'story', title:'Module 2 · Storytelling & Engagement', lessons:[
   {id:'m2l1', title:'The ABT framework (And, But, Therefore)', body:`<p>Randy Olson's ABT: "<em>[Setup] AND [more context], BUT [conflict/tension], THEREFORE [resolution/point]</em>." The "but" is where attention lives, no tension, no story. Compare: "We have data and dashboards" vs. "We have data AND dashboards, BUT nobody can find what they need, THEREFORE we're rebuilding search."</p><ul><li>Convert any update or anecdote into ABT before sharing it.</li></ul>`},
   {id:'m2l2', title:'Hooks & specificity', body:`<p>Open with a question, a surprising fact, a moment in time ("Tuesday, 11pm, my phone rings"), or a stake ("This decision costs us $2M a year"). Never open with chronology or apology.</p><p>Specificity creates belief: "an old car" < "a rusted '94 Corolla with a coat-hanger antenna." Concrete nouns, sensory detail, real numbers.</p><ul><li>Build a personal "story bank": 10 moments from your life, each tagged with the lesson it illustrates.</li></ul>`},
   {id:'m2l3', title:'Narrative arc in 60 seconds', body:`<p>Micro-story arc: <em>Context (1 line) → Goal → Obstacle → Choice → Outcome → Meaning.</em> The meaning is the handshake with the listener, connect it to THEM ("…and that's why I never skip the pre-mortem").</p><ul><li>Practice the same story at 30s, 60s, and 3min lengths. Editing teaches you what's essential.</li></ul>`},
 ]},
 {id:'m3', skill:'persuade', title:'Module 3 · Persuasion & Influence', lessons:[
   {id:'m3l1', title:'Ethos, Pathos, Logos', body:`<p>Aristotle's triad: credibility (<em>ethos</em>), emotion (<em>pathos</em>), logic (<em>logos</em>). Most people over-index on logos. Audit any pitch: Why should they trust YOU on this? What do they FEEL about it? Does the logic hold?</p><ul><li>Establish ethos early ("I've sat on both sides of this") without bragging.</li><li>Pathos = consequences for humans, not adjectives. Show the person affected.</li></ul>`},
   {id:'m3l2', title:'Monroe’s Motivated Sequence', body:`<p>The classic call-to-action structure: <em>Attention → Need (the problem) → Satisfaction (your solution) → Visualization (life with/without it) → Action (specific ask).</em> Visualization is the most-skipped and most powerful step.</p><ul><li>Use it for any proposal: budget asks, community petitions, pitching a restaurant to friends.</li></ul>`},
   {id:'m3l3', title:'Steelmanning & both-sides fluency', body:`<p>Persuasion starts with understanding. <em>Steelman</em>: state the opposing view so well its holders say "exactly." Only then rebut. This builds ethos, lowers defenses, and exposes your own weak points first.</p><ul><li>Rapoport's rules: restate their position → list points of agreement → note what you learned → only then disagree.</li></ul>`},
   {id:'m3l4', title:'Cialdini’s principles of influence', body:`<p>Reciprocity, commitment/consistency, social proof, authority, liking, scarcity, unity. Use ethically: cite who else supports an idea (social proof), get small agreements first (consistency), find shared identity (unity, "as parents/fans/neighbours, we…").</p><ul><li>Spot these in ads and political messaging this week, naming them builds immunity AND fluency.</li></ul>`},
 ]},
 {id:'m4', skill:'listen', title:'Module 4 · Listening & Conversation', lessons:[
   {id:'m4l1', title:'Active listening: loop, label, validate', body:`<p>Chris Voss's toolkit: <em>mirroring</em> (repeat their last 3 words as a question), <em>labeling</em> ("It sounds like you're frustrated that…"), and looping ("So what I'm hearing is… did I get that right?"). People don't move until they feel heard.</p><ul><li>In your next disagreement, earn the right to respond by summarizing them first, to their satisfaction.</li></ul>`},
   {id:'m4l2', title:'Questions that open people up', body:`<p>Open > closed. "What was that like?" beats "Was it good?" Follow-up questions are rated the single most likable conversational behavior in research. Go deeper, not wider: 2–3 follow-ups on one thread beats topic-hopping.</p><ul><li>The support-vs-shift test: a "shift response" turns the topic to you ("That reminds me of MY trip"); a "support response" stays with them. Track your ratio.</li></ul>`},
   {id:'m4l3', title:'Small talk → real talk (ARE method)', body:`<p><em>Anchor</em> (shared context: "This venue's packed tonight") → <em>Reveal</em> (something about you: "First time here, I usually avoid downtown") → <em>Encourage</em> (hand it over: "What brought you out?"). Escalate gradually from facts → opinions → feelings.</p><ul><li>Current events are anchor gold: sports, local news, big cultural moments. That's why this app feeds you topics.</li></ul>`},
   {id:'m4l4', title:'Hot topics without burns', body:`<p>For political/contentious topics: ask before asserting ("What's your read on it?"), find the shared value beneath the disagreement (safety, fairness, affordability), use "help me understand" instead of "you're wrong," and know your exit ramps ("Either way, it'll be interesting to watch, hey, did you catch the game?").</p>`},
 ]},
 {id:'m5', skill:'delivery', title:'Module 5 · Delivery & Presence', lessons:[
   {id:'m5l1', title:'The pause is the power move', body:`<p>Pauses replace fillers, create emphasis, and signal confidence. Pause: before your main point, after a question, after a key number. A 2-second pause feels like 10 to you and like gravitas to them.</p><ul><li>Filler-word fix: it's not about suppressing "um", it's about being okay with silence. Record yourself; count fillers; repeat.</li></ul>`},
   {id:'m5l2', title:'Vocal variety: pace, pitch, volume', body:`<p>Monotone kills good content. Vary <em>pace</em> (slow = important, fast = energy), <em>pitch</em> (downward inflection = authority; avoid uptalk on statements), <em>volume</em> (dropping quieter can command more attention than getting louder).</p><ul><li>Drill: read one paragraph 3 ways, as breaking news, as a bedtime story, as a courtroom closing. Feel the range.</li></ul>`},
   {id:'m5l3', title:'Body language & nerves', body:`<p>Plant your feet, open posture, gesture from the shoulders (not T-rex elbows), eye contact in 3–5 second holds per person. Nerves: box breathing (4-4-4-4) beforehand; reframe arousal as excitement ("I'm ready"), research shows reappraisal beats suppression.</p><ul><li>The first 30 seconds memorized cold = composure for the rest.</li></ul>`},
 ]},
 {id:'m6', skill:'adapt', title:'Module 6 · Impromptu & Adaptability', lessons:[
   {id:'m6l1', title:'Impromptu frameworks', body:`<p>Never blank again, grab a scaffold: <em>PREP</em> (point-reason-example-point), <em>Past/Present/Future</em>, <em>Problem/Solution/Benefit</em>, <em>Zoom out/Zoom in</em> (big picture → specific case). The framework buys your brain time while your mouth starts.</p><ul><li>Buy 3 seconds legally: "Great question, the way I think about it is…"</li></ul>`},
   {id:'m6l2', title:'Bridging & handling curveballs', body:`<p>Media-training bridges: acknowledge → pivot → message. "That's one angle; what I think matters more is…" / "I can't speak to X, but what I do know is Y." Never repeat a hostile framing ("I'm not saying the project failed", now they heard "project failed").</p><ul><li>For questions you don't know: name it, commit to follow up, offer adjacent value. Confidence ≠ omniscience.</li></ul>`},
   {id:'m6l3', title:'Reading & tailoring to the audience', body:`<p>Before any important conversation, answer: What do they already believe? What do they want? What's their attention budget? Execs want the decision and risk; peers want the how; skeptics need their objection named before they raise it.</p><ul><li>Mid-stream reads: glazed eyes = compress and ask a question; crossed arms + silence = surface the objection yourself.</li></ul>`},
 ]},
];

/* ============ SEASON · FORECAST · RECORDS (ported from Life Ledger & The Forge) ============ */
const SEASON_END = new Date('2026-12-31T23:59:59');
function dstr(d){ return d.toISOString().slice(0,10); }
function activityDates(){ return S.reps.map(r=>r.date.slice(0,10)); }
function seasonStart(){
  const ds=[...activityDates(), ...S.assessments.map(a=>a.date.slice(0,10))].sort();
  return new Date((ds[0]||todayStr())+'T00:00:00');
}
function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function weeksLeft(){ return Math.max(0, Math.ceil((SEASON_END-new Date())/(7*86400000))); }
function repsByDay(){ const m={}; S.reps.forEach(r=>{ const k=r.date.slice(0,10); m[k]=(m[k]||0)+1; }); return m; }
function longestStreak(){
  const days=[...new Set(activityDates())].sort(); if(!days.length) return 0;
  let best=1,cur=1;
  for(let i=1;i<days.length;i++){
    const p=new Date(days[i-1]+'T00:00:00'), d=new Date(days[i]+'T00:00:00');
    if(daysBetween(p,d)===1){ cur++; best=Math.max(best,cur); } else cur=1;
  }
  return best;
}
function activeDays(){ return new Set(activityDates()).size; }
function bestDay(){ const m=repsByDay(); let date=null,count=0; Object.entries(m).forEach(([k,n])=>{ if(n>count){count=n;date=k;} }); return {date,count}; }
function repsThisWeek(){ const s=new Date(); s.setDate(s.getDate()-6); s.setHours(0,0,0,0); return S.reps.filter(r=> new Date(r.date)>=s).length; }
function bestByDrill(){ const m={}; S.reps.forEach(r=>{ const c=m[r.drill]; if(!c||r.score>c.score) m[r.drill]={score:r.score,topic:r.topic,date:r.date.slice(0,10),skill:r.skill}; }); return m; }
function levelName(x){ return x<100?'Novice':x<300?'Apprentice':x<700?'Practitioner':x<1500?'Orator':'Master Communicator'; }
function projectLevel(){
  const start=seasonStart(), now=new Date();
  const elapsed=Math.max(1, daysBetween(start, now));
  const total=daysBetween(start, SEASON_END);
  const perDay=xp()/elapsed;
  const projXP=Math.round(xp()+perDay*Math.max(0,total-elapsed));
  return {projXP, lvl:levelName(projXP)};
}
function weeklyTarget(){
  const tiers=[100,300,700,1500], x=xp();
  const next=tiers.find(t=>t>x)||(x+800);
  const gapReps=Math.ceil((next-x)/10);
  return Math.max(3, Math.min(20, Math.ceil(gapReps/Math.max(1,weeksLeft()))));
}
function projectedScores(){
  if(S.assessments.length<2) return null;
  const first=S.assessments[0], last=S.assessments[S.assessments.length-1];
  const span=Math.max(1,(new Date(last.date)-new Date(first.date))/86400000);
  const toEnd=(SEASON_END-new Date(last.date))/86400000;
  const out={};
  SKILLS.forEach(sk=>{ const a=first.scores[sk.id]??0, b=last.scores[sk.id]??0; const slope=(b-a)/span;
    out[sk.id]=Math.max(0,Math.min(100,Math.round(b+slope*toEnd))); });
  return out;
}

   +"background:rgba(20,23,38,.97);border:1px solid rgba(240,183,62,.5);color:#f6e2ad;padding:10px 16px;border-radius:12px;"
   +"font-family:'Outfit',sans-serif;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.55);display:flex;align-items:center;gap:12px;max-width:92vw";
  t.textContent='';
  var s=document.createElement('span'); s.textContent=msg; t.appendChild(s);
  var b=document.createElement('button'); b.textContent='Undo';
  b.style.cssText="background:rgba(240,183,62,.16);border:1px solid rgba(240,183,62,.5);color:#f0b73e;font-family:inherit;"
   +"font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px;cursor:pointer;flex-shrink:0";
  b.onclick=function(){ try{ restore(); }catch(e){} t.remove(); };
  t.appendChild(b);
  clearTimeout(__undoT); __undoT=setTimeout(function(){ if(t&&t.parentNode) t.remove(); },7000);
}

function toast(title, sub){
  const wrap=$('toasts'); if(!wrap) return;
  const el=document.createElement('div'); el.className='toast';
  el.innerHTML=`<div class="tt">${esc(title)}</div>${sub?`<div class="ts">${esc(sub)}</div>`:''}`;
  wrap.appendChild(el);
  try{ if(navigator.vibrate) navigator.vibrate([35,40,35]); }catch(e){}
  setTimeout(()=>{ el.classList.add('fade'); setTimeout(()=>el.remove(),500); }, 3400);
}

/* ============ RADAR CHART (vanilla canvas) ============ */
function drawRadar(canvasId, datasets){ // datasets: [{scores, color, fill}]
  const cv=$(canvasId); if(!cv) return;
  const dpr=window.devicePixelRatio||1; const W=cv.clientWidth||320, H=280;
  cv.width=W*dpr; cv.height=H*dpr; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  const cx=W/2, cy=H/2+6, R=Math.min(W,H)/2-44, n=SKILLS.length;
  const ang=i=>-Math.PI/2 + i*2*Math.PI/n;
  // grid
  ctx.strokeStyle='#2c2440'; ctx.fillStyle='#9b93ad'; ctx.font='11px Outfit, sans-serif';
  for(let ring=1;ring<=4;ring++){ ctx.beginPath();
    for(let i=0;i<=n;i++){ const a=ang(i%n), r=R*ring/4; const x=cx+r*Math.cos(a), y=cy+r*Math.sin(a); i?ctx.lineTo(x,y):ctx.moveTo(x,y); }
    ctx.stroke();
  }
  for(let i=0;i<n;i++){ const a=ang(i);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a)); ctx.stroke();
    const lx=cx+(R+18)*Math.cos(a), ly=cy+(R+18)*Math.sin(a);
    ctx.textAlign = Math.abs(Math.cos(a))<.3?'center':(Math.cos(a)>0?'left':'right');
    const label=SKILLS[i].name.split(' & ');
    ctx.fillText(label[0]+(label[1]?' &':''), lx, ly-5);
    if(label[1]) ctx.fillText(label[1], lx, ly+8);
  }
  // data
  datasets.forEach(ds=>{
    ctx.beginPath();
    SKILLS.forEach((sk,i)=>{ const v=(ds.scores[sk.id]??0)/100, a=ang(i);
      const x=cx+R*v*Math.cos(a), y=cy+R*v*Math.sin(a); i?ctx.lineTo(x,y):ctx.moveTo(x,y); });
    ctx.closePath();
    ctx.fillStyle=ds.fill; ctx.fill();
    ctx.strokeStyle=ds.color; ctx.lineWidth=2; ctx.setLineDash(ds.dash||[]); ctx.stroke(); ctx.setLineDash([]);
  });
}

    return `<div class="card" style="${S.catsEnabled.includes(k)?'':'opacity:.45'}">

      <div style="margin:4px 0 8px">${(CATEGORY_SOURCES[k]||[]).map(([n,u])=>`<a href="${u}" target="_blank" rel="noopener" class="pill" style="text-decoration:none;cursor:pointer">${n} ↗</a>`).join('')}</div>
      ${effectiveItems(k).map(t=>`<div class="topicitem"><span>${esc(t)}${fresh.has(t.trim().toLowerCase())?' <span class="tag" style="font-size:.6rem;color:var(--gold)">fresh</span>':''}${S.prepNotes[t]?' <span class="tag" style="font-size:.62rem">prepped</span>':''}</span><button class="btn ghost" style="padding:4px 11px;font-size:.74rem;white-space:nowrap" data-learn="${esc(t)}">Learn ↗</button></div>`).join('')}
    </div>`;}).join('')}`;
}
function daysSinceRefresh(){
  const base = S.bankUpdated ? new Date(S.bankUpdated) : new Date('2026-06-10T00:00:00');
  return Math.max(0, Math.floor((new Date()-base)/86400000));
}
function isStale(){ return daysSinceRefresh()>=30; }
function staleLine(){
  const d=daysSinceRefresh();
  if(S.bankUpdated) return `Last refreshed ${S.bankUpdated.slice(0,10)} (${d} day${d===1?'':'s'} ago).`;
  return `Using the built-in bank seeded ${SEED_DATE} (${d} days old).`;
}
function saveCity(){ S.city=($('cityInput').value||'').trim(); save(); render(); toast('City saved', S.city||'cleared'); }
function refreshPromptText(){
  const date=new Date().toDateString();
  const city=(S.city||'').trim();
  const cityLine = city
    ? `My city is ${city}. Weight the municipal topics toward there.`
    : `For municipal topics, use generic "your city" phrasing.`;
  return `Generate fresh communication-drill topics for the week of ${date}.
Return ONLY a JSON object, no prose and no code fences, with these exact keys: ${REFRESH_KEYS.join(', ')}.
Each key maps to an array of 5 topic strings reflecting what is actually being discussed right now in Canada and globally.
Rules: each topic under 12 words, phrased as a discussion prompt (not a headline), and debate-worthy (it should have two real sides). ${cityLine}`;
}
function copyText(text, okTitle, okSub){
  const done=()=>toast(okTitle||'Copied', okSub||'');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}
function fallbackCopy(text, done){
  try{
    const ta=document.createElement('textarea'); ta.value=text;
    ta.style.position='fixed'; ta.style.top='-1000px'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); ta.remove(); done();
  }catch(e){ toast('Copy unavailable','Select the text and copy it manually.'); }
}
function copyRefreshPrompt(){ copyText(refreshPromptText(),'Prompt copied','Paste it into a Claude chat.'); }
function learnPrompt(topic){
  return `Brief me so I can discuss this topic well in conversation: "${topic}".
Cover, concisely: (1) the 3 to 5 most important current facts and numbers, (2) the strongest honest case on each side, (3) one concrete example, analogy, or short story I could use, (4) one sharp open question I could ask someone to start a good exchange, and (5) the 3 sources you drew from, each with a link, so I can see where the information came from. Search anything time-sensitive so it stays current.`;
}
function parseTopicPaste(raw){
  if(!raw) return null;
  let s=raw.trim().replace(/```(json)?/gi,'').trim();
  const a=s.indexOf('{'), b=s.lastIndexOf('}');
  if(a!==-1 && b!==-1 && b>a){
    try{
      const obj=JSON.parse(s.slice(a,b+1));
      const out={};
      Object.entries(obj).forEach(([k,v])=>{
        if(REFRESH_KEYS.includes(k) && Array.isArray(v)){
          const items=v.map(x=>String(x).trim()).filter(Boolean);
          if(items.length) out[k]=items;
        }
      });
      return Object.keys(out).length? out : null;
    }catch(e){ /* fall through */ }
  }
  return null;
}
function applyTopicPaste(){
  const raw=$('pasteBox') ? $('pasteBox').value : '';
  const parsed=parseTopicPaste(raw);
  if(!parsed){ toast('Could not read that','Expecting a JSON object of categories. Try copying Claude\u2019s reply again.'); return; }
  let total=0;
  Object.entries(parsed).forEach(([k,items])=>{
    const seen=new Set(); const clean=[];
    items.forEach(t=>{ const key=t.toLowerCase(); if(!seen.has(key)){ seen.add(key); clean.push(t); } });
    S.refreshed[k]=clean; total+=clean.length;
  });
  S.bankUpdated=new Date().toISOString();
  save(); render();
  toast('Topics refreshed', `${total} fresh topics across ${Object.keys(parsed).length} categories.`);
}
function clearRefreshed(){
  S.refreshed={}; S.bankUpdated=null; save(); render();
  toast('Refreshed topics cleared','Back to the built-in bank.');
}
function toggleCat(k){
  S.catsEnabled = S.catsEnabled.includes(k)? S.catsEnabled.filter(c=>c!==k) : [...S.catsEnabled,k];
  if(!S.catsEnabled.length) S.catsEnabled=['evergreen'];
  save(); render();
}
function addTopic(){
  const v=$('newTopic').value.trim(); if(!v) return;
  S.customTopics.push({cat:$('newCat').value, text:v}); save(); render();
}
function delTopic(i){
  var t=S.customTopics[i]; if(!t) return;
  var snap=JSON.stringify(S.customTopics);
  S.customTopics.splice(i,1); save(); render();
  undoToast('Removed \u201c'+String(t.text||'topic').slice(0,28)+'\u201d', function(){ try{ S.customTopics=JSON.parse(snap); save(); render(); }catch(e){} });
}

/* ============ PROGRESS ============ */
function heatmapHTML(){
  const m=repsByDay(); const start=seasonStart(); start.setHours(0,0,0,0);
  const grid=new Date(start); grid.setDate(start.getDate()-start.getDay()); // back to Sunday
  const today=todayStr(); const startK=dstr(start);
  let cells='';
  for(let d=new Date(grid); d<=SEASON_END; d.setDate(d.getDate()+1)){
    const k=dstr(d), n=m[k]||0;
    const lvl=n>=3?' l3':n===2?' l2':n===1?' l1':'';
    const fut=k>today?' future':''; const td=k===today?' today':'';
    const hide=k<startK?'visibility:hidden':'';
    cells+=`<div class="cell${lvl}${fut}${td}" title="${k}: ${n} drill${n===1?'':'s'}" style="${hide}"></div>`;
  }
  return `<div class="heat">${cells}</div>
    <div class="heatlabels">
      <span class="heatkey">Fewer <span class="cell" style="background:var(--panel2)"></span><span class="cell" style="background:rgba(164,121,255,.30)"></span><span class="cell" style="background:rgba(164,121,255,.55)"></span><span class="cell" style="background:rgba(164,121,255,.88)"></span> more</span>
      <span class="heatkey"><span class="cell" style="background:var(--panel2);outline:1.5px solid var(--gold);outline-offset:1px"></span> today</span>
    </div>`;
}
function recordsCard(){
  const bd=bestDay();
  return `<div class="card records">
    <h2>Consistency</h2>
    <div class="statrow">
      <div class="stat"><div class="v">${streak()}🔥</div><div class="l">Current streak</div></div>
      <div class="stat"><div class="v">${longestStreak()}</div><div class="l">Longest streak</div></div>
      <div class="stat"><div class="v">${activeDays()}</div><div class="l">Active days</div></div>
      <div class="stat"><div class="v">${bd.count||0}</div><div class="l">Best day</div></div>
    </div>
    <h3 style="margin-top:16px">Season heatmap</h3>
    <p class="muted" style="margin-bottom:8px">Every square is a day. Darker means more drills. Don't break the chain.</p>
    ${heatmapHTML()}
  </div>`;
}
function bestsCard(){
  const rows=Object.entries(bestByDrill()).sort((a,c)=>c[1].score-a[1].score);
  if(!rows.length) return '';
  return `<div class="card records">
    <h2>Personal bests</h2>
    <p class="muted">Your top self-score on each drill. Beat one in Train and you'll get a fanfare.</p>
    <div style="margin-top:8px">${rows.map(([name,r])=>`<div class="topicitem"><span><b>${esc(name)}</b> <span class="muted">· ${esc(r.topic.slice(0,40))}${r.topic.length>40?'…':''}</span></span><span class="rt">${r.score}/100 · ${r.date}</span></div>`).join('')}</div>
  </div>`;
}
function pageProgress(){
  const sc=latestScores();
  const repsBySkill = SKILLS.map(sk=>{
    const rs=S.reps.filter(r=>r.skill===sk.id);
    const avg=rs.length? Math.round(rs.reduce((a,r)=>a+r.score,0)/rs.length) : null;
    return {sk,n:rs.length,avg};
  });
  const recent=[...S.reps].reverse().slice(0,8);
  return `
  <div class="card">
    <h2>Skill radar ${S.assessments.length>1?'<span class="muted" style="font-weight:400;font-size:.8rem">(grey = first, gold dashes = projected Dec 31, green = latest)</span>':''}</h2>
    ${sc? `<canvas id="radarProg"></canvas>` : `<p class="muted">Take the assessment to see your radar.</p><button class="btn" onclick="nav('assess')" style="margin-top:8px">Take assessment</button>`}
    ${sc? `<div class="flex" style="margin-top:8px"><button class="btn ghost" onclick="nav('assess')">Re-take assessment</button><span class="muted">${S.assessments.length} assessment${S.assessments.length>1?'s':''} · last: ${S.assessments[S.assessments.length-1].date.slice(0,10)}</span></div>`:''}
  </div>
  ${recordsCard()}
  ${bestsCard()}
  <div class="card">
    <h2>Training volume & self-scores</h2>
    ${repsBySkill.map(r=>`
      <div style="margin-top:10px;font-size:.9rem"><b>${r.sk.name}</b> <span class="muted">· ${r.n} reps${r.avg!==null?` · avg self-score ${r.avg}/100`:''}</span></div>
      <div class="bar"><i style="width:${Math.min(100,r.n*8)}%"></i></div>`).join('')}
    ${S.reps.length===0?'<p class="muted">No drills logged yet, head to Train.</p>':''}
  </div>
  ${recent.length? `<div class="card"><h2>Recent reps</h2>${recent.map(r=>`<div class="topicitem"><span><b>${r.drill}</b> <span class="muted">· ${esc(r.topic.slice(0,60))}${r.topic.length>60?'…':''}</span></span><span class="muted">${r.score}/100 · ${r.date.slice(0,10)}</span></div>`).join('')}</div>`:''}
  <div class="card">
    <h2>Backup & restore</h2>
    <p class="muted">${Store.usable()? 'Progress saves automatically in this browser.' : '⚠ This environment can’t persist data between sessions, export your progress below and import it next time.'} Export periodically to be safe, or to move between devices.</p>
    <div class="flex" style="margin-top:10px">
      <button class="btn ghost" onclick="exportData()">Export progress</button>
      <button class="btn ghost" onclick="$('importFile').click()">Import progress</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this)">
    </div>
  </div>`;
}
function exportData(){
  const blob=new Blob([JSON.stringify(Store.dump(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='communication-trainer-progress.json'; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=e=>{ try{
    Store.load(JSON.parse(e.target.result));
    S.assessments=Store.get('assessments',[]); S.reps=Store.get('reps',[]);
    S.lessonsDone=Store.get('lessonsDone',{}); S.customTopics=Store.get('customTopics',[]);
    S.catsEnabled=Store.get('catsEnabled',Object.keys(DEFAULT_TOPICS)); S.prepNotes=Store.get('prepNotes',{});
    S.refreshed=Store.get('refreshed',{}); S.bankUpdated=Store.get('bankUpdated',null); S.city=Store.get('city','');
    render(); alert('Progress imported.');
  }catch(err){ alert('Could not read that file.'); } };
  rd.readAsText(f);
}

document.addEventListener('click', e=>{
  const b = e.target.closest ? e.target.closest('[data-learn]') : null;
  if(!b) return;
  copyText(learnPrompt(b.getAttribute('data-learn')), 'Learn-prompt copied', 'Paste it into a Claude chat to dig in.');
});

render();

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and all eight tools live in that storage.
   This is a request, not a guarantee, which is why the Vault backup still matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();

</script>
