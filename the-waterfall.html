<style>
:root{--bg:#0c0e1a;--panel:#141830;--panel2:#1a1f3a;--txt:#eef0fb;--muted:#8089a8;--dim:#6f7798;
  --line:rgba(120,130,180,.16);--gold:#f0b73e;--gold2:#f6cf6a;--green:#2fd180;--green2:#9af0c6;
  --blue:#4ea3e0;--violet:#9d7bff;--rose:#f0628a;--amber:#f0683e;--cyan:#45c8d8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:
  radial-gradient(1100px 600px at 50% -10%,rgba(69,200,216,.06),transparent 60%),
  radial-gradient(900px 500px at 85% 8%,rgba(240,183,62,.05),transparent 55%),
  var(--bg);
  color:var(--txt);font-family:'Outfit',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
#app{max-width:640px;margin:0 auto;
  padding:0 max(14px,env(safe-area-inset-left)) calc(96px + env(safe-area-inset-bottom)) max(14px,env(safe-area-inset-right))}

/* Bottom tab bar: setup is quarterly, the living layer is daily, so the daily
   layer gets the front door. Same pattern as the Communicator. */
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;
  background:rgba(12,14,26,.92);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-top:1px solid var(--line);
  padding:7px max(10px,env(safe-area-inset-left)) calc(7px + env(safe-area-inset-bottom)) max(10px,env(safe-area-inset-right))}
.tabbar button{flex:1;background:none;border:none;cursor:pointer;padding:5px 2px;border-radius:11px;
  display:flex;flex-direction:column;align-items:center;gap:2px;color:#5a627e;font-family:'Outfit',sans-serif}
.tabbar button .tglyph{font-size:16px;line-height:1}
.tabbar button .tlbl{font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.tabbar button.on{color:var(--cyan)}
.tabbar button.on .tglyph{text-shadow:0 0 12px rgba(69,200,216,.6)}
.cinzel{font-family:'Cinzel',serif}
.mono{font-family:'Space Mono',monospace}

/* App chrome. Blurred fill runs up under the Dynamic Island. */
.appbar{position:sticky;top:0;z-index:50;
  margin:0 calc(-1 * max(14px,env(safe-area-inset-left))) 12px;
  padding:calc(env(safe-area-inset-top,0px) + 11px) max(14px,env(safe-area-inset-left)) 11px max(14px,env(safe-area-inset-right));
  background:rgba(12,14,26,.90);backdrop-filter:saturate(140%) blur(14px);-webkit-backdrop-filter:saturate(140%) blur(14px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:9px}
.appbar-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--txt);letter-spacing:.04em;white-space:nowrap;line-height:1.1}
.appbar-sub{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-top:2px;white-space:nowrap}
.appbar-pill{display:flex;align-items:center;gap:6px;padding:6px 11px;border-radius:99px;
  background:rgba(69,200,216,.1);border:1px solid rgba(69,200,216,.35);
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--cyan);white-space:nowrap;flex-shrink:0}
.homebtn{display:grid;place-items:center;width:33px;height:33px;border-radius:10px;flex-shrink:0;
  border:1px solid rgba(240,183,62,.35);background:rgba(240,183,62,.10);color:#f0b73e;
  font-size:15px;line-height:1;text-decoration:none;margin-right:9px}
.homebtn:active{transform:scale(.93)}

.eyebrow{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);font-weight:600}
.panel{background:linear-gradient(180deg,rgba(26,31,58,.9),rgba(20,24,48,.9));border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:13px;position:relative}
.panel.locked>*:not(.lockveil){filter:blur(3px) saturate(.6);opacity:.5;pointer-events:none}
.lockveil{position:absolute;inset:0;z-index:5;display:grid;place-items:center;border-radius:16px}
.lockveil .msg{background:rgba(12,14,26,.85);border:1px solid var(--line);padding:9px 15px;border-radius:99px;font-size:11.5px;color:var(--muted)}

.gatehead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.gnum{width:26px;height:26px;border-radius:9px;display:grid;place-items:center;flex-shrink:0;
  font-family:'Space Mono',monospace;font-size:12px;font-weight:700}
.gatehead h2{font-family:'Cinzel',serif;font-size:15px;font-weight:700;letter-spacing:.03em}
.gsub{font-size:11px;color:var(--dim);line-height:1.45;margin:2px 0 10px 36px}

.row{display:grid;gap:7px;padding:9px 0;border-bottom:1px solid rgba(120,130,180,.09);align-items:end}
.row:last-of-type{border-bottom:none}
.f label{display:block;font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:3px;font-weight:600;white-space:nowrap}
input,select{background:rgba(10,12,22,.7);color:var(--txt);border:1px solid rgba(120,130,180,.25);
  border-radius:10px;font-family:'Space Mono',monospace;font-size:13px;padding:9px 10px;outline:none;width:100%;
  text-align:left;-webkit-appearance:none;appearance:none;min-height:42px;line-height:1.2}
input:focus,select:focus{border-color:rgba(69,200,216,.55)}
input[type=text]{font-family:'Outfit',sans-serif}
select{background-image:linear-gradient(45deg,transparent 50%,var(--dim) 50%),linear-gradient(135deg,var(--dim) 50%,transparent 50%);
  background-position:calc(100% - 15px) 50%,calc(100% - 10px) 50%;background-size:5px 5px;background-repeat:no-repeat;padding-right:26px}
.xbtn{background:transparent;border:none;color:#5a627e;font-size:14px;cursor:pointer;padding:9px 6px;line-height:1;flex-shrink:0}
.xbtn:active{color:var(--rose)}
.addbtn{width:100%;margin-top:10px;padding:10px;border-radius:11px;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:12px;font-weight:600;color:var(--muted);background:rgba(255,255,255,.03);border:1px dashed rgba(120,130,180,.3)}
.addbtn:active{background:rgba(255,255,255,.06)}
.btn{padding:10px 16px;border-radius:11px;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:12.5px;font-weight:700}
.btn.gold{color:#0c0e1a;background:linear-gradient(180deg,var(--gold2),#e2a32f)}
.btn.ghost{color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line)}
.skipbtn{font-size:10.5px;color:var(--dim);background:none;border:none;cursor:pointer;text-decoration:underline;padding:6px}

.totline{display:flex;justify-content:space-between;align-items:baseline;margin-top:11px;padding-top:10px;border-top:1px solid var(--line)}
.totline .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
.totline .v{font-family:'Space Mono',monospace;font-size:16px;font-weight:700}

.steprail{display:flex;gap:5px;margin:0 0 14px;overflow-x:auto;scrollbar-width:none;padding:2px}
.steprail::-webkit-scrollbar{display:none}
.schip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:99px;cursor:pointer;
  border:1px solid var(--line);background:rgba(255,255,255,.03);font-size:11px;font-weight:600;color:var(--dim);white-space:nowrap}
.schip.done{border-color:rgba(47,209,128,.4);color:var(--green2)}
.schip.cur{border-color:rgba(69,200,216,.5);color:var(--cyan);background:rgba(69,200,216,.08)}
.schip.lock{opacity:.45}

.wf-tier{display:flex;align-items:center;gap:9px;margin-bottom:3px}
.wf-lbl{width:86px;flex-shrink:0;text-align:right}
.wf-lbl .n{font-size:10.5px;font-weight:600;color:var(--muted)}
.wf-lbl .a{font-family:'Space Mono',monospace;font-size:10px;color:var(--dim)}
.wf-track{flex:1;height:26px;position:relative;border-radius:6px;background:rgba(255,255,255,.025)}
.wf-bar{position:absolute;top:0;bottom:0;border-radius:6px;min-width:2px;transition:left .5s ease,width .5s ease}
.wf-fall{width:2px;background:linear-gradient(180deg,rgba(69,200,216,.0),rgba(69,200,216,.55));position:absolute;height:7px}
.pool{border-radius:12px;padding:13px 15px;margin-top:12px;border:1px solid rgba(69,200,216,.35);
  background:linear-gradient(180deg,rgba(69,200,216,.12),rgba(69,200,216,.04))}

table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line);font-weight:600}
td{padding:8px;border-bottom:1px solid rgba(120,130,180,.08)}
td.num,th.num{text-align:right;font-family:'Space Mono',monospace}
tr:last-child td{border-bottom:none}

.tag{display:inline-block;font-size:9px;padding:2px 8px;border-radius:99px;font-weight:700;letter-spacing:.05em}
.bar{height:5px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:5px}
.bar>i{display:block;height:100%;border-radius:3px}
.fadeUp{animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media(min-width:480px){
  .row.r-inc{grid-template-columns:1.4fr 1fr .9fr 30px}
  .row.r-debt{grid-template-columns:1.3fr 1fr .7fr .8fr .8fr 30px}
  .row.r-bill{grid-template-columns:1.5fr .9fr .9fr .7fr 30px}
  .row.r-fwd{grid-template-columns:1.4fr 1fr 1fr 1fr 30px}
}
@media(max-width:479px){
  .row.r-inc{grid-template-columns:1fr 1fr;grid-template-areas:"a a" "b c"}
  .row.r-inc .f:nth-child(1){grid-area:a}
  .row.r-debt{grid-template-columns:1fr 1fr}
  .row.r-debt .f:nth-child(1){grid-column:1/-1}
  .row.r-bill{grid-template-columns:1fr 1fr;grid-template-areas:none}\n  .row.r-bill .f:nth-child(1){grid-column:1/-1}
  .row.r-fwd{grid-template-columns:1fr 1fr}
  .row.r-fwd .f:nth-child(1){grid-column:1/-1}
  .rowx{position:relative;padding-right:26px}
  .rowx .xbtn{position:absolute;top:4px;right:-6px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
/* ================= THE WATERFALL =================
   A cash flow waterfall is a sequential priority of payments: money enters at
   the top and passes through gates in strict order. Each gate takes its cut.
   Only what survives every gate reaches the pool at the bottom, and that pool
   is the one number you steer day to day: Enjoy. */

var KEY="waterfall:v1";
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(m){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m];});}
function J(k,d){ try{ var v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
function fmt(n){ n=Math.round(n||0); return "$"+Math.abs(n).toLocaleString(); }
function fmtS(n){ return (n<0?"-":"")+fmt(n); }
function uid(){ return Math.random().toString(36).slice(2,9); }

var DEF={
  incomes:[], debts:[], bills:[], fwd:[],
  skip:{debts:false,bills:false,fwd:false},
  payFreq:"biweekly",
  payMode:"uniform",     /* uniform: equal cheques · custom: uneven cheques with days */
  cheques:[],            /* custom mode: [{id,label,amt,day}] each lands once a month */
  strategy:"avalanche",
  nextPay:null,          /* YYYY-MM-DD of the next cheque */
  spends:[],             /* enjoy spending log [{id,ds,amt,note}] */
  exec:{},               /* payday execution: {periodStartISO:{committed,debt,forward}} */
  hist:[],               /* monthly snapshots [{ym,inc,debt,enjoy,fwd}] */
  deposits:[],           /* real money that landed [{id,ds,label,amt,alloc:{debt,committed,forward,enjoy}}] */
  windfall:{debt:50,forward:30,enjoy:20},
  rules:{},              /* audit: merchant key -> bucket override */
  audit:null,            /* last imported statement {ym,txns,importedAt} */
  accounts:{committed:"Bills account",debt:"Debt payments",forward:"Savings / investing",enjoy:"Spending account"},
  tab:null,              /* today | plan | payday | audit */
  created:null
};
var S=J(KEY,null)||JSON.parse(JSON.stringify(DEF));

/* ---------- history: the way back ----------
   Every change flows through save(), so history hooks there. A snapshot is
   taken before each change; bursts of typing coalesce into one step so undo
   rewinds an edit, not a keystroke. The tab field is ignored when deciding
   whether anything changed, so switching views never pollutes history. */
var UNDO=[],REDO=[],__lastPush=0,__prevFull=null,__prevSig=null;
function sig(str){ try{ var o=JSON.parse(str); delete o.tab; return JSON.stringify(o); }catch(e){ return str; } }
if(!S.created){ S.created=new Date().toISOString().slice(0,10); }
if(!S.accounts.debt){ S.accounts.debt="Debt payments"; }
/* migrations for states saved before these features existed */
if(!S.strategy) S.strategy="avalanche";
if(!S.spends) S.spends=[];
if(!S.exec) S.exec={};
if(!S.hist) S.hist=[];
if(S.nextPay===undefined) S.nextPay=null;
if(!S.payMode) S.payMode="uniform";
if(!S.cheques) S.cheques=[];
if(!S.deposits) S.deposits=[];
if(!S.windfall) S.windfall={debt:50,forward:30,enjoy:20};
if(!S.rules) S.rules={};
if(S.audit===undefined) S.audit=null;
if(S.tab===undefined) S.tab=null;
S.bills.forEach(function(b){ if(!b.freq) b.freq="monthly"; });
function save(){
  var now=JSON.stringify(S);
  if(__prevFull===null){ __prevFull=now; __prevSig=sig(now); }
  else {
    var ns=sig(now);
    if(ns!==__prevSig){
      var t=Date.now();
      if(t-__lastPush>1200){ UNDO.push(__prevFull); if(UNDO.length>30) UNDO.shift(); __lastPush=t; }
      REDO.length=0;
      __prevFull=now; __prevSig=ns;
    } else { __prevFull=now; }
  }
  try{ localStorage.setItem(KEY,now); }catch(e){}
}
function undoStep(){
  if(!UNDO.length) return;
  REDO.push(JSON.stringify(S));
  var prev=UNDO.pop();
  try{ S=JSON.parse(prev); }catch(e){ return; }
  __prevFull=prev; __prevSig=sig(prev); __lastPush=0;
  try{ localStorage.setItem(KEY,prev); }catch(e){}

function redoStep(){

/* ---------- math ---------- */
var PAYS={biweekly:26/12, semimonthly:2, monthly:1, weekly:52/12};
function toMonthly(amt,freq){ return (+amt||0)*(PAYS[freq]||1); }
function incomeMo(){
  if(S.payMode==="custom") return S.cheques.reduce(function(t,c){ return t+(+c.amt||0); },0);
  return S.incomes.reduce(function(t,i){ return t+toMonthly(i.amt,i.freq); },0);
}
function debtMinMo(){ return S.debts.reduce(function(t,d){ return t+(+d.min||0); },0); }
function debtExtraMo(){ return S.debts.reduce(function(t,d){ return t+(+d.extra||0); },0); }
function debtMo(){ return debtMinMo()+debtExtraMo(); }
var BILLFREQ={monthly:1,quarterly:1/3,semiannual:1/6,annual:1/12};
function billMo(b){ return (+b.amt||0)*(BILLFREQ[b.freq||"monthly"]||1); }
function billsMo(){ return S.bills.reduce(function(t,b){ return t+billMo(b); },0); }
function fwdMo(){ return S.fwd.reduce(function(t,f){ return t+(+f.amt||0); },0); }
function enjoyMo(){ return incomeMo()-debtMo()-billsMo()-fwdMo(); }

/* Avalanche payoff simulation. Minimums always paid; the attack pool (all
   extras) hits the highest rate first. When a debt clears, its minimum rolls
   into the pool. Returns months, total interest, and per debt clear dates. */
function simulate(extraPool,strategy){
  strategy=strategy||S.strategy||"avalanche";
  var ds=S.debts.map(function(d){ return {id:d.id,name:d.name,bal:+d.balance||0,r:(+d.rate||0)/100/12,min:+d.min||0}; })
                .filter(function(d){ return d.bal>0; });
  if(!ds.length) return {months:0,interest:0,order:[],impossible:false};
  var months=0,interest=0,order=[];
  while(ds.length && months<600){
    months++;
    var pool=extraPool;
    ds.sort(strategy==="snowball"?function(a,b){ return a.bal-b.bal; }:function(a,b){ return b.r-a.r; });
    for(var i=0;i<ds.length;i++){
      var d=ds[i], int_=d.bal*d.r; interest+=int_; d.bal+=int_;
      var pay=Math.min(d.bal,d.min); d.bal-=pay;
      if(pay<Math.min(int_,d.min) && d.min<int_) {} /* min below interest: pool must help or this never ends */
    }
    for(var i=0;i<ds.length && pool>0;i++){
      var take=Math.min(ds[i].bal,pool); ds[i].bal-=take; pool-=take;
    }
    for(var i=ds.length-1;i>=0;i--){
      if(ds[i].bal<=0.005){ order.push({name:ds[i].name,month:months}); extraPool+=ds[i].min; ds.splice(i,1); }
    }
  }
  return {months:months,interest:Math.round(interest),order:order,impossible:ds.length>0};
}
/* ---------- the pay cycle ---------- */
function pd(iso){ var q=String(iso).split("-"); return new Date(+q[0],+q[1]-1,+q[2]); }
function iso(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function stepPay(d,dir){
  var n=new Date(d);
  if(S.payFreq==="weekly") n.setDate(n.getDate()+7*dir);
  else if(S.payFreq==="biweekly") n.setDate(n.getDate()+14*dir);
  else if(S.payFreq==="semimonthly") n.setDate(n.getDate()+15*dir);
  else n.setMonth(n.getMonth()+1*dir);
  return n;
}
function rollPay(){
  if(!S.nextPay) return null;
  var today=new Date(); today.setHours(0,0,0,0);
  var np=pd(S.nextPay), moved=false;
  while(np<=today){ np=stepPay(np,1); moved=true; }
  if(moved){ S.nextPay=iso(np); save(); }
  return np;
}
function periodStart(){
  if(S.payMode==="custom"){ var pc=currentPeriodC(); return pc?pc.start:null; }
  var np=rollPay(); return np?stepPay(np,-1):null;
}
function periodEndISO(){
  if(S.payMode==="custom"){ var pc=currentPeriodC(); return pc?iso(pc.end):null; }
  rollPay(); return S.nextPay;
}
function daysToPay(){
  var today=new Date(); today.setHours(0,0,0,0);
  if(S.payMode==="custom"){
    var pc=currentPeriodC(); if(!pc) return null;
    return Math.max(1,Math.round((pc.end-today)/86400000));
  }
  var np=rollPay(); if(!np) return null;
  return Math.max(1,Math.round((np-today)/86400000));
}
function periodSpends(){
  var ps=periodStart(); if(!ps) return [];
  var a=iso(ps), np=periodEndISO(); if(!np) return [];
  return S.spends.filter(function(x){ return x.ds>=a && x.ds<np; });
}
function periodAllowance(){
  if(S.payMode==="custom"){
    var pc=currentPeriodC(); if(!pc) return 0;
    var al=allocatePattern().cheques.filter(function(x){ return x.id===pc.cheque.id; })[0];
    return al?al.enjoy:0;
  }
  return enjoyMo()/(PAYS[S.payFreq]||1);
}
function periodBurn(){ return periodSpends().reduce(function(t,x){ return t+(+x.amt||0); },0); }
/* ---------- uneven cheques: the fill-order engine ----------
   With uneven pay the month cannot be split evenly. Each cheque passes through
   the same gates in the same order: Debt, then Committed, then Forward. The
   small cheque is consumed by obligations; whatever survives the last gate of
   the last cheque is that cheque's Enjoy. This is the waterfall applied to
   time, not just money. */
function chequesSorted(){
  return S.cheques.slice().sort(function(a,b){ return (+a.day||1)-(+b.day||1); });
}
function allocatePattern(){
  var gates=[{k:"debt",left:debtMo()},{k:"committed",left:billsMo()},{k:"forward",left:fwdMo()}];
  var out=chequesSorted().map(function(c){
    var rem=+c.amt||0, take={debt:0,committed:0,forward:0};
    gates.forEach(function(g){
      if(rem<=0||g.left<=0) return;
      var t=Math.min(rem,g.left); take[g.k]=t; g.left-=t; rem-=t;
    });
    return {id:c.id,label:c.label,amt:+c.amt||0,day:+c.day||1,toDebt:take.debt,toCommitted:take.committed,toForward:take.forward,enjoy:rem};
  });
  var short=gates.reduce(function(t,g){ return t+g.left; },0);
  return {cheques:out,shortfall:short};
}
function clampDay(y,m,day){ var dim=new Date(y,m+1,0).getDate(); return Math.min(Math.max(1,day),dim); }
function chequeOccurrences(){
  /* actual dated occurrences around today, so the current period is exact */
  var t=new Date(); t.setHours(0,0,0,0);
  var occ=[];
  [-1,0,1].forEach(function(dm){
    var y=t.getFullYear(), m=t.getMonth()+dm;
    chequesSorted().forEach(function(c){
      var d=new Date(y,m,clampDay(y,m,+c.day||1));
      occ.push({date:d,c:c});
    });
  });
  occ.sort(function(a,b){ return a.date-b.date; });
  return occ;
}
function currentPeriodC(){
  var t=new Date(); t.setHours(0,0,0,0);
  var occ=chequeOccurrences(); if(!occ.length) return null;
  var cur=null,next=null;
  for(var i=0;i<occ.length;i++){
    if(occ[i].date<=t) cur=occ[i];
    else { if(cur){ next=occ[i]; break; } }
  }
  if(!cur||!next) return null;
  return {cheque:cur.c,start:cur.date,end:next.date};
}
/* ---------- the intake: real money through the gates ----------
   The plan says what a typical cheque should do. The intake handles what the
   actual deposit does. Gates are funded at the month level: each real deposit
   fills whatever the month still owes, in gate order, and the remainder banks
   as Enjoy. A lump sum can instead take the windfall split. */
function ymNow(){ return new Date().toISOString().slice(0,7); }
function depositsMonth(ym){ ym=ym||ymNow(); return S.deposits.filter(function(d){ return String(d.ds).slice(0,7)===ym; }); }
function fundedMonth(ym){
  var f={debt:0,committed:0,forward:0,enjoy:0};
  depositsMonth(ym).forEach(function(d){
    if(!d.alloc) return;
    f.debt+=+d.alloc.debt||0; f.committed+=+d.alloc.committed||0;
    f.forward+=+d.alloc.forward||0; f.enjoy+=+d.alloc.enjoy||0;
  });
  return f;
}
function gatesRemaining(ym){
  var f=fundedMonth(ym);
  return {debt:Math.max(0,debtMo()-f.debt), committed:Math.max(0,billsMo()-f.committed), forward:Math.max(0,fwdMo()-f.forward)};
}
function proposeAlloc(amt,kind){
  amt=+amt||0;
  var a={debt:0,committed:0,forward:0,enjoy:0};
  if(kind==="lump"){
    var w=S.windfall, pd_=Math.max(0,+w.debt||0), pf=Math.max(0,+w.forward||0), pe=Math.max(0,+w.enjoy||0);
    var tot=pd_+pf+pe||1;
    a.debt=Math.round(amt*pd_/tot); a.forward=Math.round(amt*pf/tot); a.enjoy=amt-a.debt-a.forward;
    return a;
  }
  var rem=gatesRemaining(), left=amt;
  [["debt",rem.debt],["committed",rem.committed],["forward",rem.forward]].forEach(function(g){
    if(left<=0) return;
    var t=Math.min(left,Math.round(g[1])); a[g[0]]=t; left-=t;
  });
  a.enjoy=left;
  return a;
}
function spendsMonth(ym){ ym=ym||ymNow(); return S.spends.filter(function(x){ return String(x.ds).slice(0,7)===ym; }).reduce(function(t,x){ return t+(+x.amt||0); },0); }
/* The wallet is PERIOD scoped, not month scoped. A day-30 cheque funds spending
   through the middle of the NEXT month; resetting the wallet on the 1st would
   zero it mid-period. Gate funding stays month scoped because the gates are
   monthly obligations; only the spending wallet follows the cheque. */
function depositsPeriod(){
  var ps=periodStart(), pe=periodEndISO();
  if(!ps||!pe) return depositsMonth();               /* uniform mode, no anchor: month fallback */
  var a=iso(ps);
  return S.deposits.filter(function(d){ return d.ds>=a && d.ds<pe; });
}
function bankedPeriod(){
  return depositsPeriod().reduce(function(t,d){ return t+((d.alloc&&+d.alloc.enjoy)||0); },0);
}
function burnWallet(){
  var ps=periodStart(), pe=periodEndISO();
  if(!ps||!pe) return spendsMonth();
  return periodBurn();
}
function walletLeft(){ return bankedPeriod() - burnWallet(); }
/* ---------- payday execution + streak ---------- */
function execKey(){ var ps=periodStart(); return ps?iso(ps):null; }
function movesFor(al){
  /* al: one cheque allocation from allocatePattern(), or null for uniform */
  if(al){
    return [
      {k:"debt",label:"Debt payment"+(debtExtraMo()>0?" + extra":""),amt:al.toDebt,color:"var(--rose)"},
      {k:"committed",label:"Bills",amt:al.toCommitted,color:"var(--gold)"},
      {k:"forward",label:"Savings",amt:al.toForward,color:"var(--green)"}
    ].filter(function(m){ return m.amt>0; });
  }
  var ppm=PAYS[S.payFreq]||1;
  return [
    {k:"committed",label:"Bills",amt:billsMo()/ppm,color:"var(--gold)"},
    {k:"debt",label:"Debt payment"+(debtExtraMo()>0?" + extra":""),amt:debtMo()/ppm,color:"var(--rose)"},
    {k:"forward",label:"Savings",amt:fwdMo()/ppm,color:"var(--green)"}
  ].filter(function(m){ return m.amt>0; });
}
function paydayMoves(){
  if(S.payMode==="custom"){
    var pc=currentPeriodC(); if(!pc) return [];
    var al=allocatePattern().cheques.filter(function(x){ return x.id===pc.cheque.id; })[0];
    return movesFor(al||null);
  }
  return movesFor(null);
}
function periodExecuted(key){
  var e=S.exec[key]; if(!e) return false;
  return paydayMoves().every(function(m){ return e[m.k]; });
}
function pastPeriodStarts(n){
  /* period start dates walking backward from the current one, newest first */
  var key=execKey(); if(!key) return [];
  if(S.payMode!=="custom"){
    var out=[], ps=pd(key);
    for(var i=0;i<n;i++){ out.push(iso(ps)); ps=stepPay(ps,-1); }
    return out;
  }
  var t=new Date(); t.setHours(0,0,0,0);
  var occ=[];
  for(var dm=-9;dm<=0;dm++){
    var y=t.getFullYear(), m=t.getMonth()+dm;
    chequesSorted().forEach(function(c){ occ.push(new Date(y,m,clampDay(y,m,+c.day||1))); });
  }
  occ=occ.filter(function(d){ return iso(d)<=key; }).sort(function(a,b){ return b-a; });
  return occ.slice(0,n).map(iso);
}
function periodExecutedAt(k){
  /* past periods: judge by what was recorded, since the moves may have changed */
  var e=S.exec[k]; if(!e) return false;
  if(k===execKey()) return periodExecuted(k);
  return Object.keys(e).length>0 && Object.keys(e).every(function(x){ return e[x]; });
}
function execStats(){
  var key=execKey(); if(!key) return null;
  var starts=pastPeriodStarts(8), done=0,total=0;
  starts.forEach(function(k,i){
    if(S.exec[k]!==undefined || i===0){ total++; if(periodExecutedAt(k)) done++; }
  });
  var streak=0, all=pastPeriodStarts(200);
  for(var i=0;i<all.length;i++){
    if(periodExecutedAt(all[i])) streak++;
    else break;
  }
  return {done:done,total:total,streak:streak,cur:periodExecuted(key)};
}
/* ---------- monthly snapshots ---------- */
function snapshot(){
  if(!S.incomes.length) return;

  var balTot=S.debts.reduce(function(t,d){ return t+(+d.balance||0); },0);
  var ex=S.hist.filter(function(h){ return h.ym===ym; })[0];
  var row={ym:ym,inc:Math.round(incomeMo()),debt:Math.round(balTot),enjoy:Math.round(enjoyMo()),fwd:Math.round(fwdMo())};
  if(ex){ ex.inc=row.inc; ex.debt=row.debt; ex.enjoy=row.enjoy; ex.fwd=row.fwd; }
  else S.hist.push(row);
  if(S.hist.length>24) S.hist=S.hist.slice(-24);

}
function addMonths(n){
  var d=new Date(); d.setMonth(d.getMonth()+n);
  return d.toLocaleDateString('en-CA',{month:'short',year:'numeric'});
}

/* ---------- gate completion ---------- */
function gateDone(n){
  if(n===1) return S.payMode==="custom"?S.cheques.length>0:S.incomes.length>0;
  if(n===2) return S.debts.length>0||S.skip.debts;
  if(n===3) return S.bills.length>0||S.skip.bills;
  if(n===4) return S.fwd.length>0||S.skip.fwd;
  if(n===5) return gateDone(1)&&gateDone(2)&&gateDone(3)&&gateDone(4);

}
function curGate(){ for(var i=1;i<=5;i++){ if(!gateDone(i)) return i; } return 5; }
function unlocked(n){ if(n===1) return true; return gateDone(n-1)||gateDone(n); }

var GATES=[

function merchKey(desc){

}
function categorizeTx(desc,inflow){

function parseStatement(text){
  var lines=String(text||"").split(/\r?\n/).map(function(l){ return l.trim(); }).filter(Boolean);
  if(!lines.length) return {txns:[],err:"Nothing to parse"};
  var delim=[",","\t",";"].map(function(d){ return [d,(lines[0].split(d).length)]; }).sort(function(a,b){ return b[1]-a[1]; })[0][0];

    }

  }
  var head=cells(lines[0]).map(function(c){ return c.toLowerCase(); });
  var hasHeader=head.some(function(c){ return /date|desc|amount|debit|credit|merchant|withdraw|deposit/.test(c); });
  var idx={date:-1,desc:-1,amt:-1,debit:-1,credit:-1};
  if(hasHeader){

      if(idx.desc<0&&/desc|merchant|detail|narrat|memo|transaction/.test(c)) idx.desc=i;
      if(idx.debit<0&&/debit|withdraw/.test(c)) idx.debit=i;
      if(idx.credit<0&&/credit|deposit/.test(c)) idx.credit=i;
      if(idx.amt<0&&/^amount$|^amt$/.test(c)) idx.amt=i;

  }
  function num(v){ if(v==null||v==="") return null; var n=+String(v).replace(/[$,\s]/g,"").replace(/^\((.*)\)$/,"-$1"); return isFinite(n)?n:null; }

    var d=new Date(v); if(!isNaN(d)) return d;
    var m=String(v).match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if(m){ var a=+m[1],b=+m[2],y=+m[3]; if(y<100)y+=2000; if(a>12) return new Date(y,b-1,a); return new Date(y,a-1,b); }

      desc=idx.desc>=0?c[idx.desc]:"";
      if(idx.debit>=0||idx.credit>=0){ out=idx.debit>=0?num(c[idx.debit]):null; inn=idx.credit>=0?num(c[idx.credit]):null; }
      else if(idx.amt>=0){ var v=num(c[idx.amt]); if(v!=null){ if(v<0){ out=-v; } else { inn=v; } } }
    }
    if(!hasHeader||(!desc&&out==null&&inn==null)){
      /* headerless: find first date-ish, last numeric, longest text */
      var nums=[],texts=[];
      c.forEach(function(x,i){ var n=num(x); if(n!=null&&!/\d{4}-\d{2}-\d{2}|\//.test(x)) nums.push([i,n]); else texts.push([i,x]); });
      date=null;
      for(var i=0;i<c.length;i++){ var d2=pdate(c[i]); if(d2){ date=d2; break; } }
      texts.sort(function(a,b){ return b[1].length-a[1].length; });
      desc=texts.length?texts[0][1]:"";
      if(nums.length===1){ var v2=nums[0][1]; if(v2<0) out=-v2; else out=v2; }
      else if(nums.length>=2){ out=nums[nums.length-2][1]||null; inn=nums[nums.length-1][1]||null; if(out===0)out=null; if(inn===0)inn=null; }
    }
    if(!desc&&out==null&&inn==null) return;
    var inflow=(inn!=null&&inn>0&&(out==null||out===0));
    var amt=inflow?inn:(out!=null?out:0);
    if(!(amt>0)) return;
    txns.push({id:uid(),d:date?iso(date):null,ym:date?iso(date).slice(0,7):"?",desc:desc||"(no description)",amt:Math.round(amt*100)/100,inflow:inflow,b:categorizeTx(desc,inflow)});
  });
  if(!txns.length) return {txns:[],err:"Could not find transactions. Paste the raw CSV export, headers included."};
  return {txns:txns,err:null};
}
function auditTotals(txns){
  var t={enjoy:0,committed:0,debt:0,forward:0,income:0,ignore:0};
  txns.forEach(function(x){ t[x.b]=(t[x.b]||0)+x.amt; });
  return t;
}
function findRecurring(txns){
  var by={};
  txns.forEach(function(x){ if(x.inflow||x.b==="ignore"||x.b==="income") return; var k=merchKey(x.desc); (by[k]=by[k]||[]).push(x); });
  var out=[];
  Object.keys(by).forEach(function(k){
    var g=by[k]; if(g.length<2) return;
    var avg=g.reduce(function(t,x){ return t+x.amt; },0)/g.length;
    if(avg<5) return;
    var tight=g.every(function(x){ return Math.abs(x.amt-avg)<=Math.max(3,avg*0.15); });
    if(!tight) return;
    var already=S.bills.some(function(b){ return merchKey(b.name)===k||String(b.name||"").toUpperCase().indexOf(k.split(" ")[0])>=0; });
    if(already) return;
    out.push({key:k,desc:g[0].desc,avg:Math.round(avg*100)/100,n:g.length});
  });
  return out.slice(0,6);
}

        +H.map(function(x,i){ return '<circle cx="'+px(i).toFixed(1)+'" cy="'+pyD(x.debt).toFixed(1)+'" r="2.6" fill="var(--rose)"/>'; }).join('')
        +'</svg>';
      var first=H[0], last=H[H.length-1];
      h+='<div style="display:flex;justify-content:space-between;font-size:9.5px;color:var(--dim);margin-top:2px"><span>'+esc(first.ym)+'</span><span>'+esc(last.ym)+'</span></div>';
      h+='<div style="display:flex;gap:14px;margin-top:8px;font-size:10.5px;flex-wrap:wrap">'
        +'<span><span style="display:inline-block;width:14px;height:2px;background:var(--rose);vertical-align:middle;margin-right:5px"></span>Debt '+fmt(last.debt)+(last.debt<first.debt?' <span style="color:var(--green2)">(down '+fmt(first.debt-last.debt)+')</span>':'')+'</span>'
        +'<span><span style="display:inline-block;width:14px;height:2px;background:var(--violet);vertical-align:middle;margin-right:5px"></span>To spend '+fmt(last.enjoy)+'/mo</span></div>';
    }
    h+='</div>';
  }

  /* ---------- reset ---------- */
  if(planTab) h+='<div style="text-align:center;margin-top:6px"><button class="skipbtn" id="resetAll" style="color:#5a627e">Reset the whole waterfall</button></div>';
  h+='<div class="mono" style="text-align:center;margin-top:12px;font-size:10px;color:#4e5573">Quinton Chambers \u00b7 every dollar has a place in line</div>';

  if(setupDone){
    var TABS=[["today","\u25c9","Today"],["plan","\u224b","Plan"],["payday","\u26a1","Payday"],["audit","\u2696","Review"]];
    h+='<div class="tabbar">'+TABS.map(function(t){
      return '<button class="'+(activeTab===t[0]?'on':'')+'" data-tab="'+t[0]+'"><span class="tglyph">'+t[1]+'</span><span class="tlbl">'+t[2]+'</span></button>';
    }).join('')+'</div>';
  }

  document.getElementById('app').innerHTML=h;
  wire();
}
function ord(n){ var s=["th","st","nd","rd"],v=n%100; return s[(v-20)%10]||s[v]||s[0]; }
function gateHead(n,title,sub){
  var g=GATES[n-1];
  return '<div class="gatehead"><div class="gnum" style="background:'+g.bg+';color:'+g.color+';border:1px solid color-mix(in srgb,'+g.color+' 40%,transparent)">'
    +(gateDone(n)?'\u2713':n)+'</div><h2 style="color:'+g.color+'">'+title+'</h2></div>'
    +'<div class="gsub">'+sub+'</div>';
}
function gatePanel(n,title,sub,body){
  var lock=!unlocked(n);
  var h='<div class="panel'+(lock?' locked':'')+'" id="g'+n+'">';
  if(lock) h+='<div class="lockveil"><div class="msg">Finish step '+(n-1)+' first</div></div>';
  h+=gateHead(n,title,sub);
  h+=body();
  h+='</div>';
  return h;
}

/* ---------- wiring ---------- */
var NEWROW={
  incomes:function(){ return {id:uid(),name:'',amt:'',freq:'biweekly'}; },
  cheques:function(){ return {id:uid(),label:'',amt:'',day:''}; },
  debts:function(){ return {id:uid(),name:'',balance:'',rate:'',min:'',extra:''}; },
  bills:function(){ return {id:uid(),name:'',amt:'',day:''}; },
  fwd:function(){ return {id:uid(),name:'',amt:'',target:'',cur:''}; }
};
function wire(){
  var app=document.getElementById('app');

  app.querySelectorAll('[data-add]').forEach(function(b){
    b.onclick=function(){ var c=b.dataset.add; S[c].push(NEWROW[c]()); save(); render();
      var last=document.querySelector('#g'+({incomes:1,cheques:1,debts:2,bills:3,fwd:4})[c]+' .row:last-of-type input');
      if(last) last.focus();
    };
  });
  app.querySelectorAll('[data-del]').forEach(function(b){
    b.onclick=function(){
      var c=b.dataset.del, id=b.dataset.id;
      var item=S[c].filter(function(x){ return x.id===id; })[0];
      var snap=JSON.stringify(S[c]);
      S[c]=S[c].filter(function(x){ return x.id!==id; });
      save(); render();
      undoToast('Removed '+((item&&item.name)?'\u201c'+String(item.name).slice(0,22)+'\u201d':'entry'),
        function(){ try{ S[c]=JSON.parse(snap); save(); render(); }catch(e){} });
    };
  });
  app.querySelectorAll('input[data-coll],select[data-coll]').forEach(function(el){
    var ev=el.tagName==='SELECT'?'change':'input';
    el.addEventListener(ev,function(){
      var it=S[el.dataset.coll].filter(function(x){ return x.id===el.dataset.id; })[0];
      if(!it) return;
      it[el.dataset.f]=el.type==='number'?(el.value===''?'':+el.value):el.value;
      save();
      if(ev==='change'){ render(); }
    });
    if(el.type==='number'||el.type==='text'){
      el.addEventListener('blur',function(){ render(); });
      el.addEventListener('keydown',function(e){ if(e.key==='Enter'){ el.blur(); } });
    }
  });
  app.querySelectorAll('[data-skip]').forEach(function(b){
    b.onclick=function(){ S.skip[b.dataset.skip]=true; save(); render(); };
  });
  app.querySelectorAll('[data-unskip]').forEach(function(b){
    b.onclick=function(){ S.skip[b.dataset.unskip]=false; save(); render(); };
  });
  app.querySelectorAll('[data-goto]').forEach(function(b){
    b.onclick=function(){ var el=document.getElementById(b.dataset.goto); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); };
  });
  app.querySelectorAll('[data-acct]').forEach(function(el){
    el.addEventListener('input',function(){ S.accounts[el.dataset.acct]=el.value; save(); });
  });
  var pf=document.getElementById('payFreq');
  if(pf) pf.onchange=function(){ S.payFreq=pf.value; save(); render(); };
  /* pay mode toggle */
  app.querySelectorAll('[data-paymode]').forEach(function(b){
    b.onclick=function(){
      S.payMode=b.dataset.paymode;
      if(S.payMode==='custom'&&!S.cheques.length){
        S.cheques.push({id:uid(),label:'First cheque',amt:'',day:15});
        S.cheques.push({id:uid(),label:'Second cheque',amt:'',day:30});
      }
      save(); render();
    };
  });
  /* strategy toggle */
  app.querySelectorAll('[data-strat]').forEach(function(b){
    b.onclick=function(){ S.strategy=b.dataset.strat; save(); render(); };
  });
  /* payday anchor */
  var npSet=document.getElementById('npSet');
  if(npSet) npSet.onclick=function(){
    var v=document.getElementById('npInput').value;
    if(!v){ return; }
    S.nextPay=v; save(); render();
  };
  var npCh=document.getElementById('npChange');
  if(npCh) npCh.onclick=function(){
    var v=window.prompt('Next payday (YYYY-MM-DD):', S.nextPay||'');
    if(v===null) return;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(v)){ undoToast('Use the format YYYY-MM-DD'); return; }
    S.nextPay=v; save(); render();
  };
  /* the intake: live proposal + commit */
  function renderDepPreview(){
    var box=document.getElementById('depPreview'); if(!box) return;
    var amt=+(document.getElementById('depAmt').value||0);
    var kind=document.getElementById('depKind').value;
    if(!(amt>0)){ box.innerHTML=''; return; }
    var a=window.__depDraft && window.__depDraft.amt===amt && window.__depDraft.kind===kind ? window.__depDraft.a : proposeAlloc(amt,kind);
    window.__depDraft={amt:amt,kind:kind,a:a};
    var rows=[["debt","Debt","var(--rose)"],["committed","Bills","var(--gold)"],["forward","Savings","var(--green)"],["enjoy","Spend","var(--violet)"]];
    var sum=rows.reduce(function(t,r){ return t+(+a[r[0]]||0); },0);
    var diff=amt-sum;
    var hh='<div style="margin-top:11px;padding:12px;border-radius:12px;background:rgba(69,200,216,.05);border:1px solid rgba(69,200,216,.25)">';
    hh+='<div class="eyebrow" style="font-size:8.5px;margin-bottom:8px">'+(kind==="lump"?"Windfall split \u00b7 "+(+S.windfall.debt||0)+"% debt / "+(+S.windfall.forward||0)+"% savings / "+(+S.windfall.enjoy||0)+"% spending, editable":"What the month still owes, filled in order \u00b7 editable")+'</div>';
    hh+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">';
    rows.forEach(function(r){
      hh+='<div><div style="font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:'+r[2]+';font-weight:700;margin-bottom:3px">'+r[1]+'</div>'
        +'<input type="number" inputmode="decimal" value="'+(+a[r[0]]||0)+'" data-depsplit="'+r[0]+'" style="min-height:38px;padding:7px 8px;font-size:12px"></div>';
    });
    hh+='</div>';
    hh+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:9px;gap:8px">'
      +'<span class="mono" id="depDiff" style="font-size:10px"></span>'
      +'<button class="btn gold" id="depCommit">Commit deposit</button></div>';
    hh+='</div>';
    box.innerHTML=hh;
    function updateStatus(){
      var sum2=rows.reduce(function(t,r){ return t+(+window.__depDraft.a[r[0]]||0); },0);
      var d2=window.__depDraft.amt-sum2;
      var el=document.getElementById('depDiff'), cm2=document.getElementById('depCommit');
      var ok=Math.abs(d2)<1;
      if(el){ el.style.color=ok?'var(--green2)':'var(--amber)'; el.textContent=ok?'\u2713 every dollar placed':fmtS(d2)+' unplaced'; }
      if(cm2){ cm2.disabled=!ok; cm2.style.opacity=ok?'1':'.45'; }
    }
    box.querySelectorAll('[data-depsplit]').forEach(function(el){
      el.addEventListener('input',function(){
        window.__depDraft.a[el.dataset.depsplit]=+el.value||0;
        updateStatus();
      });
    });
    updateStatus();
    var cm=document.getElementById('depCommit');
    if(cm) cm.onclick=function(){
      var d={id:uid(),ds:iso(new Date()),label:(document.getElementById('depLabel').value||'').trim()||(kind==='lump'?'Lump sum':'Cheque'),amt:amt,alloc:window.__depDraft.a};
      S.deposits.push(d);
      if(S.deposits.length>300) S.deposits=S.deposits.slice(-300);
      /* a committed cheque IS the payday executed: tick the moves for this period */
      if(kind==='cheque'){
        var key=execKey();
        if(key){ if(!S.exec[key]) S.exec[key]={}; paydayMoves().forEach(function(m){ S.exec[key][m.k]=true; }); }
      }
      window.__depDraft=null;
      save(); render();
      undoToast('Intake: '+fmt(amt)+' placed', function(){ try{ S.deposits=S.deposits.filter(function(x){ return x.id!==d.id; }); save(); render(); }catch(e){} });
    };
  }
  var depAmtEl=document.getElementById('depAmt');
  if(depAmtEl){
    ['depAmt'].forEach(function(id){ document.getElementById(id).addEventListener('input',function(){ window.__depDraft=null; renderDepPreview(); }); });
    document.getElementById('depKind').addEventListener('change',function(){ window.__depDraft=null; renderDepPreview(); });
    renderDepPreview();
  }
  app.querySelectorAll('[data-deldep]').forEach(function(b){
    b.onclick=function(){
      var id=b.dataset.deldep;
      var item=S.deposits.filter(function(x){ return x.id===id; })[0];
      var snap=JSON.stringify(S.deposits);
      S.deposits=S.deposits.filter(function(x){ return x.id!==id; });
      save(); render();
      undoToast('Removed '+fmt(item?item.amt:0)+' deposit', function(){ try{ S.deposits=JSON.parse(snap); save(); render(); }catch(e){} });
    };
  });
  /* spend log */
  var spAdd=document.getElementById('spAdd');
  if(spAdd) spAdd.onclick=function(){
    var a=+(document.getElementById('spAmt').value||0);
    if(!(a>0)){ document.getElementById('spAmt').focus(); return; }
    var note=(document.getElementById('spNote').value||'').trim();
    S.spends.push({id:uid(),ds:iso(new Date()),amt:a,note:note});
    if(S.spends.length>400) S.spends=S.spends.slice(-400);
    save(); render();
  };
  var spAmtEl=document.getElementById('spAmt');
  if(spAmtEl) spAmtEl.addEventListener('keydown',function(e){ if(e.key==='Enter') spAdd.click(); });
  var spNoteEl=document.getElementById('spNote');
  if(spNoteEl) spNoteEl.addEventListener('keydown',function(e){ if(e.key==='Enter') spAdd.click(); });
  app.querySelectorAll('[data-delspend]').forEach(function(b){
    b.onclick=function(){
      var id=b.dataset.delspend;
      var item=S.spends.filter(function(x){ return x.id===id; })[0];
      var snap=JSON.stringify(S.spends);
      S.spends=S.spends.filter(function(x){ return x.id!==id; });
      save(); render();
      undoToast('Removed '+fmt(item?item.amt:0)+' spend', function(){ try{ S.spends=JSON.parse(snap); save(); render(); }catch(e){} });
    };
  });
  /* payday execution */
  app.querySelectorAll('[data-exec]').forEach(function(cb){
    cb.onchange=function(){
      var key=execKey(); if(!key) return;
      if(!S.exec[key]) S.exec[key]={};
      S.exec[key][cb.dataset.exec]=cb.checked;
      var keys=Object.keys(S.exec); if(keys.length>60){ keys.sort(); delete S.exec[keys[0]]; }
      save();
      var was=periodExecuted(key);
      render();
      if(was && cb.checked){ undoToast('\u26a1 Payday executed. The month is handled.'); }
    };
  });
  /* the audit */
  var audRun=document.getElementById('audRun');
  if(audRun) audRun.onclick=function(){
    var r=parseStatement(document.getElementById('audText').value);
    var errEl=document.getElementById('audErr');
    if(r.err){ if(errEl) errEl.textContent=r.err; return; }
    var months={}; r.txns.forEach(function(x){ months[x.ym]=(months[x.ym]||0)+1; });
    var ym=Object.keys(months).sort(function(a,b){ return months[b]-months[a]; })[0];
    S.audit={ym:ym==="?"?"":ym,txns:r.txns.slice(0,400),importedAt:iso(new Date())};
    save(); render();
    undoToast('Statement check: '+r.txns.length+' transactions read');
  };
  var audFile=document.getElementById('audFile');
  if(audFile) audFile.onchange=function(){
    var f=audFile.files&&audFile.files[0]; if(!f) return;
    var rd=new FileReader();
    rd.onload=function(){ document.getElementById('audText').value=String(rd.result||''); document.getElementById('audRun').click(); };
    rd.readAsText(f);
  };
  var audClear=document.getElementById('audClear');
  if(audClear) audClear.onclick=function(){
    var snap=JSON.stringify(S.audit);
    S.audit=null; save(); render();
    undoToast('Check cleared', function(){ try{ S.audit=JSON.parse(snap); save(); render(); }catch(e){} });
  };
  app.querySelectorAll('.audrow').forEach(function(row){
    row.onclick=function(){
      var tx=(S.audit&&S.audit.txns||[]).filter(function(x){ return x.id===row.dataset.tx; })[0];
      if(!tx) return;
      var i=BUCKET_CYCLE.indexOf(tx.b);
      tx.b=BUCKET_CYCLE[(i<0?0:i+1)%BUCKET_CYCLE.length];
      S.rules[merchKey(tx.desc)]=tx.b;
      save(); render();
    };
  });
  app.querySelectorAll('[data-addrec]').forEach(function(b){
    b.onclick=function(){
      S.bills.push({id:uid(),name:b.dataset.recname,amt:+b.dataset.recamt||0,day:'',freq:'monthly'});
      save(); render();
      undoToast('Added to Bills: '+b.dataset.recname, function(){ try{ S.bills.pop(); save(); render(); }catch(e){} });
    };
  });
  var pillEl=document.querySelector('.appbar-pill');
  if(pillEl && gateDone(5)){ pillEl.style.cursor='pointer'; pillEl.onclick=function(){ S.tab='today'; save(); window.scrollTo(0,0); render(); }; }
  var ub=document.getElementById('undoBtn');
  if(ub) ub.onclick=undoStep;
  /* tabs */
  app.querySelectorAll('[data-tab]').forEach(function(b){
    b.onclick=function(){ S.tab=b.dataset.tab; save(); window.scrollTo(0,0); render(); };
  });
  var rs=document.getElementById('resetAll');
  if(rs) rs.onclick=function(){
    if(!window.confirm('Reset the whole waterfall?\n\nEvery income, debt, bill and allocation goes. Back up from the Atlas Vault first if you want a way back beyond Undo.')) return;
    var snap=JSON.stringify(S);
    S=JSON.parse(JSON.stringify(DEF)); S.created=new Date().toISOString().slice(0,10);
    save(); render();
    undoToast('Waterfall reset', function(){ try{ S=JSON.parse(snap); save(); render(); }catch(e){} });
  };
}
save(); /* prime history baseline after migrations */
render();
document.addEventListener('visibilitychange',function(){ if(!document.hidden){ render(); } });
window.addEventListener('pageshow',function(){ render(); });

/* Ask the browser to treat this data as persistent. Browsers evict storage from
   sites you have not visited recently, and this tool lives in that storage.
   This is a request, not a guarantee, which is why the Vault backup matters. */
(function(){
  try{
    if(navigator.storage && navigator.storage.persist && navigator.storage.persisted){
      navigator.storage.persisted().then(function(already){
        if(!already) navigator.storage.persist();
      }).catch(function(){});
    }
  }catch(e){}
})();
</script>
